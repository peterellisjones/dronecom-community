      es: "Volar hasta el destino a través de los puntos de ruta trazados."
      fr: "Voler jusqu'à la destination via les points de route tracés."
      it: "Volare verso la destinazione attraverso i waypoint tracciati."
      ja: "設定されたウェイポイントを経由して目的地へ飛行する。"
      ko: "설정된 경로점을 경유하여 목적지로 비행합니다."
      "pt-BR": "Voar até o destino pelos pontos de rota traçados."
      ru: "Лететь к пункту назначения через проложенные точки маршрута."
      zh: "经由已规划的航点飞往目的地。"
      "zh-TW": "經由已規劃的航點飛往目的地。"
    screen:
      de: "Eine befreundete Einheit eskortieren, Bedrohungen verfolgen und ohne Reichweitenbegrenzung bekämpfen."
      en: "Escort a friendly unit, pursuing and engaging hostiles that threaten it without range limit."
      es: "Escoltar una unidad amiga, persiguiendo y atacando amenazas sin límite de alcance."
      fr: "Escorter une unité amie, poursuivant et engageant les menaces sans limite de portée."
      it: "Scortare un'unità amica, inseguendo e ingaggiando le minacce senza limite di portata."
      ja: "友軍ユニットを護衛し、脅威を射程制限なしで追跡・交戦する。"
      ko: "우군 유닛을 호위하며, 위협을 사거리 제한 없이 추격하고 교전합니다."
      "pt-BR": "Escoltar uma unidade amiga, perseguindo e engajando ameaças sem limite de alcance."
      ru: "Сопровождать дружественную единицу, преследуя и атакуя угрозы без ограничения дальности."
      zh: "护航友军单位，无距离限制地追击并交战威胁。"
      "zh-TW": "護航友軍單位，無距離限制地追擊並交戰威脅。"
    escort:
      de: "Eine befreundete Einheit eskortieren, nahe Bedrohungen bekämpfen und abbrechen, wenn sie außer Reichweite geraten."
      en: "Escort a friendly unit, engaging nearby hostiles and breaking off if they move out of range."
      es: "Escoltar una unidad amiga, atacando amenazas cercanas y retirándose si se alejan del alcance."
      fr: "Escorter une unité amie, engager les menaces proches et décrocher si elles sortent de portée."
      it: "Scortare un'unità amica, ingaggiando le minacce vicine e disimpegnandosi se escono dalla portata."
      ja: "友軍ユニットを護衛し、近接する脅威と交戦、射程外に出た場合は離脱する。"
      ko: "우군 유닛을 호위하며, 인근 위협과 교전하고 사거리를 벗어나면 이탈합니다."
      "pt-BR": "Escoltar uma unidade amiga, engajando ameaças próximas e desengajando se saírem do alcance."
      ru: "Сопровождать дружественную единицу, атакуя угрозы поблизости и отступая при выходе за пределы дальности."
      zh: "护航友军单位，交战附近威胁，若其脱离射程则脱离。"
      "zh-TW": "護航友軍單位，交戰附近威脅，若其脫離射程則脫離。"
    follow:
      de: "Einer befreundeten Einheit folgen und Kontakt vermeiden, vor feindlichen oder unidentifizierten Kontakten fliehen."
      en: "Follow a friendly unit while avoiding contact with hostile or unidentified contacts."
      es: "Seguir a una unidad amiga evitando el contacto con contactos hostiles o no identificados."
      fr: "Suivre une unité amie en évitant le contact avec des contacts hostiles ou non identifiés."
      it: "Seguire un'unità amica evitando il contatto con contatti ostili o non identificati."
      ja: "友軍ユニットに追従しつつ、敵対または未識別のコンタクトとの接触を避ける。"
      ko: "우군 유닛을 추적하며 적대적이거나 미식별된 접촉과의 접촉을 피합니다."
      "pt-BR": "Seguir uma unidade amiga evitando contato com contatos hostis ou não identificados."
      ru: "Следовать за дружественной единицей, избегая контакта с враждебными или неопознанными контактами."
      zh: "跟随友军单位，同时避免与敌对或未识别目标接触。"
      "zh-TW": "跟隨友軍單位，同時避免與敵對或未識別目標接觸。"
    attack:
      de: "Sich dem Ziel nähern und es bekämpfen, bis es vernichtet ist."
      en: "Close on the target and engage until it is destroyed."
      es: "Aproximarse al objetivo y atacarlo hasta destruirlo."
      fr: "Se rapprocher de la cible et l'engager jusqu'à sa destruction."
      it: "Avvicinarsi al bersaglio e ingaggiarlo fino alla sua distruzione."
      ja: "目標に接近し、撃破するまで交戦する。"
      ko: "표적에 접근하여 파괴할 때까지 교전합니다."
      "pt-BR": "Aproximar-se do alvo e engajá-lo até destruí-lo."
      ru: "Сблизиться с целью и атаковать её до уничтожения."
      zh: "接近目标并交战直至将其摧毁。"
      "zh-TW": "接近目標並交戰直至將其摧毀。"
    standoff:
      de: "In einem festgelegten Abstand zum Ziel bleiben und nur bei Annäherung bekämpfen."
      en: "Hold at a set range from the target, engaging only if it closes."
      es: "Mantenerse a una distancia fija del objetivo, atacando solo si se acerca."
      fr: "Se maintenir à une distance fixe de la cible, n'engager que si elle se rapproche."
      it: "Mantenersi a una distanza prefissata dal bersaglio, ingaggiando solo se si avvicina."
      ja: "目標から一定の距離を保ち、接近してきた場合のみ交戦する。"
      ko: "표적으로부터 설정된 거리를 유지하며, 접근할 때만 교전합니다."
      "pt-BR": "Manter-se a uma distância fixa do alvo, engajando apenas se ele se aproximar."
      ru: "Держаться на заданной дистанции от цели, атакуя только при её сближении."
      zh: "与目标保持设定距离，仅在其靠近时交战。"
      "zh-TW": "與目標保持設定距離，僅在其靠近時交戰。"
    shadow:
      de: "Das Ziel aus der Distanz verfolgen, ohne es zu bekämpfen, und die Distanz anpassen, um Sensorkontakt zu halten."
      en: "Track the target from a distance without engaging, holding range to stay in sensor contact."
      es: "Seguir al objetivo a distancia sin atacarlo, ajustando el alcance para mantener el contacto por sensores."
      fr: "Suivre la cible à distance sans l'engager, ajustant la portée pour rester en contact capteur."
      it: "Tracciare il bersaglio a distanza senza ingaggiarlo, mantenendo la portata per restare in contatto sensore."
      ja: "交戦せずに目標を遠距離から追尾し、センサー接触を維持できる距離を保つ。"
      ko: "교전하지 않고 표적을 원거리에서 추적하며, 센서 접촉을 유지할 수 있는 거리를 유지합니다."
      "pt-BR": "Rastrear o alvo a distância sem engajá-lo, mantendo o alcance para permanecer em contato de sensor."
      ru: "Отслеживать цель на расстоянии, не атакуя её, поддерживая дистанцию для сохранения сенсорного контакта."
      zh: "在不交战的情况下从远处追踪目标，保持能维持传感器接触的距离。"
      "zh-TW": "在不交戰的情況下從遠處追蹤目標，保持能維持感測器接觸的距離。"
