  # #2886: per-verb glossary tooltip for the MISSION badge (`mode_badge_with_tooltip`
  # in `mission_block.rs`) — one sentence explaining what each computed §3.2 verb
  # actually does, keyed by the same `mission.verb.*` key that drives the badge
  # text above. `hold` and `move` both display as "Goto" (#2841) but keep
  # distinct tooltips — they're different cells (arrived-and-holds vs. still
  # transiting) even though the label collapses.
  verb_tooltip:
    guard:
      de: "Einen festen Punkt halten, Feinde verfolgen und ohne Reichweitenbegrenzung bekämpfen."
      en: "Hold a fixed point, pursuing and engaging hostiles without range limit."
      es: "Mantener un punto fijo, persiguiendo y atacando enemigos sin límite de alcance."
      fr: "Tenir un point fixe, poursuivant et engageant les ennemis sans limite de portée."
      it: "Mantenere un punto fisso, inseguendo e ingaggiando i nemici senza limite di portata."
      ja: "定点を保持し、射程制限なしで敵を追跡・交戦する。"
      ko: "고정 지점을 유지하며, 사거리 제한 없이 적을 추격하고 교전합니다."
      "pt-BR": "Manter um ponto fixo, perseguindo e engajando inimigos sem limite de alcance."
      ru: "Удерживать неподвижную точку, преследуя и атакуя врагов без ограничения дальности."
      zh: "驻守固定点，无距离限制地追击并交战敌方目标。"
      "zh-TW": "駐守固定點，無距離限制地追擊並交戰敵方目標。"
    hold:
      de: "Zu einem Punkt fliegen und dort halten, nahe Feinde bekämpfen und abbrechen, wenn sie außer Reichweite geraten."
      en: "Fly to a point and hold there, engaging nearby hostiles and breaking off if they move out of range."
      es: "Volar a un punto y mantenerse allí, atacando enemigos cercanos y retirándose si se alejan del alcance."
      fr: "Voler vers un point et s'y maintenir, engager les ennemis proches et décrocher s'ils sortent de portée."
      it: "Volare verso un punto e mantenersi lì, ingaggiando i nemici vicini e disimpegnandosi se escono dalla portata."
      ja: "指定点へ飛行して保持し、近接する敵と交戦、射程外に出た場合は離脱する。"
      ko: "지점으로 비행하여 그곳에 머무르며, 인근 적과 교전하고 사거리를 벗어나면 이탈합니다."
      "pt-BR": "Voar até um ponto e manter-se ali, engajando inimigos próximos e desengajando se saírem do alcance."
