      "zh-TW": "飛往一點並駐守，交戰附近敵人，若其脫離射程則脫離。"
    observe:
      de: "Einen festen Punkt halten und Kontakt vermeiden, vor feindlichen oder unidentifizierten Kontakten fliehen."
