    de: "Aktuelle Mission abbrechen: die Einheit geht in den Wartezustand"
    en: "Abort the current mission: the unit goes idle"
    es: "Abortar la misión actual: la unidad queda inactiva"
    fr: "Abandonner la mission en cours : l'unité passe en attente"
    it: "Interrompi la missione corrente: l'unità passa in attesa"
    ja: "現在のミッションを中止し、ユニットを待機状態にします"
