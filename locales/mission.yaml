_version: 2

# DC-993: shared mission vocabulary used by both the group inspect panel
# and the per-vehicle inspect panel. Both surfaces reference the same
# keys so the player sees identical wording across both UIs. Moved here
# wholesale from `group_panel.mission.*` (the original namespace) to make
# the shared ownership explicit.
mission:
  label:
    de: "Mission"
    en: "Mission"
    es: "Misión"
    fr: "Mission"
    it: "Missione"
    ja: "ミッション"
    ko: "임무"
    "pt-BR": "Missão"
    ru: "Задача"
    zh: "任务"
    "zh-TW": "任務"
  # #2110: badge appended to the mission heading (e.g. "PATROL · ADVISOR GOAL")
  # when the AI advisor is running this unit's mission — it belongs to an active,
  # player-accepted advisor goal. `badge` is the accent mode-badge chip; the
  # tooltip explains it.
  advisor_goal:
    badge:
      de: "Berater-Ziel"
      en: "Advisor goal"
      es: "Meta del asesor"
      fr: "Objectif conseiller"
      it: "Obiettivo consulente"
      ja: "アドバイザー目標"
      ko: "어드바이저 목표"
      "pt-BR": "Meta do consultor"
      ru: "Цель советника"
      zh: "顾问目标"
      "zh-TW": "顧問目標"
    tooltip:
      de: "Diese Mission wird vom KI-Berater geführt — du hast ein Ziel delegiert, das diese Einheit umfasst. Einheiten ohne aktives Ziel bleiben unter deinem manuellen Befehl."
      en: "This mission is run by the AI advisor — you delegated a goal that includes this unit. Units in no active goal stay under your manual command."
      es: "Esta misión la dirige el asesor de IA: delegaste un objetivo que incluye esta unidad. Las unidades sin objetivo activo permanecen bajo tu mando manual."
      fr: "Cette mission est menée par le conseiller IA : vous avez délégué un objectif incluant cette unité. Les unités hors objectif actif restent sous votre commandement manuel."
      it: "Questa missione è gestita dal consulente IA: hai delegato un obiettivo che include questa unità. Le unità senza obiettivo attivo restano sotto il tuo comando manuale."
      ja: "このミッションはAIアドバイザーが実行しています。このユニットを含む目標を委任しました。アクティブな目標に属さないユニットは手動指揮のままです。"
      ko: "이 임무는 AI 어드바이저가 수행 중입니다. 이 유닛이 포함된 목표를 위임했습니다. 활성 목표에 없는 유닛은 수동 지휘로 유지됩니다."
      "pt-BR": "Esta missão é conduzida pelo consultor de IA: você delegou um objetivo que inclui esta unidade. Unidades sem objetivo ativo permanecem sob seu comando manual."
      ru: "Эту задачу выполняет советник ИИ — вы поручили цель, включающую эту единицу. Единицы вне активных задач остаются под вашим ручным управлением."
      zh: "此任务由 AI 顾问执行——你委派了包含该单位的目标。不在活动目标中的单位仍由你手动指挥。"
      "zh-TW": "此任務由 AI 顧問執行——你委派了包含該單位的目標。不在啟用目標中的單位仍由你手動指揮。"
