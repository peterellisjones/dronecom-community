_version: 2

info_panel:
  alt_mode_tooltip:
    de: "Wie die Plattform die Höhe hält: ALT hält eine feste Höhe über dem Meeresspiegel; TERR folgt dem Gelände in einem festen Abstand."
    en: "How the platform holds altitude: ALT keeps a fixed height above sea level; TERR follows the terrain at a set clearance."
    es: "Cómo mantiene la altitud la plataforma: ALT conserva una altura fija sobre el nivel del mar; TERR sigue el terreno a una separación fija."
    fr: "Comment la plateforme tient l'altitude : ALT maintient une hauteur fixe au-dessus du niveau de la mer ; TERR suit le relief à une garde fixe."
    it: "Come la piattaforma mantiene la quota: ALT tiene un'altezza fissa sul livello del mare; TERR segue il terreno a una distanza fissa."
    ja: "高度の保持方法。ALTは海面からの一定高度を保ち、TERRは一定のクリアランスで地形に追従する。"
    ko: "플랫폼이 고도를 유지하는 방식: ALT는 해수면 기준 고정 고도를 유지하고, TERR는 일정 간격으로 지형을 따라갑니다."
    "pt-BR": "Como a plataforma mantém a altitude: ALT conserva uma altura fixa acima do nível do mar; TERR acompanha o terreno a uma folga fixa."
    ru: "Как платформа удерживает высоту: ALT держит постоянную высоту над уровнем моря; TERR следует рельефу с заданным зазором."
    zh: "平台保持高度的方式：ALT 保持相对海平面的固定高度；TERR 以设定的离地间隙贴地飞行。"
    "zh-TW": "平台保持高度的方式：ALT 保持相對海平面的固定高度；TERR 以設定的離地間隙貼地飛行。"
  battery_reserve_tooltip:
    de: "Der Treibstoff ist aufgebraucht; die Plattform läuft auf ihrer Notbatteriereserve und geht nieder, wenn diese leer ist."
    en: "Fuel is exhausted; the platform is running on its emergency battery reserve and will ditch when it runs out."
    es: "El combustible se ha agotado; la plataforma funciona con su reserva de batería de emergencia y caerá cuando se agote."
    fr: "Le carburant est épuisé ; la plateforme fonctionne sur sa réserve de batterie de secours et s'abîmera une fois celle-ci vide."
    it: "Il carburante è esaurito; la piattaforma sta usando la riserva di batteria d'emergenza e ammarerà quando si scaricherà."
    ja: "燃料が尽き、機体は非常用バッテリーで運転している。尽きれば不時着（着水）する。"
    ko: "연료가 소진되어 플랫폼이 비상 배터리 예비 전력으로 작동 중이며, 이마저 떨어지면 추락(불시착)합니다."
    "pt-BR": "O combustível acabou; a plataforma opera com sua reserva de bateria de emergência e cairá quando ela se esgotar."
    ru: "Топливо кончилось; платформа работает на аварийном резерве батареи и рухнет, когда он иссякнет."
    zh: "燃料已耗尽；平台正依靠应急电池储备运行，耗尽后将坠毁（迫降）。"
    "zh-TW": "燃料已耗盡；平台正依靠應急電池儲備運行，耗盡後將墜毀（迫降）。"
  cavitating_tooltip:
    de: "Dieses U-Boot kavitiert: Es fährt so schnell, dass der Propeller kollabierende Blasen erzeugt, was den abgestrahlten Lärm stark erhöht."
    en: "This submarine is cavitating: moving fast enough that its propeller throws off collapsing bubbles, sharply raising the noise it radiates."
    es: "Este submarino está cavitando: navega tan rápido que su hélice genera burbujas que colapsan, elevando bruscamente el ruido que irradia."
    fr: "Ce sous-marin cavite : il avance assez vite pour que son hélice produise des bulles qui implosent, augmentant fortement le bruit qu'il émet."
    it: "Questo sottomarino sta cavitando: procede così veloce che l'elica genera bolle che collassano, aumentando bruscamente il rumore irradiato."
    ja: "この潜水艦はキャビテーションを起こしている。速力が高くプロペラが崩壊する気泡を発生させ、放射雑音が急増している。"
    ko: "이 잠수함은 캐비테이션을 일으키고 있습니다: 속도가 빨라 프로펠러가 붕괴하는 기포를 만들어 방사 소음이 급격히 커집니다."
    "pt-BR": "Este submarino está cavitando: navega rápido o bastante para que a hélice gere bolhas que implodem, elevando bruscamente o ruído irradiado."
    ru: "Эта подводная лодка кавитирует: идёт так быстро, что винт создаёт схлопывающиеся пузыри, резко повышая излучаемый шум."
    zh: "该潜艇正在发生空泡：航速过快使螺旋桨产生溃灭的气泡，辐射噪声急剧上升。"
    "zh-TW": "該潛艇正在發生空泡：航速過快使螺旋槳產生潰滅的氣泡，輻射噪聲急劇上升。"
