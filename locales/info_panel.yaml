    group_signature_tooltip:
      de: "Die inhärente passive Signatur dieser Plattform — wie leicht andere Sensoren sie ohne aktives Radar erkennen können."
      en: "This platform's inherent passive signature — how easily other sensors can detect it without an active radar."
      es: "La firma pasiva inherente de esta plataforma: cuán fácilmente pueden detectarla otros sensores sin un radar activo."
      fr: "La signature passive inhérente de cette plateforme : la facilité avec laquelle d'autres capteurs peuvent la détecter sans radar actif."
      it: "La firma passiva intrinseca di questa piattaforma: quanto facilmente altri sensori possono rilevarla senza un radar attivo."
      ja: "このプラットフォームが本来持つ受動シグネチャ。アクティブレーダーなしで他のセンサーがどれだけ容易に探知できるかを示す。"
      ko: "이 플랫폼이 본래 지닌 수동 신호 특성 — 능동 레이더 없이 다른 센서가 이를 얼마나 쉽게 탐지할 수 있는지를 나타냅니다."
      "pt-BR": "A assinatura passiva inerente desta plataforma: com que facilidade outros sensores podem detectá-la sem um radar ativo."
      ru: "Собственная пассивная сигнатура этой платформы — насколько легко её могут обнаружить другие датчики без активного радара."
      zh: "该平台固有的被动信号特征——在没有主动雷达的情况下，其他传感器探测到它的难易程度。"
      "zh-TW": "該平台固有的被動信號特徵——在沒有主動雷達的情況下，其他感測器探測到它的難易程度。"
