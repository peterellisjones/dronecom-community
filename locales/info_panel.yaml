      it: "Maiusc+clic per aprire tutto"
      ja: "Shift+クリックですべて開く"
      ko: "Shift+클릭으로 모두 열기"
      "pt-BR": "Shift+clique para abrir tudo"
      ru: "Shift+клик, чтобы открыть все"
      zh: "Shift+单击展开全部"
      "zh-TW": "Shift+點擊展開全部"
    shift_close_all_hint:
      de: "Shift-Klick, um alle zu schließen"
