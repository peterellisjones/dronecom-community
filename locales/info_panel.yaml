    interaction_hint:
      de: "Klicken zum Auf- oder Zuklappen. Shift-Klick, um alle zu öffnen oder zu schließen."
      en: "Click to expand or collapse. Shift-click to open or close all."
      es: "Haz clic para expandir o contraer. Mayús+clic para abrir o cerrar todo."
      fr: "Cliquez pour développer ou réduire. Maj+clic pour tout ouvrir ou fermer."
      it: "Fai clic per espandere o comprimere. Maiusc+clic per aprire o chiudere tutto."
      ja: "クリックで開閉します。Shift+クリックですべて開閉します。"
      ko: "클릭하여 펼치거나 접습니다. Shift+클릭으로 모두 열거나 닫습니다."
      "pt-BR": "Clique para expandir ou recolher. Shift+clique para abrir ou fechar tudo."
      ru: "Нажмите, чтобы развернуть или свернуть. Shift+клик, чтобы открыть или закрыть все."
      zh: "单击展开或收起。Shift+单击展开或收起全部。"
      "zh-TW": "點擊展開或收起。Shift+點擊展開或收起全部。"
