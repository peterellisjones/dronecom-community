      # #2896: Shift-held per-row explanations for the sensor tooltip. Each
      # `*_gloss` pairs with the label of the same name; revealed while Shift is
      # held (rich tooltips can't host a nested hover). Sentence-case prose.
      mode_gloss:
        de: "Wie diese Ortung zustande kommt: passiv über ihre Emissionen, durch Mithören ihres aktiven Sensors oder über das Echo unseres eigenen Sensors."
        en: "How this detection is made: passively from their emissions, from hearing their active sensor, or from our own sensor's return."
        es: "Cómo se logra esta detección: pasivamente por sus emisiones, oyendo su sensor activo o por el eco de nuestro propio sensor."
        fr: "Comment cette détection est obtenue : passivement via leurs émissions, en écoutant leur capteur actif, ou via l'écho de notre propre capteur."
        it: "Come avviene il rilevamento: passivamente dalle loro emissioni, ascoltando il loro sensore attivo o dall'eco del nostro sensore."
        ja: "この探知の方法：相手の放射を受動的に捉える、相手の能動センサーを傍受する、または自機の能動センサーの反射による。"
        ko: "이 탐지가 이루어지는 방식: 상대의 방사를 수동으로 포착, 상대의 능동 센서를 청취, 또는 아군 센서의 반사파."
        "pt-BR": "Como esta detecção é feita: passivamente pelas emissões deles, ouvindo o sensor ativo deles ou pelo eco do nosso próprio sensor."
        ru: "Как получена эта отметка: пассивно по их излучению, за счёт прослушивания их активного датчика или по эху нашего собственного."
        zh: "此次探测的方式：被动接收对方辐射、监听对方主动传感器，或来自我方传感器的回波。"
        "zh-TW": "此次偵測的方式：被動接收對方輻射、監聽對方主動感測器，或來自我方感測器的回波。"
      sensitivity_gloss:
        de: "Das schwächste Signal, das dieser Sensor erfassen kann, in dB; alles darunter bleibt unentdeckt."
        en: "The weakest signal this sensor can register, in dB; anything below this goes undetected."
        es: "La señal más débil que este sensor puede registrar, en dB; por debajo de eso no hay detección."
        fr: "Le signal le plus faible que ce capteur peut enregistrer, en dB ; en dessous, rien n'est détecté."
        it: "Il segnale più debole che questo sensore può registrare, in dB; sotto questa soglia non c'è rilevamento."
        ja: "このセンサーが捉えられる最も弱い信号（dB）。これを下回ると探知できない。"
        ko: "이 센서가 감지할 수 있는 가장 약한 신호(dB); 이보다 약하면 탐지되지 않는다."
        "pt-BR": "O sinal mais fraco que este sensor consegue registrar, em dB; abaixo disso não há detecção."
        ru: "Самый слабый сигнал, который может зарегистрировать датчик, в дБ; всё, что ниже, не обнаруживается."
        zh: "该传感器能够记录的最弱信号（dB）；低于此值即无法探测。"
        "zh-TW": "該感測器能夠記錄的最弱信號（dB）；低於此值即無法偵測。"
      signal_gloss:
        de: "Die rohe Stärke des Echos über der Sensorschwelle, in dB, vor den unten aufgeführten Umgebungsverlusten und -gewinnen."
        en: "The raw strength of the return above the sensor's threshold, in dB, before the environmental losses and gains below."
        es: "La intensidad bruta del eco por encima del umbral del sensor, en dB, antes de las pérdidas y ganancias ambientales de abajo."
        fr: "L'intensité brute de l'écho au-dessus du seuil du capteur, en dB, avant les pertes et gains ambiants ci-dessous."
        it: "L'intensità grezza dell'eco sopra la soglia del sensore, in dB, prima delle perdite e dei guadagni ambientali sottostanti."
        ja: "センサー閾値を上回る反射の生の強度（dB）。以下の環境による損失・利得を適用する前の値。"
        ko: "센서 임계값을 넘는 반사파의 원시 강도(dB); 아래의 환경 손실·이득을 적용하기 전 값."
        "pt-BR": "A intensidade bruta do eco acima do limiar do sensor, em dB, antes das perdas e ganhos ambientais abaixo."
        ru: "Исходная сила отражённого сигнала над порогом датчика, в дБ, до перечисленных ниже потерь и усилений среды."
        zh: "回波高于传感器阈值的原始强度（dB），尚未计入下方的环境损失与增益。"
        "zh-TW": "回波高於感測器閾值的原始強度（dB），尚未計入下方的環境損失與增益。"
      notching_gloss:
        de: "Signalverlust, weil die Zielbewegung es in die dopplerblinde Notch des Radars legt."
        en: "Signal lost because the target's motion places it in the radar's Doppler-blind notch."
        es: "Señal perdida porque el movimiento del blanco lo sitúa en la muesca ciega Doppler del radar."
        fr: "Signal perdu car le mouvement de la cible la place dans l'encoche aveugle Doppler du radar."
        it: "Segnale perso perché il moto del bersaglio lo colloca nella tacca cieca Doppler del radar."
        ja: "目標の運動によってレーダーのドップラー盲域（ノッチ）に入り、失われた信号。"
        ko: "표적의 움직임이 레이더의 도플러 맹점(노치)에 들어가 손실된 신호."
        "pt-BR": "Sinal perdido porque o movimento do alvo o coloca no entalhe cego Doppler do radar."
        ru: "Потеря сигнала из-за того, что движение цели попадает в доплеровскую слепую зону РЛС."
        zh: "因目标运动落入雷达的多普勒盲区（陷波）而损失的信号。"
        "zh-TW": "因目標運動落入雷達的都卜勒盲區（陷波）而損失的信號。"
      reverberation_loss_gloss:
        de: "Sonarsignalverlust durch Echos, die an Oberfläche, Meeresboden und Wasservolumen streuen."
        en: "Sonar signal lost to echoes scattering off the surface, seabed, and water volume."
        es: "Señal de sonar perdida por ecos que se dispersan en la superficie, el fondo y el volumen de agua."
        fr: "Signal sonar perdu à cause des échos diffusés par la surface, le fond et le volume d'eau."
        it: "Segnale sonar perso a causa degli echi diffusi da superficie, fondale e volume d'acqua."
        ja: "海面・海底・水中で散乱する反響によって失われるソナー信号。"
        ko: "수면·해저·수중에서 산란되는 반향으로 손실되는 소나 신호."
        "pt-BR": "Sinal de sonar perdido por ecos que se dispersam na superfície, no fundo e no volume de água."
        ru: "Потеря сигнала сонара из-за эха, рассеиваемого поверхностью, дном и толщей воды."
        zh: "因声呐信号在海面、海底和水体中散射的回响而损失。"
        "zh-TW": "因聲納信號在海面、海底與水體中散射的回響而損失。"
      look_down_clutter_gloss:
        de: "Signalverlust durch Boden- oder Seeclutter, wenn der Sensor auf ein tiefes Ziel herabblickt."
        en: "Signal lost to ground or sea clutter when the sensor looks down on a low target."
        es: "Señal perdida por retorno del terreno o del mar cuando el sensor mira hacia abajo a un blanco bajo."
        fr: "Signal perdu à cause du fouillis de sol ou de mer lorsque le capteur regarde vers le bas un objectif bas."
        it: "Segnale perso a causa del clutter di terra o mare quando il sensore guarda in basso verso un bersaglio basso."
        ja: "低空目標を見下ろす際、地表や海面のクラッターで失われる信号。"
        ko: "저고도 표적을 내려다볼 때 지면·해면 클러터로 손실되는 신호."
        "pt-BR": "Sinal perdido para o retorno de solo ou mar quando o sensor olha para baixo em um alvo baixo."
        ru: "Потеря сигнала из-за отражений от земли или моря при взгляде датчика вниз на низкую цель."
        zh: "传感器俯视低空目标时，被地面或海面杂波掩盖而损失的信号。"
        "zh-TW": "感測器俯視低空目標時，被地面或海面雜波掩蓋而損失的信號。"
      thermocline_loss_gloss:
        de: "Sonarsignalverlust beim Durchqueren der Sprungschicht — der Temperaturgrenze, die Schall beugt und blockiert."
        en: "Sonar signal lost crossing the thermocline — the temperature boundary that bends and blocks sound."
        es: "Señal de sonar perdida al cruzar la termoclina, la frontera térmica que desvía y bloquea el sonido."
        fr: "Signal sonar perdu en traversant la thermocline — la frontière thermique qui courbe et bloque le son."
        it: "Segnale sonar perso attraversando il termoclino, il confine termico che devia e blocca il suono."
        ja: "水温躍層（サーモクライン）を越える際に失われるソナー信号。音を屈折させ遮る温度境界。"
        ko: "수온약층(서모클라인)을 통과하며 손실되는 소나 신호. 소리를 굴절·차단하는 온도 경계."
        "pt-BR": "Sinal de sonar perdido ao cruzar a termoclina — a fronteira térmica que curva e bloqueia o som."
        ru: "Потеря сигнала сонара при прохождении термоклина — температурного слоя, преломляющего и глушащего звук."
        zh: "声呐信号穿越温跃层时的损失——这一温度界面会弯折并阻挡声波。"
        "zh-TW": "聲納信號穿越溫躍層時的損失——這一溫度界面會彎折並阻擋聲波。"
      shallow_water_loss_gloss:
        de: "Sonarsignalverlust durch wiederholte Reflexionen an Oberfläche und Grund in flachem Wasser."
        en: "Sonar signal lost to repeated surface and bottom bounces in shallow water."
        es: "Señal de sonar perdida por rebotes repetidos en la superficie y el fondo en aguas someras."
        fr: "Signal sonar perdu à cause des rebonds répétés sur la surface et le fond en eaux peu profondes."
        it: "Segnale sonar perso per i rimbalzi ripetuti su superficie e fondale in acque basse."
        ja: "浅海で海面と海底に繰り返し反射して失われるソナー信号。"
        ko: "천해에서 수면과 해저에 반복 반사되어 손실되는 소나 신호."
        "pt-BR": "Sinal de sonar perdido por ricochetes repetidos na superfície e no fundo em águas rasas."
        ru: "Потеря сигнала сонара из-за многократных отражений от поверхности и дна на мелководье."
        zh: "浅水中信号在海面与海底间反复反射而损失的声呐信号。"
        "zh-TW": "淺水中信號在海面與海底間反覆反射而損失的聲納信號。"
      cz_boost_gloss:
        de: "Signalgewinn dort, wo eine Konvergenzzone Schall wieder bündelt und die Sonarortung auf große Entfernung ausweitet."
        en: "Signal gained where a convergence zone refocuses sound, extending sonar detection at long range."
        es: "Ganancia de señal donde una zona de convergencia reenfoca el sonido, ampliando la detección de sonar a larga distancia."
        fr: "Gain de signal là où une zone de convergence refocalise le son, étendant la détection sonar à longue portée."
        it: "Guadagno di segnale dove una zona di convergenza rifocalizza il suono, estendendo il rilevamento sonar a lungo raggio."
        ja: "収束帯（コンバージェンスゾーン）が音を再収束させ、遠距離でのソナー探知を延ばす利得。"
        ko: "수렴대(컨버전스 존)가 소리를 다시 모아 원거리 소나 탐지를 확장하는 이득."
        "pt-BR": "Ganho de sinal onde uma zona de convergência refocaliza o som, ampliando a detecção de sonar a longa distância."
        ru: "Усиление сигнала там, где зона конвергенции вновь фокусирует звук, увеличивая дальность обнаружения сонара."
        zh: "汇聚区将声波重新聚焦，延伸远距离声呐探测所带来的增益。"
        "zh-TW": "匯聚區將聲波重新聚焦，延伸遠距離聲納偵測所帶來的增益。"
      cavitation_gloss:
        de: "Zusätzliches Signal durch das Kavitationsgeräusch der Zielschraube, das einen schnellen, tief laufenden Läufer verrät."
        en: "Extra signal from the target's own propeller cavitation noise, which betrays a fast, deep runner."
        es: "Señal extra del ruido de cavitación de la hélice del blanco, que delata a un objetivo rápido y profundo."
        fr: "Signal supplémentaire dû au bruit de cavitation de l'hélice de la cible, qui trahit une cible rapide et profonde."
        it: "Segnale aggiuntivo dal rumore di cavitazione dell'elica del bersaglio, che tradisce un bersaglio veloce e profondo."
        ja: "目標のスクリューによるキャビテーション音がもたらす追加信号。高速で深く走る目標を暴く。"
        ko: "표적 스크루의 캐비테이션 소음에서 나오는 추가 신호; 빠르고 깊이 달리는 표적을 드러낸다."
        "pt-BR": "Sinal extra do ruído de cavitação da hélice do alvo, que denuncia um alvo rápido e profundo."
        ru: "Дополнительный сигнал от шума кавитации винта цели, выдающий быструю глубоко идущую цель."
        zh: "来自目标螺旋桨空化噪声的额外信号，会暴露高速深潜的目标。"
        "zh-TW": "來自目標螺旋槳空化噪聲的額外信號，會暴露高速深潛的目標。"
      net_snr_gloss:
        de: "Das endgültige Signal-Rausch-Verhältnis nach allen Verlusten und Gewinnen; die Ortung hält, solange es positiv bleibt."
        en: "The final signal-to-noise ratio after every loss and gain; the detection holds while this stays positive."
        es: "La relación señal-ruido final tras todas las pérdidas y ganancias; la detección se mantiene mientras siga siendo positiva."
        fr: "Le rapport signal/bruit final après toutes les pertes et gains ; la détection tient tant qu'il reste positif."
        it: "Il rapporto segnale-rumore finale dopo tutte le perdite e i guadagni; il rilevamento regge finché resta positivo."
        ja: "すべての損失・利得を経た最終的な信号対雑音比。これが正である限り探知は維持される。"
        ko: "모든 손실과 이득을 반영한 최종 신호 대 잡음비; 이 값이 양수인 동안 탐지가 유지된다."
        "pt-BR": "A relação sinal-ruído final após todas as perdas e ganhos; a detecção se mantém enquanto ela for positiva."
        ru: "Итоговое отношение сигнал/шум после всех потерь и усилений; отметка держится, пока оно положительно."
        zh: "计入所有损失与增益后的最终信噪比；只要为正，探测即可维持。"
        "zh-TW": "計入所有損失與增益後的最終訊雜比；只要為正，偵測即可維持。"
      iff_margin_gloss:
        de: "Um wie viele dB die IFF-Abfrage die Ortungsschwelle überschreitet; höher bedeutet eine zuverlässigere Freund-Feind-Antwort."
        en: "How many dB of margin the IFF interrogation clears the detection threshold by; higher means a more reliable friend-or-foe reply."
        es: "Cuántos dB de margen supera la interrogación IFF el umbral de detección; más alto significa una respuesta amigo-enemigo más fiable."
        fr: "De combien de dB l'interrogation IFF dépasse le seuil de détection ; plus c'est élevé, plus la réponse ami-ennemi est fiable."
        it: "Di quanti dB l'interrogazione IFF supera la soglia di rilevamento; più alto significa una risposta amico-nemico più affidabile."
        ja: "IFF照会が探知閾値をどれだけのdBで上回るか。値が大きいほど敵味方応答が信頼できる。"
        ko: "IFF 질문 신호가 탐지 임계값을 넘는 여유(dB); 클수록 피아 응답이 더 신뢰할 만하다."
        "pt-BR": "Quantos dB de margem a interrogação IFF supera o limiar de detecção; mais alto significa uma resposta amigo-inimigo mais confiável."
        ru: "На сколько дБ запрос IFF превышает порог обнаружения; чем больше, тем надёжнее ответ «свой-чужой»."
        zh: "敌我识别（IFF）询问超出探测阈值的余量（dB）；数值越高，敌我应答越可靠。"
        "zh-TW": "敵我識別（IFF）詢問超出偵測閾值的餘量（dB）；數值越高，敵我應答越可靠。"
      max_contacts_gloss:
        de: "Wie viele einzelne Spuren die Spurdatei dieses Sensors halten kann; ist sie voll, sättigt sie und verliert Kontakte."
        en: "How many separate tracks this sensor's track file can hold; once full it saturates and starts dropping contacts."
        es: "Cuántas trazas distintas puede mantener el archivo de trazas de este sensor; al llenarse se satura y empieza a perder contactos."
        fr: "Combien de pistes distinctes le fichier de pistes de ce capteur peut contenir ; une fois plein, il sature et perd des contacts."
        it: "Quante tracce distinte può contenere l'archivio tracce di questo sensore; una volta pieno si satura e inizia a perdere contatti."
        ja: "このセンサーの航跡ファイルが同時に保持できる航跡の数。満杯になると飽和し、接触を取りこぼし始める。"
        ko: "이 센서의 항적 파일이 동시에 보유할 수 있는 항적 수; 가득 차면 포화되어 접촉을 놓치기 시작한다."
        "pt-BR": "Quantas trilhas distintas o arquivo de trilhas deste sensor pode manter; quando cheio, ele satura e começa a perder contatos."
        ru: "Сколько отдельных треков может хранить трековый файл датчика; при заполнении он насыщается и теряет контакты."
        zh: "该传感器的航迹文件可同时保持的航迹数量；一旦占满即饱和并开始丢失接触。"
        "zh-TW": "該感測器的航跡檔案可同時保持的航跡數量；一旦占滿即飽和並開始丟失接觸。"
      effective_accuracy_gloss:
        de: "Die aktuelle 1 SD-Unsicherheit von Position und Peilung dieser Ortung; sie wird bei stärkerem Signal enger und mit der Entfernung größer."
        en: "The current 1 SD position and bearing uncertainty of this fix; it tightens with a stronger signal and widens with range."
        es: "La incertidumbre actual de 1 SD en posición y marcación de esta fijación; se estrecha con una señal más fuerte y se amplía con la distancia."
        fr: "L'incertitude actuelle à 1 SD en position et relèvement de ce point ; elle se resserre avec un signal plus fort et s'élargit avec la distance."
        it: "L'incertezza attuale a 1 SD di posizione e rilevamento di questo fix; si restringe con un segnale più forte e si allarga con la distanza."
        ja: "この測位の現在の1 SD位置・方位誤差。信号が強いほど小さく、距離が伸びるほど大きくなる。"
        ko: "이 측위의 현재 1 SD 위치·방위 불확실성; 신호가 강할수록 좁아지고 거리가 멀수록 넓어진다."
        "pt-BR": "A incerteza atual de 1 SD em posição e marcação desta fixação; ela diminui com um sinal mais forte e aumenta com a distância."
        ru: "Текущая неопределённость этого измерения (1 SD) по позиции и пеленгу; уменьшается при сильном сигнале и растёт с дальностью."
        zh: "该定位当前的 1 SD 位置与方位不确定度；信号越强越收窄，距离越远越扩大。"
        "zh-TW": "該定位當前的 1 SD 位置與方位不確定度；信號越強越收窄，距離越遠越擴大。"
