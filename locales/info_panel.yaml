      es: "Sensores de escucha: solo reciben, no emiten nada, por lo que resultan difíciles de detectar ellos mismos."
      fr: "Capteurs à l'écoute : ils ne font que recevoir, sans rien émettre, ce qui les rend eux-mêmes difficiles à détecter."
      it: "Sensori in ascolto: ricevono soltanto, senza emettere nulla, restando quindi difficili da rilevare a loro volta."
      ja: "受信型センサー。受信のみで何も放射しないため、それ自体が探知されにくい。"
      ko: "수신형 센서 — 수신만 하고 아무것도 방사하지 않으므로 자신은 탐지되기 어렵습니다."
      "pt-BR": "Sensores de escuta: apenas recebem, sem emitir nada, o que os torna difíceis de detectar."
      ru: "Пассивные датчики — только принимают, ничего не излучая, поэтому сами остаются малозаметными."
      zh: "被动接收式传感器——仅接收不发射，因而自身难以被探测到。"
      "zh-TW": "被動接收式感測器——僅接收不發射，因而自身難以被探測到。"
    group_signature:
      de: SIGNATUR
      en: SIGNATURE
      es: FIRMA
      fr: SIGNATURE
      it: FIRMA
      ja: シグネチャ
      ko: 신호 특성
      "pt-BR": ASSINATURA
      ru: СИГНАТУРА
