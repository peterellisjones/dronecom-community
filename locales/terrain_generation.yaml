  # ── Hover tooltips (#2892) ─────────────────────────────────────────────────
  # Plain-English explanations of the in-game effect of each control. Source of
  # truth for the underlying noise/erosion behaviour: doc comments on
  # `terrain_gen::TerrainHeightProps` / `TerrainProps` fields.
  variant_tooltip:
    de: "Wie die Karte erzeugt wird. Inseln ist das reguläre prozedurale Gelände; die übrigen sind feste Testformen zum Debuggen."
    en: "How the map is generated. Islands is the standard procedural terrain; the rest are fixed test shapes for debugging."
    es: "Cómo se genera el mapa. Islas es el terreno procedural estándar; el resto son formas de prueba fijas para depuración."
    fr: "Comment la carte est générée. Îles est le terrain procédural standard ; les autres sont des formes de test fixes pour le débogage."
    it: "Come viene generata la mappa. Isole è il terreno procedurale standard; gli altri sono forme di test fisse per il debug."
    ja: "マップの生成方法です。「島嶼」が標準の手続き型地形で、それ以外はデバッグ用の固定テスト形状です。"
    ko: "맵이 생성되는 방식입니다. '섬'이 표준 절차적 지형이며, 나머지는 디버깅용 고정 테스트 형태입니다."
    "pt-BR": "Como o mapa é gerado. Ilhas é o terreno procedural padrão; os demais são formas de teste fixas para depuração."
    ru: "Как создаётся карта. «Острова» — стандартный процедурный рельеф; остальные варианты — фиксированные тестовые формы для отладки."
    zh: "地图的生成方式。「岛屿」是标准的程序化地形；其余为用于调试的固定测试形状。"
    "zh-TW": "地圖的產生方式。「島嶼」是標準的程序化地形；其餘為除錯用的固定測試形狀。"
  seed_tooltip:
    de: "Derselbe Seed mit denselben Parametern erzeugt immer dasselbe Gelände."
    en: "The same seed with the same parameters always generates the same terrain."
    es: "La misma semilla con los mismos parámetros siempre genera el mismo terreno."
    fr: "La même graine avec les mêmes paramètres génère toujours le même terrain."
    it: "Lo stesso seed con gli stessi parametri genera sempre lo stesso terreno."
    ja: "同じシードと同じパラメータからは常に同じ地形が生成されます。"
    ko: "동일한 시드와 동일한 매개변수는 항상 같은 지형을 생성합니다."
    "pt-BR": "A mesma seed com os mesmos parâmetros sempre gera o mesmo terreno."
    ru: "Один и тот же сид с одинаковыми параметрами всегда создаёт одинаковый рельеф."
    zh: "相同的种子加上相同的参数，总会生成相同的地形。"
    "zh-TW": "相同的種子加上相同的參數，總會產生相同的地形。"
  radius_tooltip:
    de: "Radius der spielbaren Karte, von der Mitte bis zum Weltrand."
    en: "Radius of the playable map, from the center to the world edge."
    es: "Radio del mapa jugable, desde el centro hasta el borde del mundo."
    fr: "Rayon de la carte jouable, du centre jusqu'au bord du monde."
    it: "Raggio della mappa giocabile, dal centro al bordo del mondo."
    ja: "プレイ可能なマップの半径です。中心からワールドの端までの距離です。"
    ko: "플레이 가능한 맵의 반경입니다. 중심에서 월드 가장자리까지의 거리입니다."
    "pt-BR": "Raio do mapa jogável, do centro até a borda do mundo."
    ru: "Радиус игровой карты — от центра до края мира."
    zh: "可游玩地图的半径，即从中心到世界边缘的距离。"
    "zh-TW": "可遊玩地圖的半徑，即從中心到世界邊緣的距離。"
  max_height_tooltip:
    de: "Höchster Punkt, den das Gelände über dem Meeresspiegel erreichen kann."
    en: "Highest point the terrain can reach above sea level."
    es: "Punto más alto que el terreno puede alcanzar sobre el nivel del mar."
    fr: "Point le plus haut que le terrain peut atteindre au-dessus du niveau de la mer."
    it: "Punto più alto che il terreno può raggiungere sopra il livello del mare."
    ja: "地形が海面より上に到達できる最高地点です。"
    ko: "지형이 해수면 위로 도달할 수 있는 최고 지점입니다."
    "pt-BR": "Ponto mais alto que o terreno pode atingir acima do nível do mar."
    ru: "Наивысшая точка, которой может достичь рельеф над уровнем моря."
    zh: "地形在海平面以上能达到的最高点。"
    "zh-TW": "地形在海平面以上能達到的最高點。"
  max_depth_tooltip:
    de: "Tiefster Punkt, den der Meeresboden unter dem Meeresspiegel erreichen kann."
    en: "Deepest point the seabed can reach below sea level."
    es: "Punto más profundo que el lecho marino puede alcanzar bajo el nivel del mar."
    fr: "Point le plus profond que le fond marin peut atteindre sous le niveau de la mer."
    it: "Punto più profondo che il fondale marino può raggiungere sotto il livello del mare."
    ja: "海底が海面より下に到達できる最深地点です。"
    ko: "해저가 해수면 아래로 도달할 수 있는 최저 지점입니다."
    "pt-BR": "Ponto mais profundo que o leito marinho pode atingir abaixo do nível do mar."
    ru: "Наибольшая глубина, которой может достичь морское дно ниже уровня моря."
    zh: "海床在海平面以下能达到的最深点。"
    "zh-TW": "海床在海平面以下能達到的最深點。"
  island_radius_tooltip:
    de: "Radius der Landfläche für diese Testform."
    en: "Radius of the land area for this test shape."
    es: "Radio del área de tierra para esta forma de prueba."
    fr: "Rayon de la zone de terre pour cette forme de test."
    it: "Raggio dell'area di terra per questa forma di test."
    ja: "このテスト形状における陸地の半径です。"
    ko: "이 테스트 형태의 육지 영역 반경입니다."
    "pt-BR": "Raio da área de terra para esta forma de teste."
    ru: "Радиус участка суши для этой тестовой формы."
    zh: "此测试形状中陆地区域的半径。"
    "zh-TW": "此測試形狀中陸地區域的半徑。"
  transition_tooltip:
    de: "Breite des Unterwasserhangs zwischen der Insel und dem offenen Wasser."
    en: "Width of the underwater slope between the island and open water."
    es: "Ancho de la pendiente submarina entre la isla y el mar abierto."
    fr: "Largeur de la pente sous-marine entre l'île et l'eau libre."
    it: "Larghezza del pendio sottomarino tra l'isola e il mare aperto."
    ja: "島と外洋の間にある海中斜面の幅です。"
    ko: "섬과 외해 사이에 있는 수중 경사면의 너비입니다."
    "pt-BR": "Largura da encosta submersa entre a ilha e o mar aberto."
    ru: "Ширина подводного склона между островом и открытой водой."
    zh: "岛屿与外海之间水下斜坡的宽度。"
    "zh-TW": "島嶼與外海之間水下斜坡的寬度。"
  sea_level_tooltip:
    de: "Anteil des Höhenbereichs, der unter Wasser liegt – höhere Werte bedeuten mehr Meer, weniger Land."
    en: "Fraction of the height range that ends up underwater — higher means more sea, less land."
    es: "Fracción del rango de altura que queda bajo el agua; un valor más alto significa más mar y menos tierra."
    fr: "Fraction de la plage de hauteur qui se retrouve sous l'eau ; plus la valeur est élevée, plus il y a de mer et moins de terre."
    it: "Frazione dell'intervallo di altezza che finisce sott'acqua: valori più alti significano più mare e meno terra."
    ja: "高さの範囲のうち水面下になる割合です。値が高いほど海が広がり、陸地は少なくなります。"
    ko: "높이 범위 중 물에 잠기는 비율입니다. 값이 높을수록 바다가 넓어지고 육지가 줄어듭니다."
    "pt-BR": "Fração do intervalo de altura que fica submersa — valores mais altos significam mais mar e menos terra."
    ru: "Доля диапазона высот, оказывающаяся под водой — чем выше значение, тем больше моря и меньше суши."
    zh: "高度范围中被淹没在水下的比例——数值越高，海洋越多，陆地越少。"
    "zh-TW": "高度範圍中被淹沒在水下的比例——數值越高，海洋越多，陸地越少。"
  falloff_tooltip:
    de: "Breite der Übergangszone zum Ozean am Kartenrand, als Anteil des Weltradius. Kleinere Werte lassen das Gelände schärfer abfallen."
    en: "Width of the fade-to-ocean zone at the map edge, as a fraction of the world radius. Smaller values fade more sharply."
    es: "Ancho de la zona de transición al océano en el borde del mapa, como fracción del radio del mundo. Valores más bajos producen una transición más abrupta."
    fr: "Largeur de la zone de transition vers l'océan au bord de la carte, en fraction du rayon du monde. Des valeurs plus faibles créent une transition plus abrupte."
    it: "Larghezza della zona di transizione verso l'oceano al bordo della mappa, come frazione del raggio del mondo. Valori più bassi creano una transizione più brusca."
    ja: "マップ端で海へと変化する遷移帯の幅で、ワールド半径に対する割合です。値が小さいほど急激に変化します。"
    ko: "맵 가장자리에서 바다로 전환되는 구간의 너비이며, 월드 반경에 대한 비율입니다. 값이 작을수록 더 급격하게 전환됩니다."
    "pt-BR": "Largura da zona de transição para o oceano na borda do mapa, como fração do raio do mundo. Valores menores criam uma transição mais abrupta."
    ru: "Ширина зоны перехода к океану у края карты, в долях от радиуса мира. Меньшие значения дают более резкий переход."
    zh: "地图边缘过渡为海洋的区域宽度，以世界半径的比例表示。数值越小，过渡越陡峭。"
    "zh-TW": "地圖邊緣過渡為海洋的區域寬度，以世界半徑的比例表示。數值越小，過渡越陡峭。"
  feature_size_tooltip:
    de: "Ungefähre Größe einer einzelnen Landmasse."
    en: "Approximate size of a single landmass."
    es: "Tamaño aproximado de una sola masa de tierra."
    fr: "Taille approximative d'une seule masse continentale."
    it: "Dimensione approssimativa di una singola massa di terra."
    ja: "1つの陸地のおおよその大きさです。"
    ko: "하나의 육지 덩어리의 대략적인 크기입니다."
    "pt-BR": "Tamanho aproximado de uma única massa de terra."
    ru: "Приблизительный размер одного массива суши."
    zh: "单个陆块的大致大小。"
    "zh-TW": "單一陸塊的大致大小。"
  octaves_tooltip:
    de: "Wie viele Detailebenen das Rauschen hinzufügt – mehr Oktaven bedeuten feineres Detail."
    en: "How many layers of detail the noise adds — more octaves, finer detail."
    es: "Cuántas capas de detalle añade el ruido; más octavas producen un detalle más fino."
    fr: "Combien de couches de détail le bruit ajoute ; plus d'octaves donnent un détail plus fin."
    it: "Quanti livelli di dettaglio aggiunge il rumore: più ottave, dettaglio più fine."
    ja: "ノイズが加える詳細レイヤーの数です。オクターブが多いほど、より細かい詳細が加わります。"
    ko: "노이즈가 추가하는 디테일 레이어의 수입니다. 옥타브가 많을수록 더 미세한 디테일이 추가됩니다."
    "pt-BR": "Quantas camadas de detalhe o ruído adiciona — mais oitavas, detalhe mais fino."
    ru: "Сколько слоёв детализации добавляет шум — чем больше октав, тем тоньше детали."
    zh: "噪声叠加的细节层数——八度越多，细节越精细。"
    "zh-TW": "噪訊疊加的細節層數——八度越多，細節越精細。"
  lacunarity_tooltip:
    de: "Frequenzschritt zwischen den Detailebenen – höhere Werte bedeuten feinere Ebenen."
    en: "Frequency step between detail layers — higher means each layer is finer."
    es: "Salto de frecuencia entre capas de detalle; un valor más alto hace que cada capa sea más fina."
    fr: "Pas de fréquence entre les couches de détail ; une valeur plus élevée rend chaque couche plus fine."
    it: "Salto di frequenza tra i livelli di dettaglio: valori più alti rendono ogni livello più fine."
    ja: "詳細レイヤー間の周波数の増加率です。値が高いほど各レイヤーが細かくなります。"
    ko: "디테일 레이어 간의 주파수 증가율입니다. 값이 높을수록 각 레이어가 더 미세해집니다."
    "pt-BR": "Salto de frequência entre camadas de detalhe — valores mais altos tornam cada camada mais fina."
    ru: "Шаг частоты между слоями детализации — чем выше значение, тем тоньше каждый слой."
    zh: "细节层之间的频率倍增幅度——数值越高，每层越精细。"
    "zh-TW": "細節層之間的頻率倍增幅度——數值越高，每層越精細。"
  persistence_tooltip:
    de: "Wie stark jede feinere Ebene durchscheint – höhere Werte fügen zerklüftetere Details hinzu."
    en: "How strongly each finer layer shows through — higher values add more rugged detail."
    es: "Con qué fuerza se nota cada capa más fina; valores más altos añaden más detalle escarpado."
    fr: "À quel point chaque couche plus fine transparaît ; des valeurs plus élevées ajoutent un détail plus accidenté."
    it: "Quanto risalta ogni livello più fine: valori più alti aggiungono un dettaglio più accidentato."
    ja: "より細かいレイヤーがどれだけ強く反映されるかです。値が高いほど、より起伏の激しい詳細が加わります。"
    ko: "더 미세한 레이어가 얼마나 강하게 반영되는지를 나타냅니다. 값이 높을수록 더 험준한 디테일이 추가됩니다."
    "pt-BR": "Com que força cada camada mais fina aparece — valores mais altos adicionam detalhe mais acidentado."
    ru: "Насколько сильно проявляется каждый более тонкий слой — при более высоких значениях рельеф становится более неровным."
    zh: "每一层更精细的细节透显出来的强度——数值越高，地形越崎岖。"
    "zh-TW": "每一層更精細的細節透顯出來的強度——數值越高，地形越崎嶇。"
  mountain_height_tooltip:
    de: "Wie hoch Berge aufragen, als Anteil der maximalen Kartenhöhe."
    en: "How tall mountains rise, as a fraction of the map's maximum height."
    es: "Cuán altas se elevan las montañas, como fracción de la altura máxima del mapa."
    fr: "À quelle hauteur les montagnes s'élèvent, en fraction de la hauteur maximale de la carte."
    it: "Quanto si innalzano le montagne, come frazione dell'altezza massima della mappa."
    ja: "山がどれだけ高くそびえるかを、マップの最大高度に対する割合で表します。"
    ko: "산이 얼마나 높이 솟는지를 맵의 최대 높이에 대한 비율로 나타냅니다."
    "pt-BR": "Quão altas as montanhas se elevam, como fração da altura máxima do mapa."
    ru: "Насколько высоко поднимаются горы, в долях от максимальной высоты карты."
    zh: "山脉隆起的高度，以地图最大高度的比例表示。"
    "zh-TW": "山脈隆起的高度，以地圖最大高度的比例表示。"
  mountain_amount_tooltip:
    de: "Höhe, ab der Berge entstehen können – höhere Werte beschränken Berge auf kleinere, höher gelegene Gebiete."
    en: "Elevation above which mountains can form — higher values confine mountains to smaller, higher areas."
    es: "Elevación por encima de la cual pueden formarse montañas; valores más altos confinan las montañas a áreas más pequeñas y elevadas."
    fr: "Altitude au-delà de laquelle des montagnes peuvent se former ; des valeurs plus élevées confinent les montagnes à des zones plus petites et plus hautes."
    it: "Altitudine oltre la quale possono formarsi le montagne: valori più alti confinano le montagne in aree più piccole e più alte."
    ja: "山が形成され得る標高のしきい値です。値が高いほど、山はより小さく標高の高いエリアに限定されます。"
    ko: "산이 형성될 수 있는 고도 기준입니다. 값이 높을수록 산이 더 작고 높은 지역으로 제한됩니다."
    "pt-BR": "Elevação acima da qual montanhas podem se formar — valores mais altos restringem as montanhas a áreas menores e mais elevadas."
    ru: "Высота, начиная с которой могут формироваться горы — при более высоких значениях горы ограничиваются меньшими, более высокими участками."
    zh: "山脉可以形成的海拔阈值——数值越高，山脉就越局限于更小、更高的区域。"
    "zh-TW": "山脈可以形成的海拔閾值——數值越高，山脈就越侷限於更小、更高的區域。"
  mountain_feature_size_tooltip:
    de: "Ungefähre Größe einer einzelnen Gebirgskette."
    en: "Approximate size of a single mountain range."
    es: "Tamaño aproximado de una sola cadena montañosa."
    fr: "Taille approximative d'une seule chaîne de montagnes."
    it: "Dimensione approssimativa di una singola catena montuosa."
    ja: "1つの山脈のおおよその大きさです。"
    ko: "하나의 산맥의 대략적인 크기입니다."
    "pt-BR": "Tamanho aproximado de uma única cadeia de montanhas."
    ru: "Приблизительный размер одного горного хребта."
    zh: "单条山脉的大致大小。"
    "zh-TW": "單條山脈的大致大小。"
  mountain_octaves_tooltip:
    de: "Wie viele Detailebenen das Gebirgsrauschen hinzufügt – mehr Oktaven bedeuten zerklüftetere Gipfel."
    en: "How many layers of detail the mountain noise adds — more octaves, more jagged peaks."
    es: "Cuántas capas de detalle añade el ruido de montaña; más octavas producen picos más escarpados."
    fr: "Combien de couches de détail le bruit montagneux ajoute ; plus d'octaves donnent des sommets plus déchiquetés."
    it: "Quanti livelli di dettaglio aggiunge il rumore montano: più ottave, picchi più frastagliati."
    ja: "山岳ノイズが加える詳細レイヤーの数です。オクターブが多いほど、峰がより険しくなります。"
    ko: "산악 노이즈가 추가하는 디테일 레이어의 수입니다. 옥타브가 많을수록 봉우리가 더 험준해집니다."
    "pt-BR": "Quantas camadas de detalhe o ruído de montanha adiciona — mais oitavas, picos mais irregulares."
    ru: "Сколько слоёв детализации добавляет горный шум — чем больше октав, тем более зубчатыми получаются вершины."
    zh: "山地噪声叠加的细节层数——八度越多，山峰越嶙峋。"
    "zh-TW": "山地噪訊疊加的細節層數——八度越多，山峰越嶙峋。"
  mountain_falloff_tooltip:
    de: "Wie allmählich Berge oberhalb der Schwellenhöhe einsetzen. Kleinere Werte erzeugen schärfere Bergkanten."
    en: "How gradually mountains blend in above the threshold elevation. Smaller values make sharper mountain edges."
    es: "Con qué gradualidad las montañas se integran por encima de la elevación umbral. Valores más bajos crean bordes montañosos más abruptos."
    fr: "À quel point les montagnes s'intègrent progressivement au-dessus de l'altitude seuil. Des valeurs plus faibles créent des contours montagneux plus nets."
    it: "Quanto gradualmente le montagne si integrano sopra l'altitudine soglia. Valori più bassi creano bordi montani più netti."
    ja: "しきい値の標高を超えたところで山がどれだけ滑らかに現れるかです。値が小さいほど、山の輪郭がより鋭くなります。"
    ko: "임계 고도 위에서 산이 얼마나 점진적으로 나타나는지를 나타냅니다. 값이 작을수록 산의 경계가 더 뚜렷해집니다."
    "pt-BR": "Quão gradualmente as montanhas se mesclam acima da elevação limite. Valores menores criam bordas de montanha mais nítidas."
    ru: "Насколько плавно горы проявляются выше пороговой высоты. Меньшие значения дают более резкие горные контуры."
    zh: "超过阈值海拔后，山脉融入地形的渐变程度。数值越小，山脉边缘越锐利。"
    "zh-TW": "超過閾值海拔後，山脈融入地形的漸變程度。數值越小，山脈邊緣越銳利。"
  shelf_enabled_tooltip:
    de: "Fügt einen flachen Küstenschelf hinzu, bevor der Meeresboden auf volle Tiefe abfällt, statt eines gleichmäßigen Hangs."
    en: "Adds a shallow coastal shelf before the seabed drops to full depth, instead of a smooth slope."
    es: "Añade una plataforma costera poco profunda antes de que el lecho marino caiga a la profundidad total, en lugar de una pendiente suave."
    fr: "Ajoute un plateau côtier peu profond avant que le fond marin ne plonge à pleine profondeur, au lieu d'une pente régulière."
    it: "Aggiunge una piattaforma costiera poco profonda prima che il fondale scenda alla profondità massima, invece di un pendio uniforme."
    ja: "海底が完全な深さまで落ち込む前に、なだらかな斜面の代わりに浅い沿岸棚を追加します。"
    ko: "해저가 완전한 깊이로 떨어지기 전에 완만한 경사 대신 얕은 연안 대륙붕을 추가합니다."
    "pt-BR": "Adiciona uma plataforma costeira rasa antes de o leito marinho cair para a profundidade total, em vez de uma encosta suave."
    ru: "Добавляет мелководный прибрежный шельф перед тем, как морское дно резко уходит на полную глубину, вместо плавного склона."
    zh: "在海床降至最大深度之前，加入一段浅水的沿岸陆架，而不是平滑的斜坡。"
    "zh-TW": "在海床降至最大深度之前，加入一段淺水的沿岸陸棚，而不是平滑的斜坡。"
  shelf_depth_tooltip:
    de: "Wie tief der Kontinentalschelf liegt, als Anteil der maximalen Tiefe."
    en: "How deep the continental shelf sits, as a fraction of the maximum depth."
    es: "Cuán profunda está la plataforma continental, como fracción de la profundidad máxima."
    fr: "À quelle profondeur se trouve le plateau continental, en fraction de la profondeur maximale."
    it: "Quanto è profonda la piattaforma continentale, come frazione della profondità massima."
    ja: "大陸棚がどれだけ深い位置にあるかを、最大深度に対する割合で表します。"
    ko: "대륙붕이 얼마나 깊은 곳에 있는지를 최대 수심에 대한 비율로 나타냅니다."
    "pt-BR": "Quão profunda está a plataforma continental, como fração da profundidade máxima."
    ru: "Насколько глубоко залегает континентальный шельф, в долях от максимальной глубины."
    zh: "大陆架所在的深度，以最大深度的比例表示。"
    "zh-TW": "大陸棚所在的深度，以最大深度的比例表示。"
  shelf_sharpness_tooltip:
    de: "Wie abrupt der Meeresboden am Schelfrand abfällt – höhere Werte erzeugen einen schärferen Abfall."
    en: "How abruptly the seabed steps down at the shelf's edge — higher values make a sharper drop-off."
    es: "Con qué brusquedad desciende el lecho marino en el borde de la plataforma; valores más altos producen una caída más pronunciada."
    fr: "À quel point le fond marin descend brusquement au bord du plateau ; des valeurs plus élevées créent une chute plus abrupte."
    it: "Quanto bruscamente il fondale scende al bordo della piattaforma: valori più alti creano un dislivello più netto."
    ja: "棚の縁で海底がどれだけ急激に落ち込むかです。値が高いほど、より急な落差になります。"
    ko: "대륙붕 가장자리에서 해저가 얼마나 급격하게 떨어지는지를 나타냅니다. 값이 높을수록 더 가파르게 떨어집니다."
    "pt-BR": "Quão abruptamente o leito marinho desce na borda da plataforma — valores mais altos criam uma queda mais acentuada."
    ru: "Насколько резко морское дно обрывается на краю шельфа — при более высоких значениях перепад становится круче."
    zh: "海床在陆架边缘骤降的陡峭程度——数值越高，落差越陡峭。"
    "zh-TW": "海床在陸棚邊緣驟降的陡峭程度——數值越高，落差越陡峭。"
  plains_enabled_tooltip:
    de: "Ebnet Teile des Landes zu bebaubaren Ebenen, statt alles zerklüftet zu belassen."
    en: "Flattens parts of the land into buildable plains instead of leaving it all rugged."
    es: "Aplana partes del terreno en llanuras edificables en lugar de dejarlo todo escarpado."
    fr: "Aplatit certaines parties du terrain en plaines constructibles au lieu de tout laisser accidenté."
    it: "Appiattisce parti del terreno in pianure edificabili invece di lasciarlo tutto accidentato."
    ja: "土地の一部を、すべて起伏のあるままにする代わりに、建設可能な平原に均します。"
    ko: "지형 전체를 험준하게 두는 대신 일부를 건설 가능한 평원으로 평탄화합니다."
    "pt-BR": "Achata partes do terreno em planícies edificáveis, em vez de deixar tudo acidentado."
    ru: "Выравнивает часть суши в пригодные для застройки равнины вместо того, чтобы оставлять весь рельеф неровным."
    zh: "将部分陆地压平为可建造的平原，而不是让整片地形都保持崎岖。"
    "zh-TW": "將部分陸地壓平為可建造的平原，而不是讓整片地形都保持崎嶇。"
  plains_flatness_tooltip:
    de: "Wie stark Ebenen eingeebnet werden – höhere Werte ergeben flacheren, ebeneren Boden."
    en: "How strongly plains are flattened — higher values make flatter, more level ground."
    es: "Con qué fuerza se aplanan las llanuras; valores más altos producen un terreno más llano y nivelado."
    fr: "À quel point les plaines sont aplaties ; des valeurs plus élevées donnent un sol plus plat et plus régulier."
    it: "Quanto vengono appiattite le pianure: valori più alti danno un terreno più piatto e livellato."
    ja: "平原がどれだけ強く平坦化されるかです。値が高いほど、より平らで均一な地面になります。"
    ko: "평원이 얼마나 강하게 평탄화되는지를 나타냅니다. 값이 높을수록 더 평평하고 고른 지면이 됩니다."
    "pt-BR": "Com que força as planícies são achatadas — valores mais altos criam um solo mais plano e nivelado."
    ru: "Насколько сильно выравниваются равнины — при более высоких значениях поверхность становится более плоской и ровной."
    zh: "平原被压平的强度——数值越高，地面越平坦、越水平。"
    "zh-TW": "平原被壓平的強度——數值越高，地面越平坦、越水平。"
  plains_threshold_tooltip:
    de: "Wie viel Höhenschwankung noch als nah genug gilt, um zu einer Ebene eingeebnet zu werden."
    en: "How much elevation variation still counts as close enough to flatten into a plain."
    es: "Cuánta variación de elevación aún se considera lo bastante cercana para aplanarse en una llanura."
    fr: "Quelle variation d'altitude est encore considérée comme assez proche pour être aplatie en plaine."
    it: "Quanta variazione di altitudine è ancora considerata abbastanza vicina da essere appiattita in una pianura."
    ja: "平原として均されるとみなされる、許容される標高差の大きさです。"
    ko: "평원으로 평탄화될 만큼 충분히 가깝다고 판단되는 고도 변화의 범위입니다."
    "pt-BR": "Quanta variação de elevação ainda é considerada próxima o suficiente para ser achatada em uma planície."
    ru: "Насколько большой перепад высот всё ещё считается достаточно близким, чтобы быть выровненным в равнину."
    zh: "多大的高度差异仍会被视为足够接近，从而被压平为平原。"
    "zh-TW": "多大的高度差異仍會被視為足夠接近，從而被壓平為平原。"
  plains_feature_size_tooltip:
    de: "Ungefähre Größe einer einzelnen flachen Ebenenregion."
    en: "Approximate size of a single flat plains region."
    es: "Tamaño aproximado de una sola región llana."
    fr: "Taille approximative d'une seule région de plaine plate."
    it: "Dimensione approssimativa di una singola regione pianeggiante."
    ja: "1つの平坦な平原地域のおおよその大きさです。"
    ko: "하나의 평탄한 평원 지역의 대략적인 크기입니다."
    "pt-BR": "Tamanho aproximado de uma única região plana de planície."
    ru: "Приблизительный размер одного равнинного участка."
    zh: "单个平坦平原区域的大致大小。"
    "zh-TW": "單一平坦平原區域的大致大小。"
  plains_octaves_tooltip:
    de: "Wie viele Rauschebenen die Ebenenregionen formen – weniger Oktaven halten sie glatter."
    en: "How many noise layers shape the plains regions — fewer octaves keep them smoother."
    es: "Cuántas capas de ruido dan forma a las regiones de llanura; menos octavas las mantienen más suaves."
    fr: "Combien de couches de bruit façonnent les régions de plaine ; moins d'octaves les gardent plus lisses."
    it: "Quanti livelli di rumore modellano le regioni pianeggianti: meno ottave le mantengono più uniformi."
    ja: "平原地域を形作るノイズレイヤーの数です。オクターブが少ないほど、より滑らかになります。"
    ko: "평원 지역을 형성하는 노이즈 레이어의 수입니다. 옥타브가 적을수록 더 매끄럽게 유지됩니다."
    "pt-BR": "Quantas camadas de ruído moldam as regiões de planície — menos oitavas as mantêm mais suaves."
    ru: "Сколько слоёв шума формируют равнинные участки — чем меньше октав, тем более гладкими они остаются."
    zh: "塑造平原区域的噪声层数——八度越少，地面越平滑。"
    "zh-TW": "塑造平原區域的噪訊層數——八度越少，地面越平滑。"
  plains_lacunarity_tooltip:
    de: "Frequenzschritt zwischen den Detailebenen der Ebenen – höhere Werte bedeuten feinere Ebenen."
    en: "Frequency step between plains detail layers — higher means each layer is finer."
    es: "Salto de frecuencia entre las capas de detalle de las llanuras; un valor más alto hace que cada capa sea más fina."
    fr: "Pas de fréquence entre les couches de détail des plaines ; une valeur plus élevée rend chaque couche plus fine."
    it: "Salto di frequenza tra i livelli di dettaglio delle pianure: valori più alti rendono ogni livello più fine."
    ja: "平原の詳細レイヤー間の周波数の増加率です。値が高いほど各レイヤーが細かくなります。"
    ko: "평원 디테일 레이어 간의 주파수 증가율입니다. 값이 높을수록 각 레이어가 더 미세해집니다."
    "pt-BR": "Salto de frequência entre as camadas de detalhe da planície — valores mais altos tornam cada camada mais fina."
    ru: "Шаг частоты между слоями детализации равнин — чем выше значение, тем тоньше каждый слой."
    zh: "平原细节层之间的频率倍增幅度——数值越高，每层越精细。"
    "zh-TW": "平原細節層之間的頻率倍增幅度——數值越高，每層越精細。"
  plains_persistence_tooltip:
    de: "Wie stark jede feinere Ebenenlage durchscheint – höhere Werte fügen unregelmäßigere Ränder hinzu."
    en: "How strongly each finer plains layer shows through — higher values add more irregular edges."
    es: "Con qué fuerza se nota cada capa más fina de las llanuras; valores más altos añaden bordes más irregulares."
    fr: "À quel point chaque couche plus fine des plaines transparaît ; des valeurs plus élevées ajoutent des bords plus irréguliers."
    it: "Quanto risalta ogni livello più fine delle pianure: valori più alti aggiungono bordi più irregolari."
    ja: "平原のより細かいレイヤーがどれだけ強く反映されるかです。値が高いほど、より不規則な縁になります。"
    ko: "평원의 더 미세한 레이어가 얼마나 강하게 반영되는지를 나타냅니다. 값이 높을수록 경계가 더 불규칙해집니다."
    "pt-BR": "Com que força cada camada mais fina da planície aparece — valores mais altos adicionam bordas mais irregulares."
    ru: "Насколько сильно проявляется каждый более тонкий слой равнин — при более высоких значениях края становятся более неровными."
    zh: "平原每一层更精细的细节透显出来的强度——数值越高，边缘越不规则。"
    "zh-TW": "平原每一層更精細的細節透顯出來的強度——數值越高，邊緣越不規則。"
  erosion_enabled_tooltip:
    de: "Schnitzt Schlucht- und Rinnendetails in Hänge, statt sie glatt zu lassen."
    en: "Carves gully and channel detail into slopes instead of leaving them smooth."
    es: "Talla detalles de barrancos y canales en las pendientes en lugar de dejarlas lisas."
    fr: "Creuse des détails de ravines et de chenaux dans les pentes au lieu de les laisser lisses."
    it: "Scolpisce dettagli di calanchi e canali nei pendii invece di lasciarli lisci."
    ja: "斜面を滑らかなままにする代わりに、渓谷や水路の詳細を刻み込みます。"
    ko: "경사면을 매끄럽게 두는 대신 협곡과 물길의 디테일을 새깁니다."
    "pt-BR": "Esculpe detalhes de ravinas e canais nas encostas, em vez de deixá-las lisas."
    ru: "Прорезает на склонах промоины и русла вместо того, чтобы оставлять их гладкими."
    zh: "在斜坡上雕刻出沟壑与水道的细节，而不是让斜坡保持光滑。"
    "zh-TW": "在斜坡上雕刻出溝壑與水道的細節，而不是讓斜坡保持光滑。"
  erosion_strength_tooltip:
    de: "Wie tief die Erosion sich ins Gelände gräbt – höhere Werte schneiden dramatischere Rinnen."
    en: "How deeply erosion carves into the terrain — higher values cut more dramatic channels."
    es: "Cuán profundamente la erosión talla el terreno; valores más altos crean canales más dramáticos."
    fr: "À quelle profondeur l'érosion creuse le terrain ; des valeurs plus élevées taillent des chenaux plus marqués."
    it: "Quanto in profondità l'erosione scolpisce il terreno: valori più alti creano canali più marcati."
    ja: "侵食が地形をどれだけ深く刻むかです。値が高いほど、より劇的な水路が刻まれます。"
    ko: "침식이 지형을 얼마나 깊이 깎아내는지를 나타냅니다. 값이 높을수록 더 극적인 물길이 생깁니다."
    "pt-BR": "Quão profundamente a erosão esculpe o terreno — valores mais altos criam canais mais dramáticos."
    ru: "Насколько глубоко эрозия врезается в рельеф — при более высоких значениях получаются более выразительные русла."
    zh: "侵蚀切入地形的深度——数值越高，切割出的水道越显著。"
    "zh-TW": "侵蝕切入地形的深度——數值越高，切割出的水道越顯著。"
  erosion_octaves_tooltip:
    de: "Wie viele Erosions-Detailebenen kombiniert werden, von groben Rinnen bis zu feinen Schluchten."
    en: "How many erosion detail layers are combined, from coarse channels to fine gullies."
    es: "Cuántas capas de detalle de erosión se combinan, desde canales gruesos hasta barrancos finos."
    fr: "Combien de couches de détail d'érosion sont combinées, des chenaux grossiers aux ravines fines."
    it: "Quanti livelli di dettaglio dell'erosione vengono combinati, da canali grossolani a calanchi sottili."
    ja: "粗い水路から細かい渓谷まで、組み合わされる侵食の詳細レイヤーの数です。"
    ko: "거친 물길부터 미세한 협곡까지, 결합되는 침식 디테일 레이어의 수입니다."
    "pt-BR": "Quantas camadas de detalhe de erosão são combinadas, de canais grosseiros a ravinas finas."
    ru: "Сколько слоёв детализации эрозии объединяется — от грубых русел до тонких промоин."
    zh: "叠加的侵蚀细节层数，从粗糙的水道到精细的沟壑。"
    "zh-TW": "疊加的侵蝕細節層數，從粗糙的水道到精細的溝壑。"
  erosion_world_scale_tooltip:
    de: "Reale Größe des Erosionsschluchtmusters – größere Werte erzeugen größere Rinnen."
    en: "Real-world size of the erosion gully pattern — larger values create bigger channels."
    es: "Tamaño real del patrón de barrancos de erosión; valores más altos crean canales más grandes."
    fr: "Taille réelle du motif de ravines d'érosion ; des valeurs plus élevées créent des chenaux plus grands."
    it: "Dimensione reale del pattern dei calanchi d'erosione: valori più alti creano canali più grandi."
    ja: "侵食渓谷パターンの実世界での大きさです。値が大きいほど、より大きな水路が生まれます。"
    ko: "침식 협곡 패턴의 실제 크기입니다. 값이 클수록 더 큰 물길이 만들어집니다."
    "pt-BR": "Tamanho real do padrão de ravinas de erosão — valores maiores criam canais maiores."
    ru: "Реальный мировой размер узора эрозионных промоин — при больших значениях получаются более крупные русла."
    zh: "侵蚀沟壑图案在实际世界中的大小——数值越大，水道越大。"
    "zh-TW": "侵蝕溝壑圖案在實際世界中的大小——數值越大，水道越大。"
  erosion_scale_tooltip:
    de: "Interne Körnung des Erosionsmusters, bevor sie auf reale Entfernungen abgebildet wird."
    en: "Internal grain size of the erosion pattern, before it's mapped onto real-world distances."
    es: "Tamaño de grano interno del patrón de erosión, antes de mapearse a distancias del mundo real."
    fr: "Granulométrie interne du motif d'érosion, avant sa mise à l'échelle sur des distances réelles."
    it: "Grana interna del pattern di erosione, prima che venga mappata su distanze reali."
    ja: "実世界の距離に対応付けられる前の、侵食パターンの内部的な粒度です。"
    ko: "실제 거리로 매핑되기 전, 침식 패턴의 내부적인 결 크기입니다."
    "pt-BR": "Granulação interna do padrão de erosão, antes de ser mapeada para distâncias reais."
    ru: "Внутренняя зернистость узора эрозии до того, как она сопоставляется с реальными расстояниями."
    zh: "侵蚀图案在映射到实际世界距离之前的内部颗粒尺度。"
    "zh-TW": "侵蝕圖案在映射到實際世界距離之前的內部顆粒尺度。"
  erosion_cell_scale_tooltip:
    de: "Form der einzelnen Schluchtzellen – unter 1 wirkt körnig, über 1 wirkt kurviger."
    en: "Shape of individual gully cells — below 1 looks grainy, above 1 looks curvier."
    es: "Forma de las celdas individuales de los barrancos; por debajo de 1 se ve granulado, por encima de 1 se ve más curvo."
    fr: "Forme des cellules individuelles de ravines ; en dessous de 1, l'aspect est granuleux, au-dessus de 1, plus sinueux."
    it: "Forma delle singole celle dei calanchi: sotto 1 appare granulosa, sopra 1 appare più curva."
    ja: "個々の渓谷セルの形状です。1未満だと粒状に、1を超えると曲線的に見えます。"
    ko: "개별 협곡 셀의 형태입니다. 1 미만이면 알갱이처럼 보이고, 1을 초과하면 더 구불구불해 보입니다."
    "pt-BR": "Formato das células individuais das ravinas — abaixo de 1 parece granulado, acima de 1 parece mais sinuoso."
    ru: "Форма отдельных ячеек промоин — при значениях ниже 1 узор выглядит зернистым, выше 1 — более извилистым."
    zh: "单个沟壑单元的形状——小于1时呈颗粒状，大于1时更显弯曲。"
    "zh-TW": "單一溝壑單元的形狀——小於1時呈顆粒狀，大於1時更顯彎曲。"
  erosion_gully_weight_tooltip:
    de: "Wie stark die Erosion Schluchtrinnen in Hänge schnitzt."
    en: "How strongly erosion carves gully channels into slopes."
    es: "Con qué fuerza la erosión talla canales de barranco en las pendientes."
    fr: "À quel point l'érosion creuse des chenaux de ravine dans les pentes."
    it: "Quanto intensamente l'erosione scolpisce canali di calanco nei pendii."
    ja: "侵食が斜面に渓谷の水路をどれだけ強く刻むかです。"
    ko: "침식이 경사면에 협곡 물길을 얼마나 강하게 새기는지를 나타냅니다."
    "pt-BR": "Com que força a erosão esculpe canais de ravina nas encostas."
    ru: "Насколько сильно эрозия прорезает русла промоин на склонах."
    zh: "侵蚀在斜坡上刻画沟壑水道的强度。"
    "zh-TW": "侵蝕在斜坡上刻畫溝壑水道的強度。"
  erosion_detail_tooltip:
    de: "Wie weit sich feines Schluchtdetail auf flacheren Boden ausbreitet."
    en: "How far fine gully detail spreads onto flatter ground."
    es: "Hasta dónde se extiende el detalle fino de los barrancos hacia el terreno más llano."
    fr: "Jusqu'où le détail fin des ravines s'étend sur un sol plus plat."
    it: "Fino a che punto il dettaglio fine dei calanchi si estende sul terreno più pianeggiante."
    ja: "細かい渓谷の詳細が、より平坦な地面にどこまで広がるかです。"
    ko: "미세한 협곡 디테일이 더 평탄한 지면까지 얼마나 넓게 퍼지는지를 나타냅니다."
    "pt-BR": "Até onde o detalhe fino das ravinas se espalha sobre o terreno mais plano."
    ru: "Насколько далеко тонкая детализация промоин распространяется на более ровные участки."
    zh: "精细沟壑细节向更平坦地面扩散的程度。"
    "zh-TW": "精細溝壑細節向更平坦地面擴散的程度。"
  erosion_lacunarity_tooltip:
    de: "Frequenzschritt zwischen den Erosions-Detailebenen – höhere Werte bedeuten feinere Ebenen."
    en: "Frequency step between erosion detail layers — higher means each layer is finer."
    es: "Salto de frecuencia entre las capas de detalle de erosión; un valor más alto hace que cada capa sea más fina."
    fr: "Pas de fréquence entre les couches de détail d'érosion ; une valeur plus élevée rend chaque couche plus fine."
    it: "Salto di frequenza tra i livelli di dettaglio dell'erosione: valori più alti rendono ogni livello più fine."
    ja: "侵食の詳細レイヤー間の周波数の増加率です。値が高いほど各レイヤーが細かくなります。"
    ko: "침식 디테일 레이어 간의 주파수 증가율입니다. 값이 높을수록 각 레이어가 더 미세해집니다."
    "pt-BR": "Salto de frequência entre as camadas de detalhe de erosão — valores mais altos tornam cada camada mais fina."
    ru: "Шаг частоты между слоями детализации эрозии — чем выше значение, тем тоньше каждый слой."
    zh: "侵蚀细节层之间的频率倍增幅度——数值越高，每层越精细。"
    "zh-TW": "侵蝕細節層之間的頻率倍增幅度——數值越高，每層越精細。"
  erosion_gain_tooltip:
    de: "Wie stark jede feinere Erosionsebene durchscheint – höhere Werte fügen zerklüftetere Kleindetails hinzu."
    en: "How strongly each finer erosion layer shows through — higher values add more jagged small-scale detail."
    es: "Con qué fuerza se nota cada capa más fina de erosión; valores más altos añaden detalle a pequeña escala más dentado."
    fr: "À quel point chaque couche d'érosion plus fine transparaît ; des valeurs plus élevées ajoutent un détail à petite échelle plus déchiqueté."
    it: "Quanto risalta ogni livello di erosione più fine: valori più alti aggiungono dettagli su piccola scala più frastagliati."
    ja: "より細かい侵食レイヤーがどれだけ強く反映されるかです。値が高いほど、より鋭くギザギザした細部が加わります。"
    ko: "더 미세한 침식 레이어가 얼마나 강하게 반영되는지를 나타냅니다. 값이 높을수록 더 들쭉날쭉한 세부 디테일이 추가됩니다."
    "pt-BR": "Com que força cada camada mais fina de erosão aparece — valores mais altos adicionam detalhe irregular em pequena escala."
    ru: "Насколько сильно проявляется каждый более тонкий слой эрозии — при более высоких значениях добавляется больше мелкой зубчатой детализации."
    zh: "每一层更精细的侵蚀细节透显出来的强度——数值越高，小尺度的锯齿细节越多。"
    "zh-TW": "每一層更精細的侵蝕細節透顯出來的強度——數值越高，小尺度的鋸齒細節越多。"
  erosion_normalization_tooltip:
    de: "Wie einheitlich definiert die Schluchtlinien sind – höhere Werte ergeben klarere Rinnen, niedrigere Werte verblassen unregelmäßiger."
    en: "How consistently defined the gully lines are — higher values produce cleaner channels, lower values fade more irregularly."
    es: "Con qué consistencia están definidas las líneas de los barrancos; valores más altos producen canales más nítidos, valores más bajos se difuminan de forma más irregular."
    fr: "À quel point les lignes de ravines sont définies de manière cohérente ; des valeurs plus élevées produisent des chenaux plus nets, des valeurs plus faibles s'estompent de façon plus irrégulière."
    it: "Quanto sono definite in modo uniforme le linee dei calanchi: valori più alti producono canali più netti, valori più bassi sfumano in modo più irregolare."
    ja: "渓谷の筋がどれだけ一貫して明確に定義されるかです。値が高いほど水路がくっきりし、値が低いほど不規則にぼやけます。"
    ko: "협곡 선이 얼마나 일관되게 정의되는지를 나타냅니다. 값이 높을수록 물길이 더 선명해지고, 값이 낮을수록 더 불규칙하게 흐려집니다."
    "pt-BR": "Quão consistentemente definidas são as linhas das ravinas — valores mais altos produzem canais mais nítidos, valores mais baixos desaparecem de forma mais irregular."
    ru: "Насколько чётко и последовательно определены линии промоин — при более высоких значениях русла получаются чище, при более низких — более неравномерно размытыми."
    zh: "沟壑纹理定义的一致程度——数值越高，水道越清晰；数值越低，边缘消退得越不规则。"
    "zh-TW": "溝壑紋理定義的一致程度——數值越高，水道越清晰；數值越低，邊緣消退得越不規則。"
  erosion_fade_ref_tooltip:
    de: "Höhe, bei der die Erosion ihre volle Stärke erreicht – niedrigere Werte lassen sie sich näher am Meeresspiegel voll entfalten."
    en: "Elevation at which erosion reaches full strength — lower values let it fully develop closer to sea level."
    es: "Elevación a la que la erosión alcanza su máxima intensidad; valores más bajos permiten que se desarrolle por completo más cerca del nivel del mar."
    fr: "Altitude à laquelle l'érosion atteint sa pleine intensité ; des valeurs plus faibles lui permettent de se développer pleinement plus près du niveau de la mer."
    it: "Altitudine alla quale l'erosione raggiunge la massima intensità: valori più bassi le permettono di svilupparsi pienamente più vicino al livello del mare."
    ja: "侵食が最大の強さに達する標高です。値が低いほど、より海面に近い場所で十分に発達します。"
    ko: "침식이 최대 강도에 도달하는 고도입니다. 값이 낮을수록 해수면에 더 가까운 곳에서 완전히 발달합니다."
    "pt-BR": "Elevação na qual a erosão atinge força total — valores menores permitem que se desenvolva completamente mais perto do nível do mar."
    ru: "Высота, на которой эрозия достигает полной силы — при более низких значениях она полностью проявляется ближе к уровню моря."
    zh: "侵蚀达到最大强度时的海拔——数值越低，侵蚀越能在更接近海平面处充分发展。"
    "zh-TW": "侵蝕達到最大強度時的海拔——數值越低，侵蝕越能在更接近海平面處充分發展。"
