  regrant_note:
    de: "Das Zurücksetzen eines statistikgebundenen Erfolgs wird sofort rückgängig gemacht, solange die zugehörige Lebenszeitstatistik über dem Schwellenwert liegt."
    en: "Clearing a stat-linked achievement is undone immediately while its lifetime stat is above the threshold."
    es: "Borrar un logro vinculado a estadísticas se deshace de inmediato mientras su estadística de por vida esté por encima del umbral."
    fr: "La réinitialisation d'un succès lié à une statistique est annulée immédiatement tant que sa statistique cumulée reste au-dessus du seuil."
    it: "L'azzeramento di un obiettivo collegato a una statistica viene annullato immediatamente finché la statistica a vita resta sopra la soglia."
    ja: "統計連動の実績をクリアしても、生涯統計がしきい値を超えている間は即座に再取得されます。"
    ko: "통계 연동 업적을 초기화해도 누적 통계가 임계값을 초과하는 동안에는 즉시 재획득됩니다."
    "pt-BR": "Limpar uma conquista vinculada a estatística é desfeito imediatamente enquanto a estatística vitalícia estiver acima do limite."
    ru: "Сброс достижения, связанного со статистикой, немедленно отменяется, пока значение статистики за всё время превышает порог."
    zh: "清除与统计关联的成就后，只要其累计统计值仍高于阈值，就会立即被重新解锁。"
    "zh-TW": "清除與統計關聯的成就後，只要其累計統計值仍高於閾值，就會立即被重新解鎖。"
