  speed_override_negotiated:
    de: "Geschwindigkeit folgt dem langsamsten Kommandeur. Klicken, um zu überschreiben und Ihre Geschwindigkeit allen Spielern aufzuzwingen."
    en: "Speed follows the slowest commander. Click to override and force your speed on all players."
    es: "La velocidad sigue al comandante más lento. Haz clic para anular e imponer tu velocidad a todos los jugadores."
    fr: "La vitesse suit le commandant le plus lent. Cliquez pour outrepasser et imposer votre vitesse à tous les joueurs."
    it: "La velocità segue il comandante più lento. Fai clic per forzare la tua velocità su tutti i giocatori."
    ja: "速度は最も遅い指揮官に従います。クリックして上書きし、全プレイヤーに自分の速度を強制します。"
    ko: "속도가 가장 느린 지휘관을 따릅니다. 클릭하면 무시하고 모든 플레이어에게 자신의 속도를 강제합니다."
    "pt-BR": "A velocidade segue o comandante mais lento. Clique para sobrepor e impor sua velocidade a todos os jogadores."
    ru: "Скорость следует за самым медленным командиром. Нажмите, чтобы переопределить и навязать свою скорость всем игрокам."
    zh: "速度跟随最慢的指挥官。点击以覆盖并将你的速度强制应用于所有玩家。"
    "zh-TW": "速度跟隨最慢的指揮官。點擊以覆寫並將你的速度強制套用於所有玩家。"
  speed_override_forced:
    de: "Überschreibung aktiv: Ihre Geschwindigkeit wird allen Spielern aufgezwungen. Klicken, um wieder dem langsamsten Kommandeur zu folgen."
    en: "Override active: your speed is forced on all players. Click to follow the slowest commander again."
    es: "Anulación activa: tu velocidad se impone a todos los jugadores. Haz clic para volver a seguir al comandante más lento."
    fr: "Outrepassement actif : votre vitesse est imposée à tous les joueurs. Cliquez pour suivre à nouveau le commandant le plus lent."
    it: "Forzatura attiva: la tua velocità è imposta a tutti i giocatori. Fai clic per seguire di nuovo il comandante più lento."
    ja: "上書き有効：自分の速度が全プレイヤーに強制されています。クリックすると再び最も遅い指揮官に従います。"
    ko: "무시 활성：자신의 속도가 모든 플레이어에게 강제됩니다. 클릭하면 다시 가장 느린 지휘관을 따릅니다."
    "pt-BR": "Sobreposição ativa: sua velocidade é imposta a todos os jogadores. Clique para seguir o comandante mais lento novamente."
    ru: "Переопределение активно: ваша скорость навязана всем игрокам. Нажмите, чтобы снова следовать за самым медленным командиром."
    zh: "覆盖已启用：你的速度被强制应用于所有玩家。点击以重新跟随最慢的指挥官。"
    "zh-TW": "覆寫已啟用：你的速度被強制套用於所有玩家。點擊以重新跟隨最慢的指揮官。"
