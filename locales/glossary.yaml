      en: "Position: map coordinates of the unit."
      es: "Posición: coordenadas de la unidad en el mapa."
      fr: "Position : coordonnées de l'unité sur la carte."
      it: "Posizione: coordinate dell'unità sulla mappa."
      ja: "ユニットの地図座標。"
      ko: "유닛의 지도 좌표."
