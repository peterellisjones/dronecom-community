_version: 2

# Terse C2-console data labels and their glossary explanations (DC-1124.4).
#
# Every abbreviated label rendered in a panel MUST pair its `label` key with
# its `tooltip` key — the tooltip is the accessibility layer that makes the
# abbreviation acceptable. Non-English locales use their own naval/military
# abbreviation conventions, not transliterated English ones; CJK locales use
# native terse terms (no Latin abbreviation) except where the NATO term (TN)
# is standard interop vocabulary.
glossary:
  # #2896: shared "hold Shift for details" footer inviting the player to reveal
  # per-row explanations in the rich vehicle/contact/group/sensor tooltips.
  shift_hint:
    de: "Umschalttaste für Erläuterungen halten."
    en: "Hold Shift for details."
    es: "Mantén Mayús para ver detalles."
    fr: "Maintenez Maj pour les détails."
    it: "Tieni premuto Maiusc per i dettagli."
    ja: "Shiftキーを押し続けると詳細を表示。"
    ko: "Shift 키를 누르고 있으면 상세 설명이 표시됩니다."
    "pt-BR": "Segure Shift para ver detalhes."
    ru: "Удерживайте Shift для подробностей."
    zh: "按住 Shift 键查看详情。"
    "zh-TW": "按住 Shift 鍵查看詳情。"
  pos:
    label:
      de: "POS"
      en: "POS"
