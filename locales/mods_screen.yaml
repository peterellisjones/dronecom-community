    de: "Keine Mods gefunden. Füge einen Mod-Ordner zu deinem Mods-Verzeichnis hinzu oder abonniere einen im Workshop und wähle dann ERNEUT PRÜFEN."
    en: "No mods found. Add a mod folder to your mods directory or subscribe to one on the Workshop, then RE-CHECK."
    es: "No se encontraron mods. Añade una carpeta de mod a tu directorio de mods o suscríbete a uno en el Workshop y luego pulsa RE-VERIFICAR."
    fr: "Aucun mod trouvé. Ajoutez un dossier de mod à votre répertoire de mods ou abonnez-vous à un mod sur le Workshop, puis choisissez RE-VÉRIFIER."
    it: "Nessuna mod trovata. Aggiungi una cartella mod alla tua directory delle mod o iscriviti a una sul Workshop, poi premi RICONTROLLA."
    ja: "MODが見つかりません。MODフォルダーをMODディレクトリに追加するか、ワークショップで購読してから再チェックを選択してください。"
    ko: "모드를 찾을 수 없습니다. 모드 폴더를 모드 디렉터리에 추가하거나 워크숍에서 구독한 다음 다시 확인을 누르세요."
    "pt-BR": "Nenhum mod encontrado. Adicione uma pasta de mod ao seu diretório de mods ou inscreva-se em um na Workshop e depois use REVERIFICAR."
    ru: "Моды не найдены. Добавьте папку мода в каталог модов или подпишитесь на мод в мастерской, затем нажмите ПЕРЕПРОВЕРИТЬ."
    zh: "未找到模组。请将模组文件夹添加到模组目录，或在创意工坊订阅一个，然后重新检查。"
    "zh-TW": "找不到模組。請將模組資料夾加入模組目錄，或在創意工坊訂閱一個，然後重新檢查。"
  row_select_tooltip:
    de: "Wähle diese Mod aus, um ihre Inhalte und Ladediagnosen im Detailbereich zu prüfen."
    en: "Select this mod to inspect its contents and load diagnostics in the detail pane."
    es: "Selecciona este mod para inspeccionar su contenido y diagnósticos de carga en el panel de detalles."
    fr: "Sélectionnez ce mod pour examiner son contenu et ses diagnostics de chargement dans le volet de détails."
    it: "Seleziona questa mod per esaminarne i contenuti e le diagnostiche di caricamento nel pannello dei dettagli."
    ja: "このMODを選択すると、詳細パネルで内容と読み込み診断を確認できます。"
    ko: "이 모드를 선택하면 세부 정보 창에서 콘텐츠와 로드 진단을 확인할 수 있습니다."
    "pt-BR": "Selecione este mod para inspecionar seu conteúdo e diagnósticos de carga no painel de detalhes."
    ru: "Выберите этот мод, чтобы просмотреть его содержимое и диагностику загрузки на панели сведений."
    zh: "选择此模组可在详情面板中查看其内容和加载诊断。"
    "zh-TW": "選擇此模組可在詳細資訊面板中查看其內容和載入診斷。"
  source_tooltip:
    de: "Woher diese Mod stammt: LOKAL ist ein Ordner in deinem Mods-Verzeichnis; WORKSHOP ist ein abonniertes Element."
    en: "Where this mod came from: LOCAL is a folder in your mods directory; WORKSHOP is a subscribed item."
    es: "De dónde procede este mod: LOCAL es una carpeta en tu directorio de mods; WORKSHOP es un elemento suscrito."
    fr: "Provenance de ce mod : LOCAL est un dossier de votre répertoire de mods ; WORKSHOP est un élément abonné."
    it: "Da dove proviene questa mod: LOCALE è una cartella nella tua directory delle mod; WORKSHOP è un elemento sottoscritto."
    ja: "このMODの出所：ローカルはMODディレクトリ内のフォルダー、ワークショップは購読済みアイテムです。"
    ko: "이 모드의 출처: 로컬은 모드 디렉터리의 폴더이고, 워크숍은 구독한 항목입니다."
    "pt-BR": "De onde este mod veio: LOCAL é uma pasta no seu diretório de mods; WORKSHOP é um item inscrito."
    ru: "Откуда взят этот мод: ЛОКАЛЬНЫЙ — папка в каталоге модов; МАСТЕРСКАЯ — подписанный элемент."
    zh: "此模组的来源：本地是模组目录中的文件夹；创意工坊是已订阅的项目。"
    "zh-TW": "此模組的來源：本機是模組目錄中的資料夾；創意工坊是已訂閱的項目。"
  view_page_tooltip:
    de: "Öffnet die Steam-Workshop-Seite dieses Elements im Overlay."
    en: "Open this item's Steam Workshop page in the overlay."
    es: "Abre la página de Steam Workshop de este elemento en la superposición."
    fr: "Ouvre la page Steam Workshop de cet élément dans la surcouche."
    it: "Apre la pagina di Steam Workshop di questo elemento nell'overlay."
    ja: "このアイテムのSteamワークショップページをオーバーレイで開きます。"
    ko: "이 항목의 Steam 창작마당 페이지를 오버레이로 엽니다."
    "pt-BR": "Abre a página da Steam Workshop deste item na sobreposição."
    ru: "Открывает страницу этого элемента в мастерской Steam через оверлей."
    zh: "在覆盖层中打开该项目的 Steam 创意工坊页面。"
    "zh-TW": "在覆蓋層中開啟此項目的 Steam 創意工坊頁面。"
  publish_message_tooltip:
    de: "Der rohe Fehlergrund, der von Steam oder dem Mod-Loader gemeldet wurde."
    en: "The raw failure reason reported by Steam or the mod loader."
