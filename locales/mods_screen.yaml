    "zh-TW": "載入器對此檔案的診斷（英文）。"
  error_hint_tooltip:
    de: "Eine fehlende Referenz bedeutet meist, dass eine weitere Mod ebenfalls abonniert werden muss. Lege sie auf der Workshop-Seite als erforderliches Element fest."
    en: "A missing reference usually means another mod must be subscribed too. Set it as a Required Item on the Workshop page."
    es: "Una referencia faltante suele significar que también debe suscribirse otro mod. Configúralo como elemento requerido en la página del Workshop."
    fr: "Une référence manquante signifie généralement qu'un autre mod doit aussi être abonné. Définissez-le comme élément requis sur la page du Workshop."
    it: "Un riferimento mancante di solito significa che occorre iscriversi anche a un'altra mod. Impostala come elemento richiesto nella pagina del Workshop."
    ja: "参照先が見つからない場合、通常は別のMODも購読する必要があります。ワークショップページで必須アイテムに設定してください。"
    ko: "참조 대상이 없으면 보통 다른 모드도 구독해야 한다는 의미입니다. 워크숍 페이지에서 필수 항목으로 설정하세요."
    "pt-BR": "Uma referência ausente geralmente significa que outro mod também precisa ser inscrito. Defina-o como Item Necessário na página da Workshop."
    ru: "Отсутствующая ссылка обычно означает, что нужно подписаться и на другой мод. Укажите его как обязательный элемент на странице мастерской."
    zh: "缺少引用通常意味着还需订阅另一个模组。请在创意工坊页面将其设为必需项目。"
    "zh-TW": "缺少參照通常表示還需訂閱另一個模組。請在創意工坊頁面將其設為必要項目。"
  restart_note_tooltip:
    de: "Mod-Inhalte werden einmalig beim Start übernommen; ERNEUT PRÜFEN aktualisiert nur die Diagnosen."
    en: "Mod content merges once at startup; RE-CHECK refreshes diagnostics only."
    es: "El contenido de los mods se incorpora una vez al iniciar; RE-VERIFICAR solo actualiza los diagnósticos."
    fr: "Le contenu des mods est intégré une fois au démarrage ; RE-VÉRIFIER n'actualise que les diagnostics."
    it: "I contenuti delle mod vengono integrati una volta all'avvio; RICONTROLLA aggiorna solo le diagnostiche."
    ja: "MODの内容は起動時に一度だけ統合されます。再チェックは診断のみを更新します。"
    ko: "모드 콘텐츠는 시작 시 한 번 병합됩니다. 다시 확인은 진단만 새로 고칩니다."
    "pt-BR": "O conteúdo dos mods é incorporado uma vez na inicialização; REVERIFICAR atualiza apenas os diagnósticos."
    ru: "Содержимое модов добавляется один раз при запуске; ПЕРЕПРОВЕРИТЬ обновляет только диагностику."
    zh: "模组内容在启动时合并一次；重新检查仅刷新诊断。"
    "zh-TW": "模組內容在啟動時合併一次；重新檢查僅重新整理診斷。"
