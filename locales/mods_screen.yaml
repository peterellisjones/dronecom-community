    fr: "Le volet de détails affiche l'auteur, la description et les diagnostics par fichier du mod sélectionné."
    it: "Il pannello dei dettagli mostra autore, descrizione e diagnostiche per file della mod selezionata."
    ja: "詳細パネルには、選択したMODの作者、説明、ファイルごとの診断が表示されます。"
    ko: "세부 정보 창에는 선택한 모드의 작성자, 설명, 파일별 진단이 표시됩니다."
    "pt-BR": "O painel de detalhes mostra o autor, a descrição e os diagnósticos por arquivo do mod selecionado."
    ru: "На панели сведений показаны автор, описание и пофайловая диагностика выбранного мода."
    zh: "详情面板显示所选模组的作者、描述和各文件的诊断。"
    "zh-TW": "詳細資訊面板顯示所選模組的作者、描述和各檔案的診斷。"
