    ja: "このファイルに対するローダーの診断（英語）。"
    ko: "이 파일에 대한 로더의 진단(영어)."
    "pt-BR": "O diagnóstico do carregador para este arquivo (em inglês)."
    ru: "Диагностика загрузчика для этого файла (на английском)."
