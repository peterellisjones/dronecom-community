    ja: "Steamまたはmodローダーが報告した生の失敗理由です。"
    ko: "Steam 또는 모드 로더가 보고한 원시 실패 사유입니다."
    "pt-BR": "O motivo bruto da falha relatado pela Steam ou pelo carregador de mods."
    ru: "Необработанная причина ошибки, сообщённая Steam или загрузчиком модов."
    zh: "Steam 或模组加载器报告的原始失败原因。"
    "zh-TW": "Steam 或模組載入器回報的原始失敗原因。"
