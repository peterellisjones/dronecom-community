    es: "Sin contenido cargable: este mod fue rechazado, así que no se incorpora nada al juego."
    fr: "Aucun contenu chargeable : ce mod a été rejeté, rien n'est donc intégré au jeu."
    it: "Nessun contenuto caricabile: questa mod è stata rifiutata, quindi nulla viene integrato nel gioco."
    ja: "読み込める内容がありません。このMODは拒否されたため、ゲームには何も統合されません。"
    ko: "불러올 수 있는 콘텐츠가 없습니다. 이 모드는 거부되어 게임에 아무것도 병합되지 않습니다."
    "pt-BR": "Sem conteúdo carregável: este mod foi rejeitado, então nada é incorporado ao jogo."
