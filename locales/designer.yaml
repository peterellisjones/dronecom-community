    fr: "Surface équivalente radar — l'intensité avec laquelle vous réfléchissez le radar actif ennemi. Un RCS plus élevé signifie une détection à plus longue portée."
    it: "Sezione radar equivalente — quanto rifletti il radar attivo nemico. Un RCS maggiore significa rilevamento a distanza maggiore."
    ja: "レーダー反射断面積（RCS）——敵の能動レーダーへの反射の強さ。RCSが大きいほど、より遠距離で探知される。"
    ko: "레이더 반사 단면적(RCS) — 적의 능동 레이더에 얼마나 강하게 반사되는지를 나타냅니다. RCS가 클수록 더 먼 거리에서 탐지됩니다."
    "pt-BR": "Seção transversal de radar — o quanto você reflete o radar ativo inimigo. Um RCS maior significa detecção a maior distância."
    ru: "Эффективная площадь рассеяния (ЭПР) — насколько сильно вы отражаете активный радар противника. Чем больше ЭПР, тем на большей дальности вас обнаружат."
    zh: "雷达反射截面（RCS）——你对敌方主动雷达的反射强度。RCS越大，被探测到的距离就越远。"
    "zh-TW": "雷達反射截面（RCS）——你對敵方主動雷達的反射強度。RCS越大，被偵測到的距離就越遠。"
  sig_ir:
