  # Section-header glossary tooltip (#2891).
  chart_signature_tooltip:
    de: "Wie leicht dieser Entwurf von jedem Sensortyp erkannt wird. Ein kleineres Polygon bedeutet einen unauffälligeren Entwurf — Achse für Details überfahren."
    en: "How detectable this design is to every sensor type. A smaller polygon means a stealthier design — hover an axis for what it measures."
    es: "Qué tan detectable es este diseño para cada tipo de sensor. Un polígono más pequeño significa un diseño más sigiloso — pase el cursor sobre un eje para ver qué mide."
    fr: "À quel point ce modèle est détectable par chaque type de capteur. Un polygone plus petit signifie un modèle plus discret — survolez un axe pour voir ce qu'il mesure."
    it: "Quanto è rilevabile questo progetto da ogni tipo di sensore. Un poligono più piccolo indica un progetto più furtivo — passa il mouse su un asse per sapere cosa misura."
    ja: "各センサー種別に対するこの設計の被探知しやすさ。多角形が小さいほどステルス性が高い設計を意味する。各軸にカーソルを合わせると測定内容が分かる。"
    ko: "이 설계가 각 센서 유형에 얼마나 쉽게 탐지되는지를 나타냅니다. 다각형이 작을수록 은밀한 설계를 의미합니다 — 축에 마우스를 올리면 측정 항목을 확인할 수 있습니다."
    "pt-BR": "O quão detectável este projeto é para cada tipo de sensor. Um polígono menor significa um projeto mais furtivo — passe o cursor sobre um eixo para ver o que ele mede."
    ru: "Насколько этот проект заметен для каждого типа датчиков. Чем меньше многоугольник, тем менее заметен проект — наведите на ось, чтобы узнать, что она измеряет."
    zh: "该设计对每种传感器类型的可探测程度。多边形越小，说明设计的隐身性越好——将指针悬停在某个轴上可查看其具体含义。"
    "zh-TW": "該設計對每種感測器類型的可偵測程度。多邊形越小，代表設計的匿蹤性越好——將游標懸停在某個軸上可查看其具體含義。"
