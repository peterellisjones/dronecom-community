    ko: "소나 XS"
    "pt-BR": "SONAR XS"
    ru: "СОНАР ХС"
    zh: "声纳XS"
    "zh-TW": "聲納XS"
  # Axis glossary tooltip (#2891) — grounded in `SensorKind::SonarActive`:
  # acoustic reflectivity of an outgoing ping's echo, distinct from the
  # continuous self-noise SONAR NOISE measures.
  sig_sonar_xs_tooltip:
    de: "Akustische Reflektivität — wie stark ein aktiver Sonarimpuls von deinem Rumpf widerhallt. Ein größerer SONAR-XS-Wert bedeutet Entdeckung auf größere Entfernung durch aktives Sonar."
    en: "Acoustic reflectivity — how strongly an active sonar ping echoes off your hull. A larger SONAR XS means detection at longer range by active sonar."
    es: "Reflectividad acústica — cuán intensamente rebota un pulso de sonar activo en tu casco. Un SONAR XS mayor implica detección a mayor distancia por sonar activo."
    fr: "Réflectivité acoustique — l'intensité avec laquelle un ping de sonar actif rebondit sur votre coque. Un SONAR XS plus élevé signifie une détection à plus longue portée par sonar actif."
    it: "Riflettività acustica — quanto intensamente un ping del sonar attivo rimbalza sullo scafo. Un SONAR XS maggiore significa rilevamento a distanza maggiore da parte del sonar attivo."
    ja: "音響反射率——能動ソナーのピンが船体でどれだけ強く反射するか。SONAR XSが大きいほど、能動ソナーによってより遠距離で探知される。"
    ko: "음향 반사율 — 능동 소나 핑이 선체에서 얼마나 강하게 반사되는지를 나타냅니다. SONAR XS가 클수록 능동 소나에 의해 더 먼 거리에서 탐지됩니다."
    "pt-BR": "Refletividade acústica — o quão intensamente um pulso de sonar ativo ecoa no seu casco. Um SONAR XS maior significa detecção a maior distância por sonar ativo."
    ru: "Акустическая отражающая способность — насколько сильно импульс активного гидролокатора отражается от вашего корпуса. Чем больше SONAR XS, тем на большей дальности вас обнаружит активный гидролокатор."
    zh: "声学反射率——主动声纳脉冲从舰体反射的强度。SONAR XS越大，被主动声纳探测到的距离就越远。"
    "zh-TW": "聲學反射率——主動聲納脈衝從艦體反射的強度。SONAR XS越大，被主動聲納偵測到的距離就越遠。"
