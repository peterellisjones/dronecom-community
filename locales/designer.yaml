  # Axis glossary tooltip (#2891) — grounded in `SensorKind::Ir`, a passive
  # thermal sensor.
  sig_ir_tooltip:
    de: "Infrarotsignatur — von Rumpf und Triebwerken abgestrahlte Wärme. Eine größere IR-Signatur bedeutet Entdeckung auf größere Entfernung durch passive IR-Sensoren."
    en: "Infrared signature — heat radiated by the hull and engines. A larger IR signature means detection at longer range by passive IR sensors."
    es: "Firma infrarroja — calor irradiado por el casco y los motores. Una firma IR mayor implica detección a mayor distancia por sensores IR pasivos."
    fr: "Signature infrarouge — chaleur rayonnée par la coque et les moteurs. Une signature IR plus élevée signifie une détection à plus longue portée par des capteurs IR passifs."
    it: "Firma infrarossa — calore irradiato dallo scafo e dai motori. Una firma IR maggiore significa rilevamento a distanza maggiore da parte di sensori IR passivi."
    ja: "赤外線シグネチャ——船体とエンジンが放射する熱。IRシグネチャが大きいほど、受動IRセンサーによってより遠距離で探知される。"
    ko: "적외선 신호 — 선체와 엔진에서 방출되는 열입니다. IR 신호가 클수록 수동 적외선 센서에 의해 더 먼 거리에서 탐지됩니다."
    "pt-BR": "Assinatura infravermelha — calor irradiado pelo casco e motores. Uma assinatura IR maior significa detecção a maior distância por sensores IV passivos."
    ru: "Инфракрасная сигнатура — тепло, излучаемое корпусом и двигателями. Чем больше ИК-сигнатура, тем на большей дальности вас обнаружат пассивные ИК-датчики."
    zh: "红外特征信号——舰体与发动机辐射的热量。红外特征越大，被被动红外传感器探测到的距离就越远。"
    "zh-TW": "紅外線特徵訊號——艦體與發動機輻射的熱量。紅外線特徵越大，被被動紅外線感測器偵測到的距離就越遠。"
  sig_visual:
    de: "VIS"
    en: "VIS"
    es: "VIS"
    fr: "VIS"
    it: "VIS"
    ja: "目視"
    ko: "시각"
    "pt-BR": "VIS"
    ru: "ВИЗ"
    zh: "目视"
    "zh-TW": "目視"
  # Axis glossary tooltip (#2891) — grounded in `SensorKind::Visual`, a
  # distinct daylight-EO sensor (not merged with IR).
  sig_visual_tooltip:
    de: "Visueller Querschnitt — wie groß du dem Auge oder einer Kamera erscheinst. Eine größere VIS-Signatur bedeutet Entdeckung auf größere Entfernung durch visuelle Sensoren."
    en: "Visual cross-section — how large you appear to the eye or a camera. A larger VISUAL signature means detection at longer range by visual sensors."
    es: "Sección visual — qué tan grande pareces al ojo o a una cámara. Una firma VIS mayor implica detección a mayor distancia por sensores visuales."
    fr: "Surface visuelle — votre taille apparente à l'œil ou à une caméra. Une signature VIS plus élevée signifie une détection à plus longue portée par des capteurs visuels."
    it: "Sezione visiva — quanto appari grande a occhio nudo o a una telecamera. Una firma VIS maggiore significa rilevamento a distanza maggiore da parte di sensori visivi."
    ja: "視覚断面積——肉眼やカメラに映る大きさ。視覚シグネチャが大きいほど、視覚センサーによってより遠距離で探知される。"
    ko: "시각 단면적 — 육안이나 카메라에 얼마나 크게 보이는지를 나타냅니다. 시각 신호가 클수록 시각 센서에 의해 더 먼 거리에서 탐지됩니다."
    "pt-BR": "Seção visual — o quão grande você aparece a olho nu ou para uma câmera. Uma assinatura visual maior significa detecção a maior distância por sensores visuais."
    ru: "Визуальная заметность — насколько крупным вы выглядите невооружённым глазом или в камеру. Чем больше визуальная сигнатура, тем на большей дальности вас обнаружат визуальные датчики."
    zh: "视觉截面——肉眼或摄像头看到的大小。视觉特征越大，被视觉传感器探测到的距离就越远。"
    "zh-TW": "視覺截面——肉眼或攝影機看到的大小。視覺特徵越大，被視覺感測器偵測到的距離就越遠。"
  sig_sonar_noise:
