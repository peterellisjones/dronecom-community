    "zh-TW": "電磁輻射"
  # Axis glossary tooltip (#2891) — grounded in `EmissionContribution` /
  # `SensorKind::Rwr`: this is the emitting platform's OWN active-radar
  # radiated energy, heard passively by an enemy RWR/ESM — the counter-
  # detectability cost of going active, not the radar's own detection range.
  sig_em_emission_tooltip:
    de: "Abgestrahlte Energie deines eigenen aktiven Radars. Aktivschaltung macht dich für den passiven RWR eines Gegners auf größere Entfernung erkennbar — unabhängig von der eigenen Reichweite deines Radars."
    en: "Radiated energy from your own active radar. Going active makes you detectable at longer range by enemy passive RWR — separate from your radar's own detection range."
    es: "Energía irradiada por tu propio radar activo. Activarlo te hace detectable a mayor distancia por el RWR pasivo enemigo — independiente del alcance de detección de tu propio radar."
    fr: "Énergie rayonnée par votre propre radar actif. Passer en mode actif vous rend détectable à plus longue portée par le RWR passif ennemi — indépendamment de la portée de détection de votre propre radar."
    it: "Energia irradiata dal tuo stesso radar attivo. Attivarlo ti rende rilevabile a distanza maggiore dal RWR passivo nemico — indipendentemente dalla portata di rilevamento del tuo radar."
    ja: "自機の能動レーダーが放射するエネルギー。能動化すると、敵の受動RWRによってより遠距離で探知される——これは自機レーダー自体の探知距離とは別物。"
    ko: "자신의 능동 레이더에서 방출되는 에너지입니다. 능동 상태로 전환하면 적의 수동 RWR에 의해 더 먼 거리에서 탐지됩니다 — 이는 자신의 레이더 탐지 거리와는 별개입니다."
    "pt-BR": "Energia irradiada pelo seu próprio radar ativo. Ativá-lo torna você detectável a maior distância pelo RWR passivo inimigo — algo separado do alcance de detecção do seu próprio radar."
    ru: "Энергия, излучаемая вашим собственным активным радаром. Включение активного режима делает вас заметным на большей дальности для пассивного RWR противника — это не связано с дальностью обнаружения вашего радара."
    zh: "自身主动雷达辐射的能量。开启主动模式会使你在更远距离被敌方被动雷达告警器（RWR）探测到——这与你雷达自身的探测距离无关。"
    "zh-TW": "自身主動雷達輻射的能量。開啟主動模式會使你在更遠距離被敵方被動雷達警告器（RWR）偵測到——這與你雷達自身的偵測距離無關。"
  sig_acoustic_emission:
