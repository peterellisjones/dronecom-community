    roe_no_weapons_tooltip:
      de: "Dieser Entwurf hat keine Waffen; eine Bekämpfungs-ROE würde nie feuern. Einen Sprengkopf oder Werfer hinzufügen, um zu bekämpfen."
      en: "This design has no weapons; an engage ROE would never fire. Add a warhead or launcher to engage."
      es: "Este diseño no tiene armas; una ROE de ataque nunca dispararía. Añade una ojiva o lanzador para atacar."
      fr: "Cette conception n'a pas d'armes ; une ROE d'engagement ne ferait jamais feu. Ajoutez une ogive ou un lanceur pour engager."
      it: "Questo progetto non ha armi; una ROE d'ingaggio non farebbe mai fuoco. Aggiungi una testata o un lanciatore per ingaggiare."
      ja: "この設計には武装がない。交戦規則を設定しても発砲しない。交戦するには弾頭か発射機を追加する。"
      ko: "이 설계에는 무기가 없습니다; 교전 규칙으로는 발포하지 않습니다. 교전하려면 탄두나 발사기를 추가하세요."
      "pt-BR": "Este projeto não tem armas; uma ROE de engajamento nunca dispararia. Adicione uma ogiva ou lançador para engajar."
      ru: "В этой конструкции нет вооружения; ROE на поражение никогда не откроет огонь. Добавьте боевую часть или пусковую установку для атаки."
      zh: "该设计无武器；交战规则永不开火。添加战斗部或发射器以交战。"
      "zh-TW": "該設計無武器；交戰規則永不開火。新增戰鬥部或發射器以交戰。"
