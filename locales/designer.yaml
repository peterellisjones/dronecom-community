    # Per-profile glossary tooltips (#2889) — shared by the selector, the
    # TRAJECTORY RANGE rows, and the trajectory chart legend, so the three
    # surfaces never drift on what each profile means.
    profile_tooltip:
      direct:
        de: "Fliegt eine Gerade zum Ziel — das Standardprofil. Kürzeste Flugzeit, am besten vorhersehbarer Kurs."
        en: "Straight-line flight to the target — the baseline profile. Shortest flight time, most predictable path."
        es: "Vuelo en línea recta hacia el blanco — el perfil base. Menor tiempo de vuelo, trayectoria más predecible."
        fr: "Vol en ligne droite vers la cible — le profil de base. Temps de vol le plus court, trajectoire la plus prévisible."
        it: "Volo in linea retta verso il bersaglio — il profilo di base. Tempo di volo minimo, traiettoria più prevedibile."
        ja: "目標へ直線飛行する基準プロファイル。飛行時間が最短で、経路も最も予測しやすい。"
        ko: "표적까지 직선으로 비행하는 기본 프로파일. 비행 시간이 가장 짧고 경로 예측이 가장 쉽습니다."
        "pt-BR": "Voo em linha reta até o alvo — o perfil padrão. Menor tempo de voo, trajetória mais previsível."
        ru: "Полёт по прямой к цели — базовый профиль. Наименьшее время полёта, самая предсказуемая траектория."
        zh: "直线飞向目标 —— 基准弹道。飞行时间最短，路径最易预测。"
        "zh-TW": "直線飛向目標 —— 基準彈道。飛行時間最短，路徑最易預測。"
      terrain_follow:
        de: "Folgt dem Gelände und hält Abstand über Boden oder See, um länger unentdeckt zu bleiben. Höherer Widerstand kostet Reichweite."
        en: "Hugs the terrain, holding clearance above the ground or sea to stay hidden longer. Higher drag costs range."
        es: "Sigue el terreno, manteniendo una holgura sobre tierra o mar para permanecer oculto más tiempo. Mayor resistencia reduce el alcance."
        fr: "Suit le relief en maintenant une garde au-dessus du sol ou de la mer pour rester caché plus longtemps. Une traînée plus élevée réduit la portée."
        it: "Segue il terreno mantenendo una distanza dal suolo o dal mare per restare nascosto più a lungo. Una resistenza maggiore riduce l'autonomia."
        ja: "地形に沿って地表または海面上の間隔を保ち、長く隠密性を維持する。抗力が増える分、航続距離は短くなる。"
        ko: "지형을 따라 지면이나 해수면 위의 간격을 유지하며 오래 은폐합니다. 항력이 커지는 만큼 항속거리는 줄어듭니다."
        "pt-BR": "Acompanha o terreno, mantendo distância sobre o solo ou o mar para permanecer oculto por mais tempo. Mais arrasto reduz o alcance."
        ru: "Следует рельефу, выдерживая просвет над землёй или морем, чтобы дольше оставаться незамеченным. Более высокое сопротивление снижает дальность."
        zh: "贴地飞行，与地面或海面保持间隙以延长隐蔽时间。阻力更高会缩短航程。"
        "zh-TW": "貼地飛行，與地面或海面保持間隙以延長隱蔽時間。阻力更高會縮短航程。"
      lofted:
        de: "Steigt hoch in dünne Luft, im Reiseflug, und stürzt sich dann auf das Ziel. Größere Reichweite als Direct, und im Endanflug schwerer abzufangen."
        en: "Climbs high into thin air, cruises, then dives on the target. Longer range than Direct, and harder to intercept in the terminal dive."
        es: "Asciende a gran altitud en aire enrarecido, navega y luego se lanza en picado sobre el blanco. Mayor alcance que Direct, y más difícil de interceptar en el picado final."
        fr: "Monte haut dans l'air raréfié, croise, puis plonge sur la cible. Plus longue portée que Direct, et plus difficile à intercepter lors du piqué final."
        it: "Sale in quota nell'aria rarefatta, crocera, poi si tuffa sul bersaglio. Autonomia maggiore rispetto a Direct, e più difficile da intercettare nella picchiata finale."
        ja: "希薄な高高度まで上昇して巡航し、その後目標へ急降下する。Directより長い航続距離を持ち、終末の急降下は迎撃が難しい。"
        ko: "희박한 고고도로 상승해 순항한 뒤 표적으로 급강하합니다. Direct보다 항속거리가 길고, 종말 급강하 구간에서는 요격이 더 어렵습니다."
        "pt-BR": "Sobe até o ar rarefeito, cruza e depois mergulha sobre o alvo. Alcance maior que o Direct, e mais difícil de interceptar no mergulho final."
        ru: "Забирается высоко в разрежённый воздух, идёт крейсерским полётом, затем пикирует на цель. Дальность больше, чем у Direct, и перехватить сложнее на финальном пикировании."
        zh: "爬升至稀薄高空巡航，随后俯冲攻击目标。航程比直线弹道更远，末段俯冲更难被拦截。"
        "zh-TW": "爬升至稀薄高空巡航，隨後俯衝攻擊目標。航程比直線彈道更遠，末段俯衝更難被攔截。"
