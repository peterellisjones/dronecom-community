    en: "ACU EMIT"
    es: "ACU EMIT"
    fr: "ACU EMIT"
    it: "ACU EMIT"
    ja: "音響放射"
    ko: "음향 방출"
    "pt-BR": "ACU EMIT"
    ru: "АКУ ИЗЛ"
    zh: "声学辐射"
    "zh-TW": "聲學輻射"
  # Axis glossary tooltip (#2891) — grounded in `EmissionContribution` /
  # `SensorKind::SonarPassive`: this is the emitting platform's OWN active-
  # sonar ping, heard passively by an enemy passive sonar — the counter-
  # detectability cost of going active, distinct from SONAR NOISE's
  # continuous self-noise and from the sonar's own detection range.
  sig_acoustic_emission_tooltip:
    de: "Abgestrahlte Energie deines eigenen aktiven Sonarimpulses. Aktivschaltung macht dich für das passive Sonar eines Gegners auf größere Entfernung erkennbar — unabhängig von der eigenen Reichweite deines Sonars."
    en: "Radiated energy from your own active sonar ping. Going active makes you detectable at longer range by enemy passive sonar — separate from your sonar's own detection range."
    es: "Energía irradiada por tu propio pulso de sonar activo. Activarlo te hace detectable a mayor distancia por el sonar pasivo enemigo — independiente del alcance de detección de tu propio sonar."
    fr: "Énergie rayonnée par votre propre ping de sonar actif. Passer en mode actif vous rend détectable à plus longue portée par le sonar passif ennemi — indépendamment de la portée de détection de votre propre sonar."
    it: "Energia irradiata dal ping del tuo stesso sonar attivo. Attivarlo ti rende rilevabile a distanza maggiore dal sonar passivo nemico — indipendentemente dalla portata di rilevamento del tuo sonar."
    ja: "自機の能動ソナーのピンが放射するエネルギー。能動化すると、敵の受動ソナーによってより遠距離で探知される——これは自機ソナー自体の探知距離とは別物。"
    ko: "자신의 능동 소나 핑에서 방출되는 에너지입니다. 능동 상태로 전환하면 적의 수동 소나에 의해 더 먼 거리에서 탐지됩니다 — 이는 자신의 소나 탐지 거리와는 별개입니다."
    "pt-BR": "Energia irradiada pelo pulso do seu próprio sonar ativo. Ativá-lo torna você detectável a maior distância pelo sonar passivo inimigo — algo separado do alcance de detecção do seu próprio sonar."
    ru: "Энергия, излучаемая импульсом вашего собственного активного гидролокатора. Включение активного режима делает вас заметным на большей дальности для пассивного гидролокатора противника — это не связано с дальностью обнаружения вашего гидролокатора."
    zh: "自身主动声纳脉冲辐射的能量。开启主动模式会使你在更远距离被敌方被动声纳探测到——这与你声纳自身的探测距离无关。"
    "zh-TW": "自身主動聲納脈衝輻射的能量。開啟主動模式會使你在更遠距離被敵方被動聲納偵測到——這與你聲納自身的偵測距離無關。"
