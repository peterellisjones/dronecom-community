    "pt-BR": "O ângulo zenital mais acentuado em que esta fuselagem ainda consegue engajar um alvo. Além disso, o alvo fica próximo demais da vertical para a fuselagem conseguir virar sobre ele."
    ru: "Максимальный зенитный угол, при котором этот планер ещё способен атаковать цель. Дальше цель оказывается слишком близко к зениту, чтобы планер мог довернуть на неё."
