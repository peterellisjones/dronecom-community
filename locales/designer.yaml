  recovery_requires_tooltip:
    de: "Die Einrichtung, auf der dieser Entwurf landen oder andocken muss, um geborgen und wiederverwendet zu werden. Einweg-Entwürfe werden nie geborgen — jeder wird einmal gebaut und verbraucht."
    en: "The facility this design must land on or dock with to be recovered and reused. Expendable designs are never recovered — each one is built once and used up."
    es: "La instalación en la que este diseño debe aterrizar o atracar para ser recuperado y reutilizado. Los diseños desechables nunca se recuperan: cada uno se construye una vez y se consume."
    fr: "L'installation sur laquelle ce modèle doit atterrir ou s'arrimer pour être récupéré et réutilisé. Les modèles non récupérables ne sont jamais récupérés : chacun est construit une fois puis consommé."
    it: "La struttura su cui questo progetto deve atterrare o attraccare per essere recuperato e riutilizzato. I progetti monouso non vengono mai recuperati: ciascuno viene costruito una volta e consumato."
    ja: "この設計が回収・再利用されるために着陸またはドッキングする必要がある施設。使い捨て設計は決して回収されない —— 一度建造されて使い切られる。"
    ko: "이 설계가 회수되어 재사용되려면 착륙하거나 도킹해야 하는 시설입니다. 일회용 설계는 결코 회수되지 않습니다 —— 한 번 건조되어 소모됩니다."
    "pt-BR": "A instalação em que este projeto deve pousar ou atracar para ser recuperado e reutilizado. Projetos descartáveis nunca são recuperados — cada um é construído uma vez e consumido."
    ru: "Объект, на который этот проект должен приземлиться или пристыковаться, чтобы быть возвращённым и использованным повторно. Одноразовые проекты никогда не возвращаются — каждый строится один раз и расходуется."
    zh: "该设计必须降落或对接的设施，才能被回收再利用。消耗品设计永远不会被回收 —— 每个都只建造一次并被用尽。"
    "zh-TW": "該設計必須降落或對接的設施，才能被回收再利用。消耗品設計永遠不會被回收 —— 每個都只建造一次並被用盡。"
