    auto_badge_tooltip:
      de: "Doktrin wird automatisch aus dem Entwurf abgeleitet: Ein unbewaffnetes Fahrzeug hält das Feuer; mit Bewaffnung wird Bekämpfung möglich. Zum manuellen Setzen ein Feld bearbeiten."
      en: "Doctrine is auto-derived from the design: an unarmed vehicle holds fire; arming it allows engagement. Edit any field to set it manually."
      es: "La doctrina se deriva automáticamente del diseño: un vehículo sin armas mantiene el fuego; al armarlo se permite el ataque. Edita cualquier campo para fijarla manualmente."
      fr: "La doctrine est dérivée automatiquement de la conception : un véhicule non armé cesse le feu ; l'armer permet l'engagement. Modifiez un champ pour la définir manuellement."
      it: "La dottrina è derivata automaticamente dal progetto: un veicolo disarmato sospende il fuoco; armarlo consente l'ingaggio. Modifica un campo per impostarla manualmente."
      ja: "教義は設計から自動的に導出される。武装のない機体は射撃を控え、武装すれば交戦が可能になる。手動で設定するにはいずれかの項目を編集する。"
      ko: "교리는 설계로부터 자동으로 도출됩니다: 무장이 없는 차량은 사격을 보류하며, 무장하면 교전이 가능합니다. 수동으로 설정하려면 항목을 편집하세요."
      "pt-BR": "A doutrina é derivada automaticamente do projeto: um veículo desarmado mantém o fogo; armá-lo permite o engajamento. Edite qualquer campo para defini-la manualmente."
      ru: "Доктрина выводится автоматически из конструкции: безоружный аппарат не открывает огонь; вооружение позволяет атаковать. Измените любое поле, чтобы задать вручную."
      zh: "条令根据设计自动推导：无武装载具保持不开火；装备武器后可交战。编辑任意字段以手动设置。"
      "zh-TW": "教義依設計自動推導：無武裝載具保持不開火；裝備武器後可交戰。編輯任意欄位以手動設定。"
