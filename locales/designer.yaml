  warning:
    no_propulsion:
      de: "Fahrzeug hat keinen Antrieb; es bleibt nach dem Start stationär."
      en: "Vehicle has no propulsion; it will remain stationary after launch."
      es: "El vehículo no tiene propulsión; permanecerá inmóvil tras el lanzamiento."
      fr: "Le véhicule n'a pas de propulsion ; il restera immobile après le lancement."
      it: "Il veicolo non ha propulsione; rimarrà fermo dopo il lancio."
      ja: "この機体には推進装置がない。発進後は静止したままになる。"
      ko: "이 차량에는 추진 장치가 없습니다; 발진 후 정지 상태로 유지됩니다."
      "pt-BR": "O veículo não tem propulsão; permanecerá parado após o lançamento."
      ru: "Аппарат не имеет двигателя; после запуска он останется неподвижным."
      zh: "该载具无推进装置；发射后将保持静止。"
      "zh-TW": "該載具無推進裝置；發射後將保持靜止。"
  cost_tooltip:
    de: "Gesamte Baukosten dieses Entwurfs; werden beim Bau von Ihrem Budget abgezogen."
    en: "Total build cost of this design, deducted from your budget when you build it."
    es: "Costo total de construcción de este diseño; se descuenta de tu presupuesto al construirlo."
    fr: "Coût de construction total de ce modèle ; déduit de votre budget lors de la construction."
    it: "Costo di costruzione totale di questo progetto; detratto dal budget quando lo costruisci."
    ja: "この設計の総建造コスト。建造時に予算から差し引かれる。"
    ko: "이 설계의 총 건조 비용. 건조 시 예산에서 차감됩니다."
    "pt-BR": "Custo total de construção deste projeto; descontado do seu orçamento ao construí-lo."
    ru: "Полная стоимость постройки этого проекта; вычитается из бюджета при постройке."
    zh: "该设计的总建造成本，建造时从预算中扣除。"
    "zh-TW": "該設計的總建造成本，建造時從預算中扣除。"
  weight_tooltip:
    de: "Gesamtmasse der Zelle und aller verbauten Komponenten. Schwerere Plattformen beschleunigen, steigen und wenden träger."
    en: "Combined mass of the airframe and every fitted component. Heavier platforms accelerate, climb, and turn more sluggishly."
    es: "Masa combinada del fuselaje y todos los componentes instalados. Las plataformas más pesadas aceleran, ascienden y giran con más lentitud."
    fr: "Masse totale de la cellule et de tous les composants installés. Les plateformes plus lourdes accélèrent, montent et virent plus lentement."
    it: "Massa complessiva della cellula e di tutti i componenti installati. Le piattaforme più pesanti accelerano, salgono e virano più lentamente."
    ja: "機体と搭載する全コンポーネントの合計質量。重い機体ほど加速・上昇・旋回が鈍くなる。"
    ko: "기체와 장착된 모든 구성품의 총 질량. 무거운 플랫폼일수록 가속, 상승, 선회가 둔해집니다."
    "pt-BR": "Massa combinada da fuselagem e de todos os componentes instalados. Plataformas mais pesadas aceleram, sobem e viram mais lentamente."
    ru: "Суммарная масса планера и всех установленных компонентов. Более тяжёлые платформы медленнее разгоняются, набирают высоту и разворачиваются."
    zh: "机身与所有已装组件的总质量。越重的平台加速、爬升和转向越迟缓。"
    "zh-TW": "機身與所有已裝組件的總質量。越重的平台加速、爬升與轉向越遲緩。"
  min_engagement_range_tooltip:
    de: "Die aerodynamische Totzone: der geringste Abstand, auf den diese Zelle noch einschwenken kann. Alles Nähere liegt innerhalb ihres Wenderadius."
    en: "The aerodynamic dead zone: the closest a target can be before this airframe can no longer curve onto it. Anything nearer slips inside its turn radius."
    es: "La zona muerta aerodinámica: la distancia mínima a la que este fuselaje aún puede virar hacia un blanco. Todo lo más cercano queda dentro de su radio de giro."
    fr: "La zone morte aérodynamique : la distance minimale à laquelle cette cellule peut encore s'orienter vers une cible. Tout ce qui est plus proche passe dans son rayon de virage."
    it: "La zona morta aerodinamica: la distanza minima a cui questa cellula riesce ancora a virare su un bersaglio. Tutto ciò che è più vicino rientra nel suo raggio di virata."
    ja: "空力上の死角。この機体がまだ目標へ旋回できる最短距離。これより近いものは旋回半径の内側に入る。"
    ko: "공력상의 사각지대. 이 기체가 아직 표적으로 선회할 수 있는 최소 거리. 이보다 가까운 것은 선회 반경 안쪽에 들어갑니다."
    "pt-BR": "A zona morta aerodinâmica: a menor distância em que esta fuselagem ainda consegue virar sobre um alvo. Tudo mais próximo fica dentro do seu raio de curva."
    ru: "Аэродинамическая мёртвая зона: минимальная дистанция, на которой планер ещё способен довернуть на цель. Всё, что ближе, оказывается внутри его радиуса разворота."
    zh: "气动死区：该机体仍能转向命中目标的最近距离。更近的目标会落入其转弯半径之内。"
    "zh-TW": "氣動死區：該機體仍能轉向命中目標的最近距離。更近的目標會落入其轉彎半徑之內。"
  max_speed_tooltip:
    de: "Die höchste Geschwindigkeit, die diese Plattform dauerhaft halten kann."
    en: "The fastest speed this platform can sustain."
    es: "La velocidad máxima que esta plataforma puede mantener."
    fr: "La vitesse maximale que cette plateforme peut soutenir."
    it: "La velocità massima che questa piattaforma può sostenere."
    ja: "このプラットフォームが維持できる最高速度。"
    ko: "이 플랫폼이 유지할 수 있는 최고 속도."
    "pt-BR": "A velocidade máxima que esta plataforma consegue manter."
    ru: "Максимальная скорость, которую эта платформа способна поддерживать."
    zh: "该平台能够持续保持的最高速度。"
    "zh-TW": "該平台能夠持續保持的最高速度。"
  stall_speed_tooltip:
    de: "Mindestfluggeschwindigkeit, bevor die Zelle Auftrieb verliert und überzieht. Langsamer kann sie nicht fliegen."
    en: "Minimum airspeed before the airframe loses lift and stalls. It cannot fly slower than this."
    es: "Velocidad mínima antes de que el fuselaje pierda sustentación y entre en pérdida. No puede volar más lento que esto."
    fr: "Vitesse minimale avant que la cellule ne perde sa portance et ne décroche. Elle ne peut pas voler plus lentement."
    it: "Velocità minima prima che la cellula perda portanza e vada in stallo. Non può volare più lentamente di così."
    ja: "機体が揚力を失い失速する直前の最低速度。これより遅くは飛べない。"
    ko: "기체가 양력을 잃고 실속하기 직전의 최저 속도. 이보다 느리게는 비행할 수 없습니다."
    "pt-BR": "Velocidade mínima antes de a fuselagem perder sustentação e entrar em estol. Não pode voar mais devagar que isso."
    ru: "Минимальная скорость, при которой планер ещё не теряет подъёмную силу и не сваливается. Медленнее лететь он не может."
    zh: "机体失去升力并失速前的最低空速。无法飞得比这更慢。"
    "zh-TW": "機體失去升力並失速前的最低空速。無法飛得比這更慢。"
  acceleration_tooltip:
    de: "Wie schnell die Plattform an Geschwindigkeit gewinnt."
    en: "How quickly the platform builds up speed."
    es: "Con qué rapidez la plataforma gana velocidad."
    fr: "La rapidité avec laquelle la plateforme prend de la vitesse."
    it: "Quanto rapidamente la piattaforma acquista velocità."
    ja: "このプラットフォームが速度を上げる速さ。"
    ko: "플랫폼이 속도를 높이는 빠르기."
    "pt-BR": "A rapidez com que a plataforma ganha velocidade."
    ru: "Как быстро платформа набирает скорость."
    zh: "平台提速的快慢。"
    "zh-TW": "平台提速的快慢。"
  deceleration_tooltip:
    de: "Wie schnell die Plattform an Geschwindigkeit verliert."
    en: "How quickly the platform sheds speed."
    es: "Con qué rapidez la plataforma pierde velocidad."
    fr: "La rapidité avec laquelle la plateforme perd de la vitesse."
    it: "Quanto rapidamente la piattaforma perde velocità."
    ja: "このプラットフォームが減速する速さ。"
    ko: "플랫폼이 속도를 줄이는 빠르기."
    "pt-BR": "A rapidez com que a plataforma perde velocidade."
    ru: "Как быстро платформа сбрасывает скорость."
    zh: "平台减速的快慢。"
    "zh-TW": "平台減速的快慢。"
  turn_rate_tooltip:
    de: "Wie schnell die Plattform den Kurs ändern kann. Ein höherer Wert bedeutet engere Wendungen."
    en: "How fast the platform can change heading. A higher rate means a tighter turn."
    es: "Con qué rapidez la plataforma puede cambiar de rumbo. Un valor mayor significa un giro más cerrado."
    fr: "La rapidité avec laquelle la plateforme peut changer de cap. Une valeur plus élevée signifie un virage plus serré."
    it: "Quanto rapidamente la piattaforma può cambiare rotta. Un valore più alto significa una virata più stretta."
    ja: "このプラットフォームが針路を変える速さ。値が大きいほど旋回が鋭くなる。"
    ko: "플랫폼이 침로를 바꾸는 빠르기. 값이 클수록 선회가 급해집니다."
    "pt-BR": "A rapidez com que a plataforma pode mudar de rumo. Um valor maior significa uma curva mais fechada."
    ru: "Как быстро платформа может менять курс. Чем выше значение, тем круче разворот."
    zh: "平台改变航向的快慢。数值越高，转弯越急。"
    "zh-TW": "平台改變航向的快慢。數值越高，轉彎越急。"
  climb_rate_tooltip:
    de: "Wie schnell die Plattform an Höhe gewinnen kann."
    en: "How fast the platform can gain altitude."
    es: "Con qué rapidez la plataforma puede ganar altitud."
    fr: "La rapidité avec laquelle la plateforme peut prendre de l'altitude."
    it: "Quanto rapidamente la piattaforma può guadagnare quota."
    ja: "このプラットフォームが高度を上げる速さ。"
    ko: "플랫폼이 고도를 높이는 빠르기."
    "pt-BR": "A rapidez com que a plataforma pode ganhar altitude."
    ru: "Как быстро платформа может набирать высоту."
    zh: "平台爬升高度的快慢。"
    "zh-TW": "平台爬升高度的快慢。"
  min_altitude_tooltip:
    de: "Die niedrigste Höhe, die diese Plattform hält."
    en: "The lowest altitude this platform will hold."
    es: "La altitud mínima que mantendrá esta plataforma."
    fr: "L'altitude minimale que cette plateforme maintiendra."
    it: "La quota minima che questa piattaforma manterrà."
    ja: "このプラットフォームが保持する最低高度。"
    ko: "이 플랫폼이 유지하는 최저 고도."
    "pt-BR": "A altitude mínima que esta plataforma manterá."
    ru: "Минимальная высота, которую удерживает эта платформа."
    zh: "该平台将保持的最低高度。"
    "zh-TW": "該平台將保持的最低高度。"
  max_altitude_tooltip:
    de: "Die Gipfelhöhe: die höchste Höhe, die diese Plattform erreichen kann."
    en: "The ceiling: the highest altitude this platform can reach."
    es: "El techo: la altitud máxima que esta plataforma puede alcanzar."
    fr: "Le plafond : l'altitude maximale que cette plateforme peut atteindre."
    it: "La quota di tangenza: l'altitudine massima che questa piattaforma può raggiungere."
    ja: "上昇限度。このプラットフォームが到達できる最高高度。"
    ko: "상승 한도. 이 플랫폼이 도달할 수 있는 최고 고도."
    "pt-BR": "O teto: a altitude máxima que esta plataforma pode atingir."
    ru: "Практический потолок: максимальная высота, которую может достичь эта платформа."
    zh: "升限：该平台能够到达的最高高度。"
    "zh-TW": "升限：該平台能夠到達的最高高度。"
  draft_tooltip:
    de: "Wie tief der Rumpf unter der Wasserlinie liegt. Bestimmt die geringste Tiefe, in der die Plattform über Untiefen sicher operieren kann."
    en: "How deep the hull sits below the waterline. Sets the minimum depth the platform can safely operate in over shoals."
    es: "Cuánto se sumerge el casco bajo la línea de flotación. Fija la profundidad mínima a la que la plataforma puede operar con seguridad sobre bajíos."
    fr: "La profondeur à laquelle la coque s'enfonce sous la ligne de flottaison. Définit la profondeur minimale à laquelle la plateforme peut opérer en sécurité au-dessus des hauts-fonds."
    it: "Quanto lo scafo si immerge sotto la linea di galleggiamento. Definisce la profondità minima a cui la piattaforma può operare in sicurezza sui bassifondi."
    ja: "喫水線より下に沈む船体の深さ。浅瀬でプラットフォームが安全に活動できる最小深度を決める。"
    ko: "흘수선 아래로 잠기는 선체의 깊이. 얕은 곳에서 플랫폼이 안전하게 작전할 수 있는 최소 수심을 정합니다."
    "pt-BR": "O quanto o casco fica submerso abaixo da linha d'água. Define a profundidade mínima em que a plataforma pode operar com segurança sobre baixios."
    ru: "Насколько глубоко корпус сидит ниже ватерлинии. Задаёт минимальную глубину, на которой платформа может безопасно действовать над отмелями."
    zh: "船体在吃水线以下的深度。决定平台在浅滩上可安全活动的最小水深。"
    "zh-TW": "船體在吃水線以下的深度。決定平台在淺灘上可安全活動的最小水深。"
  dive_rate_tooltip:
    de: "Wie schnell das U-Boot die Tiefe ändern kann."
    en: "How fast the submarine can change depth."
    es: "Con qué rapidez el submarino puede cambiar de profundidad."
    fr: "La rapidité avec laquelle le sous-marin peut changer de profondeur."
    it: "Quanto rapidamente il sottomarino può cambiare profondità."
    ja: "潜水艦が深度を変える速さ。"
    ko: "잠수함이 심도를 바꾸는 빠르기."
    "pt-BR": "A rapidez com que o submarino pode mudar de profundidade."
    ru: "Как быстро подводная лодка может менять глубину."
    zh: "潜艇改变深度的快慢。"
    "zh-TW": "潛艇改變深度的快慢。"
  max_depth_tooltip:
    de: "Die größte Tiefe, die das U-Boot sicher erreichen kann, bevor der Rumpf Druckschäden erleidet."
    en: "The deepest the submarine can safely go before the hull takes crush damage."
    es: "La mayor profundidad a la que el submarino puede descender con seguridad antes de que el casco sufra daños por presión."
    fr: "La profondeur maximale que le sous-marin peut atteindre en sécurité avant que la coque ne subisse des dommages d'écrasement."
    it: "La profondità massima a cui il sottomarino può scendere in sicurezza prima che lo scafo subisca danni da schiacciamento."
    ja: "船体が圧壊損傷を受ける前に潜水艦が安全に潜れる最大深度。"
    ko: "선체가 압괴 피해를 입기 전에 잠수함이 안전하게 잠수할 수 있는 최대 심도."
    "pt-BR": "A maior profundidade a que o submarino pode descer com segurança antes de o casco sofrer dano por esmagamento."
    ru: "Максимальная глубина, на которую подводная лодка может безопасно погружаться, прежде чем корпус получит повреждения от давления."
    zh: "潜艇在船体受到压毁损伤前可安全下潜的最大深度。"
    "zh-TW": "潛艇在船體受到壓毀損傷前可安全下潛的最大深度。"
  sail_height_tooltip:
    de: "Höhe des Turms über dem Rumpf. Das Boot muss mindestens so tief bleiben, um nicht die Oberfläche zu durchbrechen."
    en: "Height of the sail above the hull. The boat must stay at least this deep to avoid broaching the surface."
    es: "Altura de la vela sobre el casco. El submarino debe mantenerse al menos a esta profundidad para no emerger a la superficie."
    fr: "Hauteur du massif au-dessus de la coque. Le sous-marin doit rester au moins à cette profondeur pour ne pas percer la surface."
    it: "Altezza della vela sopra lo scafo. Il battello deve restare almeno a questa profondità per non affiorare in superficie."
    ja: "船体上のセイルの高さ。艇はこの深さ以上を保たないと海面に露出してしまう。"
    ko: "선체 위 세일의 높이. 잠수함은 수면 위로 드러나지 않으려면 최소 이 심도를 유지해야 합니다."
    "pt-BR": "Altura da vela acima do casco. O submarino deve permanecer ao menos a esta profundidade para não aflorar à superfície."
