  # Axis glossary tooltip (#2891) — grounded in `SensorKind::SonarPassive`:
  # continuous radiated self-noise, distinct from SONAR XS's echo return.
  sig_sonar_noise_tooltip:
    de: "Abgestrahltes Eigengeräusch — das kontinuierliche Geräusch, das Rumpf und Maschinen unter Wasser erzeugen. Lauteres Geräusch bedeutet Entdeckung auf größere Entfernung durch passives Sonar."
    en: "Radiated self-noise — the continuous sound your hull and machinery make underwater. Louder noise means detection at longer range by passive sonar."
    es: "Ruido propio irradiado — el sonido continuo que el casco y la maquinaria producen bajo el agua. Un ruido mayor implica detección a mayor distancia por sonar pasivo."
    fr: "Bruit propre rayonné — le son continu émis par la coque et les machines sous l'eau. Un bruit plus fort signifie une détection à plus longue portée par sonar passif."
    it: "Rumore proprio irradiato — il suono continuo prodotto sott'acqua dallo scafo e dai macchinari. Un rumore maggiore significa rilevamento a distanza maggiore da parte del sonar passivo."
    ja: "自己雑音——船体と機関が水中で発する持続的な音。雑音が大きいほど、受動ソナーによってより遠距離で探知される。"
    ko: "방사 자체 소음 — 선체와 기관이 수중에서 지속적으로 내는 소리입니다. 소음이 클수록 수동 소나에 의해 더 먼 거리에서 탐지됩니다."
    "pt-BR": "Ruído próprio irradiado — o som contínuo que o casco e as máquinas produzem debaixo d'água. Um ruído maior significa detecção a maior distância por sonar passivo."
    ru: "Собственный излучаемый шум — непрерывный звук, создаваемый корпусом и механизмами под водой. Чем громче шум, тем на большей дальности вас обнаружит пассивный гидролокатор."
    zh: "自身辐射噪声——舰体与机械在水下持续发出的声音。噪声越大，被被动声纳探测到的距离就越远。"
    "zh-TW": "自身輻射噪音——艦體與機械在水下持續發出的聲音。噪音越大，被被動聲納偵測到的距離就越遠。"
  sig_sonar_xs:
    de: "SONAR XS"
    en: "SONAR XS"
    es: "SONAR XS"
    fr: "SONAR XS"
    it: "SONAR XS"
