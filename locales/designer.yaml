  fuel_percent_tooltip:
    de: "Anteil des Treibstofftanks, der geladen wird. Weniger Treibstoff schafft Nutzlastgewicht frei, verkürzt aber Reichweite und Ausdauer."
    en: "Fraction of the fuel tank to load. Less fuel frees up payload weight but shortens range and endurance."
    es: "Fracción del depósito de combustible a cargar. Menos combustible libera peso de carga útil, pero reduce el alcance y la autonomía."
    fr: "Fraction du réservoir de carburant à charger. Moins de carburant libère du poids de charge utile, mais réduit la portée et l'endurance."
    it: "Frazione del serbatoio di carburante da caricare. Meno carburante libera peso del carico utile, ma riduce autonomia e resistenza."
    ja: "燃料タンクにどれだけ搭載するかの割合。燃料を減らすとペイロード重量に余裕ができるが、航続距離と航続時間は短くなる。"
    ko: "연료 탱크에 적재할 비율입니다. 연료를 줄이면 탑재 중량 여유가 생기지만 항속거리와 항속시간이 줄어듭니다."
    "pt-BR": "Fração do tanque de combustível a carregar. Menos combustível libera peso de carga útil, mas reduz alcance e autonomia."
    ru: "Доля заправляемого топливного бака. Меньше топлива освобождает вес полезной нагрузки, но сокращает дальность и продолжительность полёта."
    zh: "要装载的油箱比例。减少燃料可释放载荷重量，但会缩短航程与续航时间。"
    "zh-TW": "要裝載的油箱比例。減少燃料可釋放酬載重量，但會縮短航程與續航時間。"
