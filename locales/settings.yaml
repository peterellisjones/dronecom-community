  follow_inspect_links_tooltip:
    de: "Beim Folgen eines Links im Infofenster auch die Kamera zur verlinkten Einheit bewegen. Aus: Der Link ändert nur, was das Infofenster anzeigt — die Kamera bleibt stehen."
    en: "When following a link in the info panel, also move the camera to the linked entity. Off: the link only changes what the panel inspects — the camera stays put."
    es: "Al seguir un enlace en el panel de información, también mover la cámara hacia la entidad enlazada. Desactivado: el enlace solo cambia lo que inspecciona el panel — la cámara no se mueve."
    fr: "En suivant un lien dans le panneau d'information, déplacer aussi la caméra vers l'entité liée. Désactivé : le lien ne fait que changer ce que le panneau inspecte — la caméra reste immobile."
    it: "Quando si segue un link nel pannello informazioni, sposta anche la telecamera sull'entità collegata. Disattivato: il link cambia solo ciò che il pannello ispeziona — la telecamera resta ferma."
    ja: "情報パネル内のリンクをたどるとき、カメラもリンク先のエンティティへ移動します。オフの場合：リンクはパネルが検査する対象を変更するだけで、カメラはそのままです。"
    ko: "정보 패널의 링크를 따라갈 때 카메라도 연결된 대상으로 이동합니다. 꺼짐: 링크는 패널이 검사하는 대상만 바꾸며 카메라는 그대로 있습니다."
    "pt-BR": "Ao seguir um link no painel de informações, também mover a câmera para a entidade vinculada. Desativado: o link apenas altera o que o painel inspeciona — a câmera permanece parada."
    ru: "При переходе по ссылке в информационной панели также перемещать камеру к связанной сущности. Выключено: ссылка лишь меняет то, что просматривает панель, — камера остаётся на месте."
    zh: "在信息面板中跟随链接时，同时将摄像机移动到链接的实体。关闭：链接只改变面板检视的对象——摄像机保持不动。"
    "zh-TW": "在資訊面板中跟隨連結時，同時將攝影機移動到連結的實體。關閉：連結只改變面板檢視的對象——攝影機保持不動。"
