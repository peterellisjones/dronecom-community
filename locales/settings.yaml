  # #6: Settings → Notifications tab (toast silencing).
  notifications.explainer:
    de: "Stummgeschaltete Ereignisarten zeigen keine Einblendungen. Eine Art wird über die Glocken-Schaltfläche einer Einblendung stummgeschaltet; das Ereignisprotokoll zeichnet weiterhin alles auf."
    en: "Silenced event kinds show no toast pop-ups. Silence a kind with the bell button on any toast; the event log still records everything."
    es: "Los tipos de evento silenciados no muestran avisos emergentes. Silencia un tipo con el botón de campana de cualquier aviso; el registro de eventos sigue grabándolo todo."
    fr: "Les types d'événements réduits au silence n'affichent pas de notifications. Utilisez le bouton cloche d'une notification pour en réduire un au silence ; le journal des événements continue de tout enregistrer."
    it: "I tipi di evento silenziati non mostrano notifiche a comparsa. Silenzia un tipo con il pulsante campana su qualsiasi notifica; il registro eventi continua a registrare tutto."
    ja: "ミュートしたイベント種別はトースト表示されません。トーストのベルボタンで種別をミュートできます。イベントログにはすべて記録されます。"
    ko: "음소거된 이벤트 종류는 토스트 알림이 표시되지 않습니다. 토스트의 종 버튼으로 종류를 음소거할 수 있으며, 이벤트 로그에는 모두 기록됩니다."
    "pt-BR": "Tipos de evento silenciados não mostram avisos. Silencie um tipo com o botão de sino em qualquer aviso; o registro de eventos continua gravando tudo."
    ru: "Отключённые типы событий не показывают всплывающие уведомления. Отключите тип кнопкой с колокольчиком на любом уведомлении; журнал событий по-прежнему записывает всё."
    zh: "已静音的事件类型不会弹出通知。可通过任意通知上的铃铛按钮静音某个类型；事件日志仍会记录所有事件。"
    "zh-TW": "已靜音的事件類型不會彈出通知。可透過任意通知上的鈴鐺按鈕靜音某個類型；事件日誌仍會記錄所有事件。"
  notifications.none_silenced:
    de: "Keine Ereignisarten stummgeschaltet."
    en: "No event kinds are silenced."
