  notifications.duration_tooltip:
    de: "Skaliert, wie lange Benachrichtigungen sichtbar bleiben, als Prozentsatz der Standardwerte. Warnungen und Fehler bleiben proportional länger."
    en: "Scales how long notifications stay on screen, as a percentage of the defaults. Warnings and errors stay proportionally longer."
    es: "Ajusta cuánto tiempo permanecen visibles las notificaciones, como porcentaje de los valores predeterminados. Las advertencias y errores duran proporcionalmente más."
    fr: "Ajuste la durée d'affichage des notifications, en pourcentage des valeurs par défaut. Les avertissements et erreurs restent proportionnellement plus longtemps."
    it: "Regola per quanto tempo le notifiche restano visibili, come percentuale dei valori predefiniti. Avvisi ed errori durano proporzionalmente di più."
    ja: "通知の表示時間を既定値に対する割合で調整します。警告とエラーは比例して長く表示されます。"
    ko: "알림이 화면에 표시되는 시간을 기본값 대비 백분율로 조정합니다. 경고와 오류는 비례해서 더 오래 표시됩니다."
    "pt-BR": "Ajusta por quanto tempo as notificações ficam na tela, como porcentagem dos padrões. Avisos e erros duram proporcionalmente mais."
    ru: "Задаёт, как долго уведомления остаются на экране, в процентах от значений по умолчанию. Предупреждения и ошибки видны пропорционально дольше."
    zh: "以默认值的百分比调整通知在屏幕上的停留时间。警告和错误会按比例停留更久。"
    "zh-TW": "以預設值的百分比調整通知在螢幕上的停留時間。警告和錯誤會按比例停留更久。"
