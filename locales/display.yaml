      ko: "회피 불가"
      "pt-BR": "Sem escape"
      ru: "Без ухода"
      zh: "不可逃逸"
      "zh-TW": "不可逃逸"
    no_escape_tooltip:
      de: "Feuer zurückhalten, bis die Waffe das Ziel erreichen kann, bevor es entkommt"
      en: "Hold fire until the weapon can reach the target before it escapes"
      es: "Retener el fuego hasta que el arma pueda alcanzar al objetivo antes de que escape"
