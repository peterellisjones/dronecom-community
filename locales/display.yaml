      en: "Fire as soon as the target is within maximum weapon range"
      es: "Disparar en cuanto el objetivo esté dentro del alcance máximo del arma"
      fr: "Tirer dès que la cible est à portée maximale de l'arme"
      it: "Fai fuoco appena il bersaglio è entro la gittata massima dell'arma"
      ja: "目標が兵器の最大射程に入り次第発射する"
      ko: "표적이 무기 최대 사거리에 들어오면 즉시 발사"
      "pt-BR": "Disparar assim que o alvo estiver no alcance máximo da arma"
      ru: "Открывать огонь, как только цель войдёт в зону максимальной дальности оружия"
      zh: "目标进入武器最大射程即开火"
      "zh-TW": "目標進入武器最大射程即開火"
    no_escape:
      de: "Kein Entkommen"
