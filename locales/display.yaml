      en: "Max Range"
      es: "Alcance máximo"
      fr: "Portée maximale"
      it: "Gittata massima"
      ja: "最大射程"
      ko: "최대 사거리"
      "pt-BR": "Alcance máximo"
      ru: "Макс. дальность"
