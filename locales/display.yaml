      it: "Trattieni il fuoco finché l'arma non può raggiungere il bersaglio prima che fugga"
      ja: "目標が逃れる前に兵器が到達できるまで発射を控える"
      ko: "표적이 벗어나기 전에 무기가 도달할 수 있을 때까지 발사 보류"
      "pt-BR": "Conter o fogo até que a arma possa alcançar o alvo antes que ele escape"
      ru: "Удерживать огонь, пока оружие не сможет поразить цель до её ухода"
      zh: "保持不开火，直到武器能在目标逃脱前命中"
      "zh-TW": "保持不開火，直到武器能在目標逃脫前命中"
