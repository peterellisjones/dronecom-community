doctrine:
  posture:
    pursue:
      de: "Verfolgen"
      en: "Pursue"
      es: "Perseguir"
      fr: "Poursuivre"
      it: "Inseguire"
      ja: "追撃"
      ko: "추격"
      "pt-BR": "Perseguir"
      ru: "Преследовать"
      zh: "追击"
      "zh-TW": "追擊"
    pursue_tooltip:
      de: Feinde ohne Reichweitenbegrenzung verfolgen und bekämpfen
      en: Pursue and engage hostiles without range limit
      es: Perseguir y atacar enemigos sin límite de alcance
      fr: Poursuivre et engager les ennemis sans limite de portée
      it: Inseguire e ingaggiare i nemici senza limite di portata
      ja: 射程制限なしで敵を追跡・交戦する
      ko: 사거리 제한 없이 적을 추격하고 교전
      "pt-BR": Perseguir e engajar inimigos sem limite de alcance
      ru: Преследовать и атаковать врагов без ограничения дальности
      zh: 无距离限制地追击和交战敌方目标
      "zh-TW": 無距離限制地追擊和交戰敵方目標
    defend:
      de: "Verteidigen"
      en: "Defend"
      es: "Defender"
      fr: "Défendre"
      it: "Difendere"
      ja: "防御"
      ko: "방어"
      "pt-BR": "Defender"
      ru: "Оборонять"
      zh: "防御"
      "zh-TW": "防禦"
    defend_tooltip:
      de: "Feinde in der Nähe des Patrouilliergebiets bekämpfen, Kontakt abbrechen wenn außer Reichweite"
      en: "Engage hostiles near patrol area, break off if they move out of range"
      es: "Atacar enemigos cerca del área de patrulla, retirarse si se alejan"
      fr: "Engager les ennemis proches de la zone de patrouille, décrocher s'ils s'éloignent"
      it: "Ingaggiare i nemici vicino all'area di pattuglia, disimpegnarsi se si allontanano"
      ja: "哨戒エリア付近の敵と交戦、射程外に移動した場合は離脱"
      ko: "초계 구역 근처의 적과 교전, 사거리를 벗어나면 이탈"
      "pt-BR": "Engajar inimigos próximos à área de patrulha, desengajar se saírem do alcance"
      ru: "Атаковать врагов вблизи зоны патрулирования, отступать при выходе за пределы дальности"
      zh: "交战巡逻区域附近的敌人，若其离开射程则脱离"
      "zh-TW": "交戰巡邏區域附近的敵人，若其離開射程則脫離"
    evade:
      de: "Ausweichen"
      en: "Evade"
      es: "Evadir"
      fr: "Esquiver"
      it: "Eludere"
      ja: "回避"
      ko: "회피"
      "pt-BR": "Evadir"
      ru: "Уклоняться"
      zh: "规避"
      "zh-TW": "規避"
    evade_tooltip:
      de: Vor feindlichen und unidentifizierten Kontakten fliehen
      en: Flee from hostile and unidentified contacts
      es: Huir de contactos hostiles y no identificados
      fr: Fuir les contacts hostiles et non identifiés
      it: Fuggire dai contatti ostili e non identificati
      ja: 敵および未識別コンタクトから逃避する
      ko: 적 및 미식별 접촉으로부터 도주
      "pt-BR": Fugir de contatos hostis e não identificados
      ru: Уклоняться от враждебных и неопознанных контактов
      zh: 从敌对及未识别目标处逃离
      "zh-TW": 從敵對及未識別目標處逃離
  roe:
    hold_fire:
      de: "Feuerverbot"
      en: "Hold Fire"
      es: "Armas en espera"
      fr: "Cessez-le-feu"
      it: "Fuoco sospeso"
      ja: "射撃禁止"
      ko: "사격 금지"
      "pt-BR": "Armas em espera"
      ru: "Огонь запрещён"
      zh: "禁止开火"
      "zh-TW": "禁止開火"
    hold_fire_tooltip:
      de: "Keine Kontakte bekämpfen. Eine ausweichende Einheit flieht dennoch vor Feinden; Flucht ist Überleben, kein Waffeneinsatz."
      en: "Do not fire on any contact. An evading unit still flees enemies; fleeing is survival, not firing."
      es: "No atacar ningún contacto. Una unidad en evasión sigue huyendo de los enemigos; huir es supervivencia, no disparar."
      fr: "Ne pas engager de contacts. Une unité en évasion fuit malgré tout les ennemis ; fuir relève de la survie, pas du tir."
      it: "Non ingaggiare nessun contatto. Un'unità in evasione fugge comunque dai nemici; fuggire è sopravvivenza, non fuoco."
      ja: "いかなるコンタクトとも交戦しない。回避中のユニットはそれでも敵から逃げる。逃走は生存行動であり、射撃ではない。"
      ko: "어떤 접촉과도 교전하지 않음. 회피 중인 유닛은 그래도 적으로부터 도주한다; 도주는 생존 반응이며 사격이 아니다."
      "pt-BR": "Não engajar nenhum contato. Uma unidade em evasão ainda foge dos inimigos; fugir é sobrevivência, não disparo."
      ru: "Не атаковать никакие контакты. Уклоняющаяся единица всё равно бежит от врагов; бегство — это выживание, а не стрельба."
      zh: "不与任何目标交战。规避中的单位仍会从敌方处逃离；逃离是求生，而非开火。"
      "zh-TW": "不與任何目標交戰。規避中的單位仍會從敵方處逃離；逃離是求生，而非開火。"
    engage_known:
      de: "Bekannte angreifen"
      en: "Engage Known"
      es: "Atacar conocidos"
      fr: "Engager les connus"
      it: "Ingaggia noti"
      ja: "識別済みと交戦"
      ko: "식별된 적 교전"
      "pt-BR": "Engajar conhecidos"
      ru: "Атаковать известных"
      zh: "交战已知目标"
      "zh-TW": "交戰已知目標"
    engage_known_tooltip:
      de: "Als feindlich identifizierte Kontakte bekämpfen. Eine ausweichende Einheit flieht vor Feinden."
      en: "Fire on contacts identified as enemy. An evading unit flees enemies."
      es: "Atacar contactos identificados como enemigos. Una unidad en evasión huye de los enemigos."
      fr: "Engager les contacts identifiés comme ennemis. Une unité en évasion fuit les ennemis."
      it: "Ingaggiare i contatti identificati come nemici. Un'unità in evasione fugge dai nemici."
      ja: "敵として識別されたコンタクトと交戦。回避中のユニットは敵から逃げる。"
      ko: "적으로 식별된 접촉과 교전. 회피 중인 유닛은 적으로부터 도주한다."
      "pt-BR": "Engajar contatos identificados como inimigos. Uma unidade em evasão foge dos inimigos."
      ru: "Атаковать контакты, идентифицированные как враждебные. Уклоняющаяся единица бежит от врагов."
      zh: "与被识别为敌方的目标交战。规避中的单位会从敌方处逃离。"
      "zh-TW": "與被識別為敵方的目標交戰。規避中的單位會從敵方處逃離。"
    engage_unknown:
      de: "Unbekannte angreifen"
      en: "Engage Unknown"
      es: "Atacar desconocidos"
      fr: "Engager les inconnus"
      it: "Ingaggia sconosciuti"
      ja: "未識別とも交戦"
      ko: "미식별 적 포함 교전"
      "pt-BR": "Engajar desconhecidos"
      ru: "Атаковать неизвестных"
      zh: "交战未知目标"
      "zh-TW": "交戰未知目標"
    engage_unknown_tooltip:
      de: "Feindliche und unidentifizierte Kontakte bekämpfen. Eine ausweichende Einheit flieht vor Feinden und Unbekannten."
      en: "Fire on enemy and unidentified contacts. An evading unit flees enemies and unknowns."
      es: "Atacar contactos enemigos y no identificados. Una unidad en evasión huye de enemigos y desconocidos."
      fr: "Engager les contacts ennemis et non identifiés. Une unité en évasion fuit les ennemis et les inconnus."
      it: "Ingaggiare contatti nemici e non identificati. Un'unità in evasione fugge da nemici e sconosciuti."
      ja: "敵および未識別コンタクトと交戦。回避中のユニットは敵および未識別から逃げる。"
      ko: "적 및 미식별 접촉과 교전. 회피 중인 유닛은 적과 미식별 접촉으로부터 도주한다."
      "pt-BR": "Engajar contatos inimigos e não identificados. Uma unidade em evasão foge de inimigos e desconhecidos."
      ru: "Атаковать враждебные и неопознанные контакты. Уклоняющаяся единица бежит от врагов и неизвестных."
      zh: "与敌方及未识别目标交战。规避中的单位会从敌方及未识别目标处逃离。"
      "zh-TW": "與敵方及未識別目標交戰。規避中的單位會從敵方及未識別目標處逃離。"
