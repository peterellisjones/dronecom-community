    "zh-TW": "時間限制"
  match_timeout_tooltip:
    de: "Das Match automatisch bei einem Zeitlimit beenden. Die Seite mit dem höchsten zerstörten Gegnerwert gewinnt den Stichentscheid; bei genauem Gleichstand endet es unentschieden."
    en: "End the match automatically at a time limit. The side that destroyed the most enemy value wins the tie-break; an exact tie is a draw."
    es: "Terminar la partida automáticamente al alcanzar un límite de tiempo. El bando que haya destruido más valor enemigo gana el desempate; un empate exacto es tablas."
    fr: "Terminer automatiquement la partie à une limite de temps. Le camp ayant détruit le plus de valeur ennemie remporte le départage ; une égalité exacte donne un match nul."
    it: "Termina automaticamente la partita al raggiungimento di un limite di tempo. La fazione che ha distrutto il maggior valore nemico vince lo spareggio; un pareggio esatto è un pareggio."
    ja: "制限時間に達すると試合を自動的に終了します。敵の価値をより多く破壊した陣営がタイブレークで勝利します。完全な同点の場合は引き分けです。"
    ko: "제한 시간에 도달하면 경기가 자동으로 종료됩니다. 적의 가치를 가장 많이 파괴한 진영이 동점자 결정에서 승리합니다. 정확히 동점이면 무승부입니다."
    "pt-BR": "Encerra a partida automaticamente ao atingir o limite de tempo. O lado que destruiu mais valor inimigo vence o desempate; um empate exato é declarado empate."
    ru: "Автоматически завершает матч по истечении лимита времени. Сторона, уничтожившая наибольшую ценность противника, побеждает при равенстве прочих условий; точная ничья — это ничья."
    zh: "达到时间限制后自动结束比赛。摧毁敌方价值最多的一方在平局判定中获胜；完全打平则为平局。"
    "zh-TW": "達到時間限制後自動結束比賽。摧毀敵方價值最多的一方在平局判定中獲勝；完全打平則為平局。"
