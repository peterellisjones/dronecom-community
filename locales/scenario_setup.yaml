    en: "Carriers Destroyed"
    es: "Portaaviones destruidos"
    fr: "Porte-avions détruits"
    it: "Portaerei distrutte"
    ja: "空母撃沈"
    ko: "항공모함 격침"
    "pt-BR": "Porta-aviões destruídos"
    ru: "Авианосцы уничтожены"
    zh: "航母被摧毁"
    "zh-TW": "航母被摧毀"
  win_condition_carriers_tooltip:
    de: "Eine Seite scheidet aus, sobald alle ihre Träger versenkt sind — überlebende Drohnen halten sie nicht im Kampf."
    en: "A side is eliminated once every carrier it owns is sunk — surviving drones don't keep it in the fight."
    es: "Un bando queda eliminado en cuanto se hunden todos sus portaaviones — los drones supervivientes no lo mantienen en la lucha."
    fr: "Un camp est éliminé dès que tous ses porte-avions sont coulés — les drones survivants ne le maintiennent pas dans le combat."
    it: "Una fazione viene eliminata non appena tutte le sue portaerei sono affondate — i droni superstiti non la mantengono in combattimento."
    ja: "保有する空母がすべて撃沈された時点で、その陣営は脱落します。生き残ったドローンがいても戦闘には留まりません。"
    ko: "보유한 항공모함이 모두 격침되면 그 진영은 탈락합니다 — 살아남은 드론이 있어도 전투에 남지 못합니다."
    "pt-BR": "Um lado é eliminado assim que todos os seus porta-aviões são afundados — drones sobreviventes não o mantêm na luta."
    ru: "Сторона выбывает, как только потоплены все её авианосцы, — уцелевшие дроны не удерживают её в бою."
    zh: "当一方拥有的所有航母都被击沉时，该方即被淘汰——幸存的无人机无法让其继续作战。"
    "zh-TW": "當一方擁有的所有航母都被擊沉時，該方即被淘汰——倖存的無人機無法讓其繼續作戰。"
  win_condition_all_units:
    de: "Alle Einheiten zerstört"
    en: "All Units Destroyed"
    es: "Todas las unidades destruidas"
    fr: "Toutes les unités détruites"
    it: "Tutte le unità distrutte"
    ja: "全ユニット撃破"
    ko: "전 유닛 격파"
    "pt-BR": "Todas as unidades destruídas"
    ru: "Все юниты уничтожены"
    zh: "全部单位被摧毁"
    "zh-TW": "全部單位被摧毀"
  win_condition_all_units_tooltip:
    de: "Eine Seite scheidet erst aus, wenn alle ihre Einheiten — Träger wie Drohnen — zerstört sind."
    en: "A side is eliminated only once every unit it owns — carriers and drones alike — is destroyed."
    es: "Un bando solo queda eliminado cuando se destruyen todas sus unidades, tanto portaaviones como drones."
    fr: "Un camp n'est éliminé que lorsque toutes ses unités — porte-avions et drones — sont détruites."
    it: "Una fazione viene eliminata solo quando tutte le sue unità — portaerei e droni — sono distrutte."
    ja: "保有するすべてのユニット（空母・ドローンを問わず）が破壊された時点で、初めてその陣営は脱落します。"
    ko: "보유한 모든 유닛(항공모함과 드론 모두)이 파괴되어야만 그 진영이 탈락합니다."
    "pt-BR": "Um lado só é eliminado quando todas as suas unidades — porta-aviões e drones — são destruídas."
    ru: "Сторона выбывает только тогда, когда уничтожены все её юниты — как авианосцы, так и дроны."
    zh: "只有当一方拥有的所有单位——航母与无人机皆然——都被摧毁时，该方才被淘汰。"
    "zh-TW": "只有當一方擁有的所有單位——航母與無人機皆然——都被摧毀時，該方才被淘汰。"
  match_timeout:
