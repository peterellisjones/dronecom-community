    "zh-TW": "戰術真實性"
  ally_mode_sensor:
    de: "Verbündete müssen per Sensor identifiziert werden"
    en: "Allies must be identified by sensor"
    es: "Los aliados deben ser identificados por sensor"
    fr: "Les alliés doivent être identifiés par capteur"
    it: "Gli alleati devono essere identificati dal sensore"
    ja: "味方はセンサーで識別する必要がある"
    ko: "아군은 센서로 식별해야 함"
    "pt-BR": "Aliados devem ser identificados por sensor"
    ru: "Союзников необходимо идентифицировать датчиками"
    zh: "盟军必须通过传感器识别"
    "zh-TW": "盟軍必須透過感測器識別"
  ally_mode_sensor_tooltip:
    de: "Verbündete Einheiten erscheinen als unbekannte Kontakte, bis Ihre Sensoren sie identifizieren. Erfordert ausreichende Signalstärke für die IFF-Erkennung."
    en: "Allied units appear as unknown contacts until your sensors identify them. Requires sufficient signal strength for IFF identification."
    es: "Las unidades aliadas aparecen como contactos desconocidos hasta que sus sensores las identifiquen. Requiere suficiente intensidad de señal para la identificación IFF."
    fr: "Les unités alliées apparaissent comme contacts inconnus jusqu'à ce que vos capteurs les identifient. Nécessite une intensité de signal suffisante pour l'identification IFF."
    it: "Le unità alleate appaiono come contatti sconosciuti finché i sensori non le identificano. Richiede un'intensità di segnale sufficiente per l'identificazione IFF."
    ja: "味方ユニットはセンサーが識別するまで未確認コンタクトとして表示されます。IFF識別には十分な信号強度が必要です。"
    ko: "아군 유닛은 센서가 식별할 때까지 미확인 접촉으로 표시됩니다. IFF 식별을 위해 충분한 신호 강도가 필요합니다."
    "pt-BR": "Unidades aliadas aparecem como contatos desconhecidos até que seus sensores as identifiquem. Requer intensidade de sinal suficiente para identificação IFF."
    ru: "Союзные юниты отображаются как неизвестные контакты, пока ваши датчики не идентифицируют их. Требуется достаточная мощность сигнала для идентификации IFF."
    zh: "盟军单位显示为未知目标，直到您的传感器识别它们。需要足够的信号强度进行IFF识别。"
    "zh-TW": "盟軍單位顯示為未知目標，直到您的感測器識別它們。需要足夠的信號強度進行IFF識別。"
  ally_mode_datalink:
    de: "Verbündete über Datenverbindung vernetzt"
    en: "Allies linked via datalink"
    es: "Aliados enlazados por datalink"
    fr: "Alliés reliés par liaison de données"
    it: "Alleati collegati via datalink"
    ja: "味方はデータリンクで連携"
    ko: "아군 데이터링크 연결"
    "pt-BR": "Aliados conectados por datalink"
    ru: "Союзники связаны каналом передачи данных"
    zh: "盟军通过数据链互联"
    "zh-TW": "盟軍透過資料鏈互聯"
  ally_mode_datalink_tooltip:
    de: "Verbündete Einheiten teilen automatisch ihre Positionen. Freundliche Kontakte erscheinen sofort ohne Sensorerkennung."
    en: "Allied units automatically share their positions. Friendly contacts appear immediately without sensor detection."
    es: "Las unidades aliadas comparten automáticamente sus posiciones. Los contactos amigos aparecen inmediatamente sin detección por sensor."
    fr: "Les unités alliées partagent automatiquement leurs positions. Les contacts amis apparaissent immédiatement sans détection par capteur."
    it: "Le unità alleate condividono automaticamente le loro posizioni. I contatti amici appaiono immediatamente senza rilevamento sensore."
    ja: "味方ユニットは自動的に位置を共有します。友軍コンタクトはセンサー検出なしで即座に表示されます。"
    ko: "아군 유닛이 자동으로 위치를 공유합니다. 아군 접촉이 센서 탐지 없이 즉시 표시됩니다."
    "pt-BR": "Unidades aliadas compartilham suas posições automaticamente. Contatos amigos aparecem imediatamente sem detecção por sensor."
    ru: "Союзные юниты автоматически делятся своими позициями. Дружественные контакты появляются мгновенно без обнаружения датчиками."
    zh: "盟军单位自动共享位置。友方目标无需传感器探测即可立即显示。"
    "zh-TW": "盟軍單位自動共享位置。友方目標無需感測器探測即可立即顯示。"
  terrain_masking:
    de: "Sensor-Geländeabschirmung"
    en: "Sensor Terrain Masking"
    es: "Enmascaramiento de terreno del sensor"
    fr: "Masquage terrain des capteurs"
    it: "Mascheramento terreno sensori"
    ja: "センサー地形遮蔽"
    ko: "센서 지형 차폐"
    "pt-BR": "Mascaramento de terreno do sensor"
    ru: "Маскировка датчиков рельефом"
    zh: "传感器地形遮蔽"
    "zh-TW": "感測器地形遮蔽"
  terrain_masking_tooltip:
    de: "Wenn aktiviert, blockiert Gelände die Sichtlinie von Sensoren. Berge und Unterwassererhebungen können Kontakte vor Radar, Sonar und anderen Sensoren verbergen."
    en: "When enabled, terrain blocks sensor line-of-sight. Mountains and seabed features can hide contacts from radar, sonar, and other sensors."
    es: "Cuando está activado, el terreno bloquea la línea de visión de los sensores. Las montañas y el relieve submarino pueden ocultar contactos del radar, sonar y otros sensores."
    fr: "Lorsqu'activé, le terrain bloque la ligne de vue des capteurs. Les montagnes et le relief sous-marin peuvent cacher des contacts au radar, au sonar et aux autres capteurs."
    it: "Quando attivo, il terreno blocca la linea di vista dei sensori. Montagne e rilievi del fondale possono nascondere contatti a radar, sonar e altri sensori."
    ja: "有効にすると、地形がセンサーの視線を遮ります。山やフィーチャーがレーダー、ソナー、その他のセンサーからコンタクトを隠すことがあります。"
    ko: "활성화하면 지형이 센서 시선을 차단합니다. 산과 해저 지형이 레이더, 소나 및 기타 센서로부터 접촉을 숨길 수 있습니다."
    "pt-BR": "Quando ativado, o terreno bloqueia a linha de visão dos sensores. Montanhas e relevo submarino podem esconder contatos de radar, sonar e outros sensores."
    ru: "При включении рельеф блокирует прямую видимость датчиков. Горы и подводный рельеф могут скрывать контакты от радара, сонара и других датчиков."
    zh: "启用后，地形将阻挡传感器视线。山脉和海底地形可以将目标隐藏在雷达、声纳和其他传感器之外。"
    "zh-TW": "啟用後，地形將阻擋感測器視線。山脈和海底地形可以將目標隱藏在雷達、聲納和其他感測器之外。"
  earth_curvature:
    de: "Erdkrümmungsmodellierung"
    en: "Earth Curvature Modelling"
    es: "Modelado de curvatura terrestre"
    fr: "Modélisation de la courbure terrestre"
    it: "Modellazione curvatura terrestre"
    ja: "地球曲率モデリング"
    ko: "지구 곡률 모델링"
    "pt-BR": "Modelagem de curvatura da Terra"
    ru: "Моделирование кривизны Земли"
    zh: "地球曲率建模"
    "zh-TW": "地球曲率建模"
  earth_curvature_tooltip:
    de: "Wenn aktiviert, begrenzt die Erdkrümmung die Radar- und RWR-Reichweite. Niedrig fliegende Ziele verschwinden hinter dem Horizont. Betrifft nicht Sonar. Also affects look-down clutter calculations: look-down clutter is measured from the radar horizon rather than the horizontal."
    en: "When enabled, earth curvature limits radar and RWR range. Low-flying targets disappear beyond the horizon. Also affects look-down clutter calculations: look-down clutter is measured from the radar horizon rather than the horizontal. Does not affect sonar."
    es: "Cuando está activado, la curvatura terrestre limita el alcance del radar y RWR. Los objetivos a baja altitud desaparecen más allá del horizonte. No afecta al sonar. Also affects look-down clutter calculations: look-down clutter is measured from the radar horizon rather than the horizontal."
    fr: "Lorsqu'activé, la courbure terrestre limite la portée radar et RWR. Les cibles à basse altitude disparaissent au-delà de l'horizon. N'affecte pas le sonar. Also affects look-down clutter calculations : look-down clutter is measured from the radar horizon rather than the horizontal."
    it: "Quando attivo, la curvatura terrestre limita la portata radar e RWR. I bersagli a bassa quota scompaiono oltre l'orizzonte. Non influisce sul sonar. Also affects look-down clutter calculations: look-down clutter is measured from the radar horizon rather than the horizontal."
    ja: "有効にすると、地球の曲率がレーダーとRWRの探知距離を制限します。低空飛行の目標は水平線の向こうに消えます。ソナーには影響しません。Also affects look-down clutter calculations：look-down clutter is measured from the radar horizon rather than the horizontal."
    ko: "활성화하면 지구 곡률이 레이더 및 RWR 범위를 제한합니다. 저고도 목표는 수평선 너머로 사라집니다. 소나에는 영향을 미치지 않습니다. Also affects look-down clutter calculations：look-down clutter is measured from the radar horizon rather than the horizontal."
    "pt-BR": "Quando ativado, a curvatura da Terra limita o alcance de radar e RWR. Alvos em baixa altitude desaparecem além do horizonte. Não afeta o sonar. Also affects look-down clutter calculations: look-down clutter is measured from the radar horizon rather than the horizontal."
    ru: "При включении кривизна Земли ограничивает дальность радара и СПО. Низколетящие цели исчезают за горизонтом. Не влияет на сонар. Also affects look-down clutter calculations: look-down clutter is measured from the radar horizon rather than the horizontal."
    zh: "启用后，地球曲率限制雷达和RWR探测范围。低空飞行目标消失在地平线之外。不影响声纳。Also affects look-down clutter calculations：look-down clutter is measured from the radar horizon rather than the horizontal."
    "zh-TW": "啟用後，地球曲率限制雷達和RWR探測範圍。低空飛行目標消失在地平線之外。不影響聲納。Also affects look-down clutter calculations：look-down clutter is measured from the radar horizon rather than the horizontal."
  notching:
    de: "Radar- & Sonar-Notching"
    en: "Radar & Sonar Notching"
    es: "Notching de radar y sónar"
    fr: "Notching radar et sonar"
    it: "Notching radar e sonar"
    ja: "レーダー・ソナーノッチング"
    ko: "레이더 및 소나 노칭"
    "pt-BR": "Notching de radar e sonar"
    ru: "Нотчинг радара и сонара"
    zh: "雷达与声纳凹陷效应"
    "zh-TW": "雷達與聲納凹陷效應"
  notching_tooltip:
    de: "Ziele, die senkrecht zum Sensorstrahl fliegen, sind schwerer zu erfassen. Pulsdoppler-Radare und aktive Sonare filtern Rückkehrsignale anhand der Relativbewegung: Ziele mit geringer Radialgeschwindigkeit gehen im Störsignal unter."
    en: "Targets moving perpendicular to a sensor beam are harder to detect. Pulse-doppler radars and active sonars use relative motion to filter returns: targets with low radial velocity blend into the clutter."
    es: "Los objetivos que se mueven perpendiculares al haz del sensor son más difíciles de detectar. Los radares pulso-doppler y los sónares activos usan el movimiento relativo para filtrar retornos: los objetivos con baja velocidad radial se funden con el ruido de fondo."
    fr: "Les cibles se déplaçant perpendiculairement au faisceau d'un capteur sont plus difficiles à détecter. Les radars pulse-Doppler et les sonars actifs utilisent le mouvement relatif pour filtrer les retours : les cibles à faible vitesse radiale se confondent avec le fouillis."
    it: "I bersagli che si muovono perpendicolarmente al fascio del sensore sono più difficili da rilevare. I radar a impulsi Doppler e i sonar attivi filtrano i ritorni in base al moto relativo: i bersagli con bassa velocità radiale si confondono con il clutter."
    ja: "センサービームに対して垂直に移動する目標は探知が困難です。パルスドップラーレーダーとアクティブソナーは相対運動で受信信号をフィルタリングします：半径方向速度が低い目標はクラッターに紛れます。"
    ko: "센서 빔에 수직으로 이동하는 표적은 탐지가 더 어렵습니다. 펄스 도플러 레이더와 능동 소나는 상대 운동으로 반사파를 필터링하며, 시선 속도가 낮은 표적은 클러터에 묻힙니다."
    "pt-BR": "Alvos que se movem perpendicularmente ao feixe de um sensor são mais difíceis de detectar. Radares pulso-Doppler e sonares ativos filtram os retornos pelo movimento relativo: alvos com baixa velocidade radial se misturam ao ruído."
    ru: "Цели, движущиеся перпендикулярно лучу датчика, обнаружить сложнее. Импульсно-доплеровские радары и активные сонары используют относительное движение для фильтрации отражений: цели с низкой радиальной скоростью сливаются с помехами."
    zh: "垂直于传感器波束方向移动的目标更难被探测。脉冲多普勒雷达和主动声纳依据相对运动过滤回波：径向速度较低的目标会融入杂波中。"
    "zh-TW": "垂直於感測器波束方向移動的目標更難被探測。脈衝都卜勒雷達和主動聲納依據相對運動過濾回波：徑向速度較低的目標會融入雜波中。"
  look_down_clutter:
    de: "Look-Down-Clutter"
    en: "Look-Down Clutter"
    es: "Saturación en mira hacia abajo"
    fr: "Fouillis en visée descendante"
    it: "Clutter in visione dall'alto"
    ja: "ルックダウン・クラッター"
    ko: "하방 탐지 클러터"
    "pt-BR": "Clutter em visão descendente"
    ru: "Помехи при обзоре вниз"
    zh: "下视杂波"
    "zh-TW": "下視雜波"
  look_down_clutter_tooltip:
    de: "Radare, die tief fliegende Ziele von oben beobachten, empfangen konkurrierende Rückstrahlungen vom Boden. Je steiler der Blickwinkel nach unten, desto stärker das Störsignal."
    en: "Radars looking down at low-altitude targets receive competing returns from the ground. The steeper the look-down angle, the stronger the clutter."
    es: "Los radares que observan objetivos a baja altitud desde arriba reciben retornos competitivos del suelo. Cuanto más pronunciado sea el ángulo de mira hacia abajo, más fuerte será el ruido."
    fr: "Les radars observant des cibles à basse altitude depuis le haut reçoivent des échos concurrents venant du sol. Plus l'angle de visée descendante est prononcé, plus le fouillis est intense."
    it: "I radar che osservano bersagli a bassa quota dall'alto ricevono ritorni concorrenti dal terreno. Più l'angolo di visione dall'alto è ripido, più forte è il clutter."
    ja: "低空目標を見下ろすレーダーは地面からの競合反射を受信します。俯角が急になるほどクラッターは強くなります。"
    ko: "저고도 표적을 내려다보는 레이더는 지면으로부터의 경쟁 반사를 받습니다. 하방 각도가 가파를수록 클러터는 더 강해집니다."
    "pt-BR": "Radares que observam alvos a baixa altitude de cima recebem retornos concorrentes do solo. Quanto mais acentuado o ângulo descendente, mais forte é o clutter."
    ru: "Радары, обозревающие низколетящие цели сверху, получают конкурирующие отражения от земли. Чем круче угол обзора вниз, тем сильнее помехи."
    zh: "从上方探测低空目标的雷达会收到来自地面的竞争回波。俯视角度越陡，杂波就越强。"
    "zh-TW": "從上方探測低空目標的雷達會收到來自地面的競爭回波。俯視角度越陡，雜波就越強。"
  noisy_sensing:
    de: "Sensorrauschen"
    en: "Sensor Noise"
    es: "Ruido del sensor"
    fr: "Bruit des capteurs"
    it: "Rumore dei sensori"
    ja: "センサーノイズ"
    ko: "센서 노이즈"
    "pt-BR": "Ruído do sensor"
    ru: "Шум датчиков"
    zh: "传感器噪声"
    "zh-TW": "感測器雜訊"
  noisy_sensing_tooltip:
    de: "Sensoren liefern verrauschte Messungen, die von einem Spurfilter fusioniert werden: Die Unsicherheit wächst zwischen Beobachtungen und schrumpft bei erneuter Erfassung. Wenn deaktiviert, liefert jede Erfassung exakte Position und Geschwindigkeit."
    en: "Sensors produce noisy measurements fused by a per-track filter: uncertainty grows between observations and shrinks on re-detection, and lost tracks dead-reckon forward. When off, each detection gives an exact position and velocity and stale tracks freeze."
    es: "Los sensores producen mediciones con ruido fusionadas por un filtro de rastreo: la incertidumbre crece entre observaciones y disminuye al volver a detectar. Cuando está desactivado, cada detección da posición y velocidad exactas."
    fr: "Les capteurs produisent des mesures bruitées fusionnées par un filtre de piste : l'incertitude croît entre les observations et diminue lors d'une nouvelle détection. Désactivé, chaque détection donne une position et une vitesse exactes."
    it: "I sensori producono misurazioni con rumore fuse da un filtro di traccia: l'incertezza cresce tra le osservazioni e si riduce al rilevamento successivo. Se disattivato, ogni rilevamento fornisce posizione e velocità esatte."
    ja: "センサーは測定ノイズを含む観測を生成し、トラックごとのフィルターで統合します。観測間で不確かさが増大し、再探知で減少します。無効時は各探知が正確な位置と速度を与えます。"
    ko: "센서는 노이즈가 포함된 측정값을 생성하며 트랙별 필터로 융합됩니다. 관측 사이에 불확실성이 커지고 재탐지 시 줄어듭니다. 끄면 각 탐지가 정확한 위치와 속도를 제공합니다."
    "pt-BR": "Os sensores produzem medições com ruído fundidas por um filtro por trilha: a incerteza cresce entre observações e diminui na redetecção. Quando desativado, cada detecção fornece posição e velocidade exatas."
    ru: "Датчики выдают зашумлённые измерения, объединяемые фильтром по каждой трассе: неопределённость растёт между наблюдениями и уменьшается при повторном обнаружении. При отключении каждое обнаружение даёт точные координаты и скорость."
    zh: "传感器产生含噪测量，并由逐航迹滤波器融合：不确定性在观测间增长，在重新探测时减小。关闭时，每次探测给出精确的位置和速度。"
    "zh-TW": "感測器產生含噪測量，並由逐航跡濾波器融合：不確定性在觀測間增長，在重新探測時減小。關閉時，每次探測給出精確的位置和速度。"
  thermocline:
    de: "Thermokline"
    en: "Thermocline"
    es: "Termoclina"
    fr: "Thermocline"
    it: "Termoclino"
    ja: "水温躍層"
    ko: "수온약층"
    "pt-BR": "Termoclina"
    ru: "Термоклин"
    zh: "温跃层"
    "zh-TW": "溫躍層"
  thermocline_tooltip:
    de: "Eine Temperaturschicht in der eingestellten Tiefe bricht Schallwellen und erzeugt darunter eine Schattenzone. Aktives Sonar ist beim Durchdringen der Schicht doppelt benachteiligt."
    en: "A temperature layer at the configured depth refracts sound, creating a shadow zone below. Active sonar is doubly penalized across the layer."
    es: "Una capa de temperatura a la profundidad configurada refracta el sonido, creando una zona de sombra debajo. El sónar activo se ve doblemente penalizado al cruzarla."
    fr: "Une couche de température à la profondeur configurée réfracte le son, créant une zone d'ombre en dessous. Le sonar actif est doublement pénalisé en traversant la couche."
    it: "Uno strato di temperatura alla profondità configurata rifrange il suono, creando una zona d'ombra sottostante. Il sonar attivo subisce una doppia penalizzazione nell'attraversarlo."
    ja: "設定された深度にある温度層が音を屈折させ、その下に影の領域を作ります。アクティブソナーはこの層を貫通する際に二重のペナルティを受けます。"
    ko: "설정된 깊이의 온도층이 음파를 굴절시켜 아래쪽에 그림자 구역을 만듭니다. 능동 소나는 이 층을 통과할 때 두 배로 불리해집니다."
    "pt-BR": "Uma camada de temperatura na profundidade configurada refrata o som, criando uma zona de sombra abaixo. O sonar ativo é duplamente penalizado ao atravessar a camada."
    ru: "Температурный слой на заданной глубине преломляет звук, создавая теневую зону ниже. Активный сонар получает двойной штраф при пересечении слоя."
    zh: "在设定深度形成的温度层会折射声波，在其下方形成声影区。主动声纳穿越该层时受到双重惩罚。"
    "zh-TW": "在設定深度形成的溫度層會折射聲波，在其下方形成聲影區。主動聲納穿越該層時受到雙重懲罰。"
  thermocline_depth:
    de: "Thermoklinentiefe"
    en: "Thermocline Depth"
    es: "Profundidad de la termoclina"
    fr: "Profondeur de la thermocline"
    it: "Profondità del termoclino"
    ja: "水温躍層の深度"
    ko: "수온약층 깊이"
    "pt-BR": "Profundidade da termoclina"
    ru: "Глубина термоклина"
    zh: "温跃层深度"
    "zh-TW": "溫躍層深度"
  thermocline_depth_tooltip:
    de: "Tiefe der Thermoklinenschicht in Metern. U-Boote unterhalb dieser Tiefe sind von oben schwerer zu erfassen."
    en: "Depth of the thermocline layer in metres. Submarines below this depth are harder to detect from above."
    es: "Profundidad de la capa termoclina en metros. Los submarinos por debajo de esta profundidad son más difíciles de detectar desde arriba."
    fr: "Profondeur de la couche thermocline en mètres. Les sous-marins situés en dessous sont plus difficiles à détecter depuis la surface."
    it: "Profondità dello strato termoclino in metri. I sottomarini al di sotto di questa profondità sono più difficili da rilevare dall'alto."
    ja: "水温躍層の深度(メートル)。この深度より下にいる潜水艦は上からの探知が困難になります。"
    ko: "수온약층의 깊이(미터). 이 깊이 아래의 잠수함은 위에서 탐지하기 더 어렵습니다."
    "pt-BR": "Profundidade da camada de termoclina em metros. Submarinos abaixo dessa profundidade são mais difíceis de detectar de cima."
    ru: "Глубина слоя термоклина в метрах. Подводные лодки ниже этой глубины сложнее обнаружить сверху."
    zh: "温跃层深度（米）。位于该深度以下的潜艇从上方更难被探测。"
    "zh-TW": "溫躍層深度（公尺）。位於該深度以下的潛艇從上方更難被探測。"
  shallow_water_attenuation:
    de: "Dämpfung in flachem Wasser"
    en: "Shallow Water Attenuation"
    es: "Atenuación en aguas someras"
    fr: "Atténuation en eau peu profonde"
    it: "Attenuazione in acque basse"
    ja: "浅海域の減衰"
    ko: "천해 감쇠"
    "pt-BR": "Atenuação em águas rasas"
    ru: "Затухание на мелководье"
    zh: "浅水衰减"
    "zh-TW": "淺水衰減"
  shallow_water_attenuation_tooltip:
    de: "Zwischen Oberfläche und Meeresboden reflektierter Schall verliert bei jeder Reflexion Energie. Flacheres Wasser bedeutet mehr Reflexionen pro Kilometer und kürzere Ortungsreichweiten."
    en: "Sound bouncing between the surface and seabed loses energy with each reflection. Shallower water means more bounces per kilometre and shorter detection ranges."
    es: "El sonido que rebota entre la superficie y el fondo marino pierde energía con cada reflexión. Aguas más someras significan más rebotes por kilómetro y rangos de detección más cortos."
    fr: "Le son rebondissant entre la surface et le fond marin perd de l'énergie à chaque réflexion. Des eaux moins profondes impliquent plus de rebonds par kilomètre et des portées de détection plus courtes."
    it: "Il suono che rimbalza tra la superficie e il fondale perde energia a ogni riflessione. Acque più basse significano più rimbalzi per chilometro e minori portate di rilevamento."
    ja: "海面と海底の間で反射を繰り返す音波は、反射のたびにエネルギーを失います。浅い海では1kmあたりの反射回数が増え、探知距離が短くなります。"
    ko: "해수면과 해저 사이에서 반사되는 음파는 반사마다 에너지를 잃습니다. 얕은 바다는 킬로미터당 반사 횟수가 많아 탐지 거리가 짧아집니다."
    "pt-BR": "O som que ricocheteia entre a superfície e o leito marinho perde energia a cada reflexão. Águas mais rasas significam mais ricochetes por quilômetro e alcances de detecção mais curtos."
    ru: "Звук, отражающийся между поверхностью и морским дном, теряет энергию при каждом отражении. На мелководье больше отражений на километр и меньше дальность обнаружения."
    zh: "在海面和海床间反射的声波每次反射都会损失能量。水越浅，每千米反射次数越多，探测距离越短。"
    "zh-TW": "在海面和海床間反射的聲波每次反射都會損失能量。水越淺，每公里反射次數越多，探測距離越短。"
  convergence_zones:
    de: "Konvergenzzonen"
    en: "Convergence Zones"
    es: "Zonas de convergencia"
    fr: "Zones de convergence"
    it: "Zone di convergenza"
    ja: "収束帯"
    ko: "수렴 구역"
    "pt-BR": "Zonas de convergência"
    ru: "Зоны конвергенции"
    zh: "会聚区"
    "zh-TW": "會聚區"
  convergence_zones_tooltip:
    de: "Schallwellen, die in der Tiefsee gebrochen werden, fokussieren sich an der Oberfläche in ringförmigen Zonen und verbessern die Ortung in bestimmten Entfernungen. Der Effekt schwächt sich in flachem Wasser ab."
    en: "Sound refracting through deep water refocuses at the surface in annular rings, boosting detection at specific ranges. The effect weakens in shallow water."
    es: "El sonido refractado en aguas profundas vuelve a enfocarse en la superficie en anillos concéntricos, mejorando la detección a distancias específicas. El efecto se debilita en aguas someras."
    fr: "Le son réfracté en eau profonde se refocalise à la surface en anneaux annulaires, améliorant la détection à certaines distances. L'effet s'affaiblit en eaux peu profondes."
    it: "Il suono rifratto in acque profonde si rifocalizza in superficie in anelli anulari, potenziando il rilevamento a distanze specifiche. L'effetto si indebolisce in acque basse."
    ja: "深海で屈折する音波は、海面で環状の輪となって再収束し、特定の距離での探知を強化します。浅海ではこの効果が弱まります。"
    ko: "심해에서 굴절된 음파는 해수면에서 환형 고리로 재수렴되어 특정 거리에서 탐지 성능을 높입니다. 얕은 바다에서는 이 효과가 약해집니다."
    "pt-BR": "O som refratado em águas profundas refocaliza-se na superfície em anéis concêntricos, reforçando a detecção em distâncias específicas. O efeito enfraquece em águas rasas."
    ru: "Звук, преломляющийся в глубоких водах, вновь фокусируется у поверхности в виде кольцевых зон, улучшая обнаружение на определённых дистанциях. Эффект слабеет на мелководье."
    zh: "在深水中折射的声波会在海面重新聚焦成环状带，在特定距离上增强探测能力。此效应在浅水中减弱。"
    "zh-TW": "在深水中折射的聲波會在海面重新聚焦成環狀帶，在特定距離上增強探測能力。此效應在淺水中減弱。"
