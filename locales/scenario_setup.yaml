_version: 2

scenario_setup:
  build_time_multiplier_tooltip:
    de: "Skaliert die Bauzeit von Einheiten. 1.0 ist normal; niedriger ist schneller, 0 macht den Bau sofort."
    en: "Scales how long units take to build. 1.0 is normal; lower is faster, and 0 makes builds instant."
    es: "Escala el tiempo que tardan en construirse las unidades. 1.0 es normal; menos es más rápido, y 0 hace la construcción instantánea."
    fr: "Ajuste le temps de construction des unités. 1.0 est normal ; plus bas est plus rapide, et 0 rend la construction instantanée."
    it: "Scala il tempo di costruzione delle unità. 1.0 è normale; più basso è più veloce e 0 rende la costruzione istantanea."
    ja: "ユニットの建造時間を倍率で調整する。1.0が標準で、低いほど速く、0で即時建造になる。"
    ko: "유닛 건조 시간을 배율로 조정합니다. 1.0이 기본이며 낮을수록 빠르고, 0이면 즉시 건조됩니다."
    "pt-BR": "Ajusta o tempo de construção das unidades. 1.0 é o normal; menor é mais rápido, e 0 torna a construção instantânea."
    ru: "Множитель времени постройки юнитов. 1.0 — обычное; меньше — быстрее, 0 делает постройку мгновенной."
    zh: "缩放单位的建造时长。1.0 为正常；越低越快，0 则瞬间建成。"
    "zh-TW": "縮放單位的建造時長。1.0 為正常；越低越快，0 則瞬間建成。"
  match_timeout_minutes_tooltip:
    de: "Wie lange das Match läuft, bevor es automatisch endet. Läuft die Zeit ab, gewinnt die Seite, die den höchsten Gesamtwert an gegnerischen Einheiten zerstört hat; bei Gleichstand ein Unentschieden."
    en: "How long the match runs before it ends automatically. When the timer expires, the side that has destroyed the greatest total value of enemy units wins; an exact tie is a draw."
    es: "Cuánto dura la partida antes de terminar automáticamente. Al expirar el temporizador, gana el bando que haya destruido el mayor valor total de unidades enemigas; un empate exacto es tablas."
    fr: "Durée de la partie avant sa fin automatique. À l'expiration du minuteur, le camp ayant détruit la plus grande valeur totale d'unités ennemies l'emporte ; une égalité parfaite est un match nul."
    it: "Quanto dura la partita prima di terminare automaticamente. Allo scadere del tempo vince lo schieramento che ha distrutto il maggior valore totale di unità nemiche; un pareggio esatto è patta."
    ja: "試合が自動終了するまでの長さ。時間切れの時点で、敵ユニットを最も多く（総価値で）撃破した陣営が勝利する。完全な同点は引き分け。"
    ko: "경기가 자동으로 종료되기까지의 시간. 타이머가 만료되면 적 유닛을 총 가치 기준으로 가장 많이 파괴한 진영이 승리하며, 정확히 동점이면 무승부입니다."
    "pt-BR": "Quanto tempo a partida dura antes de terminar automaticamente. Ao expirar o cronômetro, vence o lado que destruiu o maior valor total de unidades inimigas; um empate exato é empate."
    ru: "Сколько длится матч до автоматического завершения. По истечении таймера побеждает сторона, уничтожившая наибольшую суммарную стоимость вражеских юнитов; точная ничья — ничья."
    zh: "比赛自动结束前的时长。计时结束时，摧毁敌方单位总价值最高的一方获胜；完全打平则为平局。"
    "zh-TW": "比賽自動結束前的時長。計時結束時，摧毀敵方單位總價值最高的一方獲勝；完全打平則為平局。"
