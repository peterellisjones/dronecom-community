      "pt-BR": "Outros %{count} sensores também detectam este contato. É exibido o mais forte."
      ru: "Этот контакт обнаруживают ещё %{count} датчиков. Показан самый сильный."
      zh: "另有 %{count} 个传感器也在探测此接触。显示的是信号最强的一个。"
      "zh-TW": "另有 %{count} 個感測器也在偵測此接觸。顯示的是訊號最強的一個。"
