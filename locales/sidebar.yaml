  auto_form_groups_tooltip:
    de: "Wenn aktiviert, bildet ein Befehl über mehrere Einheiten eine einzige Gruppe. Wenn deaktiviert, wird jede Einheit einzeln beauftragt."
    en: "When on, one order over several units forms a single group. When off, each unit is tasked independently."
    es: "Cuando está activado, una orden sobre varias unidades forma un solo grupo. Cuando está desactivado, cada unidad recibe órdenes por separado."
    fr: "Activé : un ordre sur plusieurs unités forme un seul groupe. Désactivé : chaque unité reçoit son ordre séparément."
    it: "Se attivo, un ordine su più unità forma un unico gruppo. Se disattivo, ogni unità riceve ordini in modo indipendente."
    ja: "オンの場合、複数ユニットへの命令は単一のグループを編成します。オフの場合、各ユニットは個別に指示されます。"
    ko: "켜면 여러 유닛에 대한 명령이 하나의 그룹을 편성합니다. 끄면 각 유닛이 개별적으로 지시됩니다."
    "pt-BR": "Quando ativado, uma ordem sobre várias unidades forma um único grupo. Quando desativado, cada unidade recebe ordens separadamente."
    ru: "Если включено, один приказ для нескольких юнитов формирует единую группу. Если выключено, каждый юнит получает задачу отдельно."
    zh: "开启时，对多个单位下达的命令将编成一个编组。关闭时，每个单位单独受命。"
    "zh-TW": "開啟時，對多個單位下達的命令將編成一個編組。關閉時，每個單位單獨受命。"
