# DC-35.7.7 Task 11: group inspect panel scaffold (header + status). Mission,
# Doctrine, Members, and Disband sections land in Tasks 12-13.
group_panel:
  # DC-1002: rename UX strings live under `info_panel.rename.*` (shared with
  # the vehicle inspect panel). The previous `group_panel.rename` block was
  # removed when the UX became click-to-edit via a pencil icon.
  # DC-991: discoverability hint shown at the bottom of the group inspect
  # panel for the inverted click default (default click = group, Alt = unit).
  alt_click_hint:
    de: "Klick auf ein Mitglied wählt die Gruppe · Alt+Klick für das Fahrzeug"
    en: "Click a member to select the group · Alt+click for the vehicle"
    es: "Haz clic en un miembro para seleccionar el grupo · Alt+clic para el vehículo"
    fr: "Cliquer sur un membre sélectionne le groupe · Alt+clic pour le véhicule"
    it: "Clic su un membro per selezionare il gruppo · Alt+clic per il veicolo"
    ja: "メンバーをクリックするとグループを選択 · Alt+クリックで個別の機体"
    ko: "구성원 클릭 시 그룹 선택 · Alt+클릭으로 개별 기체 선택"
    "pt-BR": "Clique em um membro para selecionar o grupo · Alt+clique para o veículo"
    ru: "Клик по участнику выбирает группу · Alt+клик: отдельный аппарат"
    zh: "点击成员选中整个编队 · Alt+点击选择单个载具"
    "zh-TW": "點擊成員選擇整個編隊 · Alt+點擊選擇單一載具"
  # DC-1133.6: masthead subtitle ("Air group · 4 members" + leader link) and
  # group-domain display labels.
  # Prefix before the leader link in the subtitle, so the link is clearly the
  # group's leader: "Air group · 2 members · leader <Alpha 1>".
