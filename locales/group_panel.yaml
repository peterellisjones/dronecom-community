    de: "· Anführer"
    en: "· leader"
    es: "· líder"
    fr: "· chef"
    it: "· capo"
    ja: "· リーダー"
    ko: "· 대장"
    "pt-BR": "· líder"
    ru: "· ведущий"
    zh: "· 领队"
    "zh-TW": "· 領隊"
  # #1574: terse marker shown in the subtitle when the whole group is stowed
  # (no airborne anchor) — the panel still renders, but kinematics/mission are
  # a read-only plan.
