  # the vehicle inspect panel). The previous `group_panel.rename` block was
  # removed when the UX became click-to-edit via a pencil icon.
  # DC-991: discoverability hint shown at the bottom of the group inspect
  # panel for the inverted click default (default click = group, Alt = unit).
  alt_click_hint:
    de: "Klick auf ein Mitglied wählt die Gruppe · Alt+Klick für das Fahrzeug"
