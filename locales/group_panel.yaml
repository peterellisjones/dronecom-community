    ru: "Клик по участнику выбирает группу · Alt+клик: отдельный аппарат"
    zh: "点击成员选中整个编队 · Alt+点击选择单个载具"
    "zh-TW": "點擊成員選擇整個編隊 · Alt+點擊選擇單一載具"
