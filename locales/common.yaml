_version: 2

common:
  # #3077/#3097: tag marking a design that ships with the game rather than one
  # the player authored. Shared by the tactical inspect masthead and the Drone
  # Designer library — both are tactical zones, so ALL CAPS in both, with the
  # same prose explanation on hover.
  default_design_badge:
    de: "STANDARD"
    en: "DEFAULT"
    es: "ESTÁNDAR"
    fr: "STANDARD"
    it: "STANDARD"
    ja: "標準設計"
    ko: "기본 설계"
    "pt-BR": "PADRÃO"
    ru: "СТАНДАРТ"
    zh: "预设设计"
    "zh-TW": "預設設計"
  default_design_badge_tooltip:
    de: "Ein mitgelieferter Standardentwurf, kein eigener. Im Drohnen-Designer lässt sich eine bearbeitbare Kopie anlegen."
    en: "A design that ships with the game, not one of your own. Make an editable copy of it in the Drone Designer."
    es: "Un diseño que viene con el juego, no uno propio. Puedes hacer una copia editable en el Diseñador de Drones."
    fr: "Un modèle fourni avec le jeu, et non l'un des vôtres. Vous pouvez en faire une copie modifiable dans le Concepteur de drones."
    it: "Un progetto incluso nel gioco, non uno tuo. Puoi crearne una copia modificabile nel Progettista di droni."
    ja: "自分で作成した設計ではなく、ゲームに付属する標準設計。ドローン設計室で編集可能な複製を作成できる。"
    ko: "직접 만든 설계가 아니라 게임에 기본 포함된 설계입니다. 드론 설계실에서 편집 가능한 사본을 만들 수 있습니다."
    "pt-BR": "Um projeto que acompanha o jogo, não um seu. Você pode fazer uma cópia editável no Projetista de Drones."
    ru: "Штатный проект из комплекта игры, а не ваш собственный. В конструкторе дронов можно создать редактируемую копию."
    zh: "游戏自带的预设设计，而非你自己的设计。可在无人机设计室中创建可编辑的副本。"
    "zh-TW": "遊戲內建的預設設計，而非你自己的設計。可在無人機設計室中建立可編輯的副本。"
  # #2717: the click / shift-click interaction hint appended to every vehicle
  # entity link's hover tooltip. Guidance prose, so sentence case — the tooltip
  # body above it is the ALL-CAPS tactical readout.
  link_interaction_hint:
    de: "Klicken zum Auswählen. Shift-Klick, um zur Auswahl hinzuzufügen."
    en: "Click to select. Shift-click to add to the selection."
    es: "Haz clic para seleccionar. Mayús+clic para añadir a la selección."
    fr: "Cliquez pour sélectionner. Maj+clic pour ajouter à la sélection."
    it: "Fai clic per selezionare. Maiusc+clic per aggiungere alla selezione."
    ja: "クリックで選択します。Shift+クリックで選択に追加します。"
    ko: "클릭하여 선택합니다. Shift+클릭으로 선택에 추가합니다."
    "pt-BR": "Clique para selecionar. Shift+clique para adicionar à seleção."
    ru: "Нажмите, чтобы выбрать. Shift+клик, чтобы добавить к выделению."
    zh: "单击选择。Shift+单击添加到选择。"
    "zh-TW": "點擊選取。Shift+點擊加入選取。"
