    de: "Wie tief der Rumpf unter der Wasserlinie liegt. Ein größerer Tiefgang schränkt ein, welche Flachwasserbereiche das Schiff sicher befahren kann."
    en: "How deep the hull sits below the waterline. A deeper draft restricts which shallow water the ship can safely enter."
    es: "Qué tan profundo se encuentra el casco bajo la línea de flotación. Un calado mayor restringe en qué aguas poco profundas puede entrar el barco con seguridad."
    fr: "Profondeur à laquelle la coque s'enfonce sous la ligne de flottaison. Un tirant d'eau plus important limite les eaux peu profondes que le navire peut emprunter sans risque."
    it: "Quanto in profondità si trova lo scafo sotto la linea di galleggiamento. Un pescaggio maggiore limita le acque poco profonde in cui la nave può entrare in sicurezza."
    ja: "喫水線より下に船体が沈み込む深さです。喫水が深いほど、安全に進入できる浅瀬が制限されます。"
    ko: "선체가 흘수선 아래로 잠기는 깊이입니다. 흘수가 깊을수록 안전하게 진입할 수 있는 얕은 수역이 제한됩니다."
    "pt-BR": "A profundidade em que o casco fica abaixo da linha d'água. Um calado maior restringe em quais águas rasas o navio pode entrar com segurança."
    ru: "Насколько глубоко корпус погружён ниже ватерлинии. Больший осадка ограничивает, на какие мелководья корабль может безопасно заходить."
    zh: "船体在吃水线以下的深度。吃水越深，能安全进入的浅水区就越受限。"
