  # Same in all languages — "2v2" is a match-format notation universal in gaming
  affiliation_2v2:
    en: "2v2"
  affiliation_2v2_tooltip:
    de: "Verbündet die ersten beiden Teams miteinander und die letzten beiden miteinander — die beiden Paare sind gegeneinander verfeindet."
    en: "Ally the first two teams together and the last two together, enemies across the pair."
    es: "Alía a los dos primeros equipos entre sí y a los dos últimos entre sí, siendo enemigos entre ambos pares."
    fr: "Allie les deux premières équipes entre elles et les deux dernières entre elles, les deux paires étant ennemies l'une de l'autre."
    it: "Allea le prime due squadre tra loro e le ultime due tra loro, nemiche tra le due coppie."
    ja: "最初の2チームを同盟に、残りの2チームを同盟にし、両ペア同士は敵対します。"
    ko: "처음 두 팀을 서로 동맹으로, 마지막 두 팀을 서로 동맹으로 만들고 두 쌍은 서로 적이 됩니다."
    "pt-BR": "Alia as duas primeiras equipes entre si e as duas últimas entre si, sendo inimigas entre os dois pares."
    ru: "Объединяет первые две команды в союз и последние две в союз — эти две пары враждуют между собой."
    zh: "让前两支队伍互为同盟，后两支队伍互为同盟，两组之间互为敌方。"
    "zh-TW": "讓前兩支隊伍互為同盟，後兩支隊伍互為同盟，兩組之間互為敵方。"
